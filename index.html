    h("div", { class: "spacer" }),
    h("button", {
      class: "footer-link mono danger",
      onClick: function () {
        if (confirm("Reset all beta data? This clears your SRS history.")) {
          localStorage.removeItem(SKEY);
          state = null;
          setView("onboarding");
        }
      },
    }, "Reset"),
  ]);

  return shell([
    header(proj.daysLeft + " DAYS TO EXAM", "今日の計画", right),
    topBanner,
    sectionSelector,
    todayCard,
    readingCard,
    matchCard,
    progressBar,
    breakdown,
    footer,
  ]);
}

/* ============================================================
   SCREEN: STUDY
   ============================================================ */

function renderStudy() {
  if (!viewState.queue) {
    const q = [];
    const queue = buildTodayQueue(state.section || "all");
    const dueArr = queue.due.slice();
    const newArr = queue.newItems.slice();
    while (dueArr.length || newArr.length) {
      if (dueArr.length) q.push({ kind: "review", item: dueArr.shift().item });
      if (newArr.length) q.push({ kind: "new", item: newArr.shift() });
      if (dueArr.length) q.push({ kind: "review", item: dueArr.shift().item });
    }
    viewState.queue = q;
    viewState.idx = 0;
    viewState.localCards = Object.assign({}, state.cards || {});
    viewState.completed = 0;
    viewState.revealed = false;
    viewState.undoStack = [];
    viewState.weakItems = []; // ids rated Again or Hard during this session
    viewState.inWeakRound = false;
    viewState.weakRoundOffered = false;
  }

  // End-of-queue branching: weak items round prompt or completion
  if (viewState.idx >= viewState.queue.length) {
    // Offer weak-items round if not yet done and there are weak items
    if (!viewState.inWeakRound && !viewState.weakRoundOffered && viewState.weakItems.length > 0) {
      viewState.weakRoundOffered = true;
      return shell([
        header("Mid-session", "弱点復習"),
        h("div", { class: "card surface border center" }, [
          h("div", { class: "weak-icon" }, "🎯"),
          h("h2", { class: "weak-h" }, "Weak items round"),
          h("p", { class: "weak-p" }, "You marked " + viewState.weakItems.length + " card" + (viewState.weakItems.length === 1 ? "" : "s") + " as Again or Hard. Reviewing them now reinforces them while they're still fresh."),
          h("div", { class: "weak-buttons" }, [
            h("button", {
              class: "btn-primary mono full",
              onClick: function () {
                // Build a new queue from weak items
                const weakQueue = viewState.weakItems.map(function (id) {
                  const it = allItems().find(function (x) { return x.id === id; });
                  return it ? { kind: "review", item: it } : null;
                }).filter(Boolean);
                viewState.queue = weakQueue;
                viewState.idx = 0;
                viewState.weakItems = [];
                viewState.inWeakRound = true;
                viewState.revealed = false;
                render();
              },
            }, "Review weak items (" + viewState.weakItems.length + ") →"),
            h("button", {
              class: "btn-secondary mono full skip-btn",
              onClick: function () {
                viewState.weakItems = [];
                render();
              },
            }, "Skip → finish session"),
          ]),
        ]),
      ]);
    }

    // Final completion screen with celebration
    const finalProj = projectReadiness();
    const newMastered = Object.values(viewState.localCards).filter(function (c) {
      return c.stability > 7 && c.status === "review";
    }).length;
    // Compute milestone using new mastered count
    const milestoneToShow = (function () {
      const ms = (state.milestonesShown || []).slice();
      for (let i = 0; i < MILESTONES.length; i++) {
        const m = MILESTONES[i];
        if (newMastered >= m.mastered && ms.indexOf(m.mastered) === -1) {
          return m;
        }
      }
      return null;
    })();
    const encouragement = pickEncouragement(viewState.completed);

    return shell([
      header("Session Complete", "お疲れさまでした"),
      milestoneToShow
        ? h("div", { class: "card milestone-card" }, [
            h("div", { class: "milestone-jp jp" }, milestoneToShow.jp),
            h("div", { class: "milestone-label mono" }, "MILESTONE · " + milestoneToShow.label.toUpperCase()),
            h("div", { class: "milestone-note" }, milestoneToShow.note),
          ])
        : null,
      h("div", { class: "card surface border center" }, [
        h("div", { class: "big-num" }, String(viewState.completed)),
        h("div", { class: "stat-label mono" }, "CARDS COMPLETED"),
        h("p", { class: "encouragement" }, encouragement),
        h("button", {
          class: "btn-primary mono",
          onClick: function () {
            state.cards = viewState.localCards;
            state.sessions = (state.sessions || 0) + 1;
            updateStreak();
            // Persist milestone if shown
            if (milestoneToShow) {
              state.milestonesShown = state.milestonesShown || [];
              if (state.milestonesShown.indexOf(milestoneToShow.mastered) === -1) {
                state.milestonesShown.push(milestoneToShow.mastered);
              }
            }
            saveState();
            setView("dashboard");
          },
        }, "Back to Dashboard →"),
      ]),
    ]);
  }

  const current = viewState.queue[viewState.idx];
  const item = current.item;
  const kind = current.kind;
  const existing = viewState.localCards[item.id] || initCard(item.id, item.type);

  function handleRate(rating) {
    // Snapshot for undo
    viewState.undoStack.push({
      idx: viewState.idx,
      localCards: Object.assign({}, viewState.localCards),
      queue: viewState.queue.slice(),
      completed: viewState.completed,
      weakItems: viewState.weakItems.slice(),
    });
    const updated = schedule(existing, rating);
    viewState.localCards[item.id] = updated;
    viewState.completed++;
    // Track weak items for end-of-session re-review
    if (!viewState.inWeakRound && (rating === RATING.AGAIN || rating === RATING.HARD)) {
      if (viewState.weakItems.indexOf(item.id) === -1) {
        viewState.weakItems.push(item.id);
      }
    }
    if (rating === RATING.AGAIN && kind === "review" && viewState.idx < viewState.queue.length - 1) {
      const insertAt = Math.min(viewState.idx + 3, viewState.queue.length);
      viewState.queue.splice(insertAt, 0, { kind: kind, item: item });
    }
    viewState.idx++;
    viewState.revealed = false;
    render();
  }

  function handleUndo() {
    if (viewState.undoStack.length === 0) return;
    const prev = viewState.undoStack.pop();
    viewState.idx = prev.idx;
    viewState.localCards = prev.localCards;
    viewState.queue = prev.queue;
    viewState.completed = prev.completed;
    if (prev.weakItems) viewState.weakItems = prev.weakItems;
    viewState.revealed = true; // show the answer side since they're going back
    render();
  }

  // Build card display
  const cardChildren = [];
  // JLPT N3 badge in top-right of card
  cardChildren.push(h("div", { class: "card-n3-badge mono" }, "N3"));
  if (item.type === "vocab") {
    cardChildren.push(h("div", { class: "card-jp-large jp" }, item.jp));
    if (viewState.revealed) {
      cardChildren.push(h("div", { class: "card-reading jp" }, item.r));
      cardChildren.push(h("div", { class: "card-meaning" }, item.en));
      cardChildren.push(h("div", { class: "card-section" }, [
        h("div", { class: "section-label mono" }, "Example"),
        h("div", { class: "card-example jp" }, item.ex),
        item.ex_en ? h("div", { class: "card-example-en" }, item.ex_en) : null,
      ]));
      const vocabMnem = deriveVocabMnemonic(item);
      if (vocabMnem) {
        cardChildren.push(h("div", { class: "card-section" }, [
          h("div", { class: "section-label mono" }, "Memory aid"),
          h("div", { class: "section-text mnem-text" }, vocabMnem),
        ]));
      }
    }
  } else if (item.type === "kanji") {
    cardChildren.push(h("div", { class: "card-jp-huge jp" }, item.jp));
    if (viewState.revealed) {
      cardChildren.push(h("div", { class: "card-meaning" }, item.meaning));
      cardChildren.push(h("div", { class: "card-onkun mono" }, [
        "On: ",
        h("span", { class: "jp" }, item.on),
        " · Kun: ",
        h("span", { class: "jp" }, item.kun),
      ]));
      cardChildren.push(h("div", { class: "card-section" }, [
        h("div", { class: "section-label mono" }, "Components"),
        h("div", { class: "section-text jp" }, item.comp),
        h("div", { class: "section-label mono" }, "Mnemonic"),
        h("div", { class: "section-text mnem-text" }, item.mnem),
      ]));
    }
  } else {
    cardChildren.push(h("div", { class: "card-jp-medium jp" }, item.jp));
    if (viewState.revealed) {
      cardChildren.push(h("div", { class: "card-meaning" }, item.meaning));
      cardChildren.push(h("div", { class: "card-section" }, [
        h("div", { class: "section-label mono" }, "Explanation"),
        h("div", { class: "section-text" }, item.explanation),
      ]));
      cardChildren.push(h("div", { class: "card-section" }, [
        h("div", { class: "section-label mono" }, "Example"),
        h("div", { class: "section-text jp" }, item.ex),
        item.ex_en ? h("div", { class: "section-text-en" }, item.ex_en) : null,
      ]));
      if (item.mnem) {
        cardChildren.push(h("div", { class: "card-section" }, [
          h("div", { class: "section-label mono" }, "Memory aid"),
          h("div", { class: "section-text mnem-text" }, item.mnem),
        ]));
      }
    }
  }

  const cardEl = h("div", { class: "card surface border study-card type-" + item.type }, cardChildren);

  let actions;
  if (!viewState.revealed) {
    actions = h("button", {
      class: "btn-secondary mono full reveal",
      onClick: function () { viewState.revealed = true; render(); },
    }, "Reveal ↓");
  } else {
    actions = h("div", { class: "btn-row-4" }, [
      h("button", { class: "btn-rate again mono", onClick: function () { handleRate(RATING.AGAIN); } }, "Again"),
      h("button", { class: "btn-rate hard mono", onClick: function () { handleRate(RATING.HARD); } }, "Hard"),
      h("button", { class: "btn-rate good mono", onClick: function () { handleRate(RATING.GOOD); } }, "Good"),
      h("button", { class: "btn-rate easy mono", onClick: function () { handleRate(RATING.EASY); } }, "Easy"),
    ]);
  }

  return shell([
    h("div", { class: "study-bar" }, [
      h("div", null, [
        h("button", {
          class: "footer-link mono",
          onClick: function () {
            state.cards = viewState.localCards;
            saveState();
            setView("dashboard");
          },
        }, "← Dashboard"),
      ]),
      h("div", { class: "study-counter mono" }, (viewState.idx + 1) + " / " + viewState.queue.length),
    ]),
    h("div", { class: "study-kind-row mono type-" + item.type + "-text" }, (kind === "new" ? "★ New" : "↻ Review") + " · " + item.type),
    h("div", { class: "study-progress" }, [
      h("div", {
        class: "study-progress-fill",
        style: "width:" + (((viewState.idx + 1) / viewState.queue.length) * 100) + "%",
      }),
    ]),
    cardEl,
    actions,
    viewState.undoStack.length > 0
      ? h("div", { class: "undo-row" }, [
          h("button", {
            class: "footer-link mono",
            onClick: handleUndo,
          }, "↶ Undo last rating"),
        ])
      : null,
    viewState.revealed
      ? h("div", { class: "report-row" }, [reportBtn(Object.assign({}, item))])
      : null,
  ]);
}

/* ============================================================
   SCREEN: READING
   ============================================================ */

function renderReading() {
  const done = state.readingsDone || [];
  const next = READINGS.find(function (r) { return done.indexOf(r.id) === -1; });
  if (!next) {
    return shell([
      header("Reading", "All passages complete"),
      h("button", {
        class: "btn-primary mono full",
        onClick: function () { setView("dashboard"); },
      }, "Back →"),
    ]);
  }

  if (!viewState.phase) {
    viewState.phase = "read";
    viewState.answers = [];
  }

  if (viewState.phase === "read") {
    return shell([
      header("Reading · " + (done.length + 1) + "/" + READINGS.length, next.title,
        h("div", { class: "header-en mono" }, next.title_en)
      ),
      h("div", { class: "card surface border passage" }, [
        h("div", { class: "passage-text jp" }, next.passage),
      ]),
      h("button", {
        class: "btn-primary mono full",
        onClick: function () { viewState.phase = "questions"; render(); },
      }, "Answer questions →"),
      h("div", { style: "margin-top:16px; display:flex; justify-content:space-between; align-items:center;" }, [
        h("button", {
          class: "footer-link mono",
          onClick: function () { setView("dashboard"); },
        }, "Exit"),
        reportBtn(next),
      ]),
    ]);
  }

  if (viewState.phase === "questions") {
    const questionEls = next.questions.map(function (q, qi) {
      const optionEls = q.options.map(function (opt, oi) {
        const selected = viewState.answers[qi] === oi;
        return h("button", {
          class: "option-btn jp" + (selected ? " selected" : ""),
          onClick: function () {
            viewState.answers[qi] = oi;
            render();
          },
        }, [
          h("span", { class: "mono opt-letter" }, String.fromCharCode(65 + oi)),
          opt,
        ]);
      });
      return h("div", { class: "card surface border question" }, [
        h("div", { class: "question-text jp" }, q.q),
        h("div", { class: "options" }, optionEls),
      ]);
    });
    const allAnswered = next.questions.every(function (_, qi) {
      return viewState.answers[qi] !== undefined;
    });
    return shell([
      backRow("← Re-read passage", function () {
        viewState.phase = "read";
        render();
      }),
      header("Reading · Questions", next.title),
      h("div", { class: "questions-list" }, questionEls),
      h("button", {
        class: "btn-primary mono full check-btn" + (allAnswered ? "" : " disabled"),
        onClick: function () {
          if (allAnswered) {
            viewState.phase = "results";
            render();
          }
        },
      }, "Check →"),
    ]);
  }

  // results
  let correct = 0;
  next.questions.forEach(function (q, qi) {
    if (viewState.answers[qi] === q.a) correct++;
  });
  const resultEls = next.questions.map(function (q, qi) {
    const isRight = viewState.answers[qi] === q.a;
    const children = [
      h("div", { class: "result-q jp" }, q.q),
      h("div", { class: "result-you mono" }, [
        "You: ",
        h("span", { class: "jp" }, q.options[viewState.answers[qi]] || "—"),
      ]),
    ];
    if (!isRight) {
      children.push(h("div", { class: "result-correct mono" }, [
        "Correct: ",
        h("span", { class: "jp" }, q.options[q.a]),
      ]));
    }
    return h("div", { class: "result-card surface " + (isRight ? "right" : "wrong") }, children);
  });
  return shell([
    header("Reading · Results", next.title),
    h("div", { class: "card surface border center" }, [
      h("div", { class: "big-num" }, correct + " / " + next.questions.length),
      h("div", { class: "stat-label mono" }, "CORRECT"),
    ]),
    h("div", { class: "results-list" }, resultEls),
    h("button", {
      class: "btn-primary mono full",
      onClick: function () {
        state.readingsDone = (state.readingsDone || []).concat([next.id]);
        saveState();
        setView("dashboard");
      },
    }, "Back to Dashboard →"),
  ]);
}

/* ============================================================
   SCREEN: MATCH GAME (flip-to-pair memory game)
   ============================================================ */

function renderMatch() {
  // -------- Setup new game on first render --------
  if (!viewState.gameStarted) {
    // Pair counts chosen so they fit cleanly into a 4-column grid:
    //   6 pairs = 12 tiles = 3 rows × 4 cols
    //   8 pairs = 16 tiles = 4 × 4
    //  10 pairs = 20 tiles = 5 × 4
    //  12 pairs = 24 tiles = 6 × 4
    const sizeOptions = [6, 8, 10, 12];
    const desiredPairs = viewState.size || 8;

    const sectionPool = filterBySection(allItems(), state.section || "all");
    const cards = state.cards || {};
    const learnedItems = sectionPool.filter(function (i) { return cards[i.id]; });

    // Build the candidate pool, preferring learned items + high-priority unseen.
    // Pool must be substantially larger than the recently-seen window so we can
    // always find fresh items across many consecutive games.
    let pool;
    if (learnedItems.length >= desiredPairs * 3) {
      // Plenty of learned items — use only those for retention practice
      pool = learnedItems;
    } else {
      const unseen = sectionPool
        .filter(function (i) { return !cards[i.id]; })
        .sort(function (a, b) { return getPriority(b) - getPriority(a); });
      // Pull a large slice — much bigger than the recently-seen cap so rotation works.
      // For 8-pair games, recent cap is 64; pool should be at least 150 to give breathing room.
      pool = learnedItems.concat(unseen.slice(0, Math.max(desiredPairs * 20, 150)));
    }

    // Avoid items used in recent games (persisted across sessions)
    state.matchRecentlySeen = state.matchRecentlySeen || [];
    const recentSet = {};
    state.matchRecentlySeen.forEach(function (id) { recentSet[id] = true; });

    const freshPool = pool.filter(function (i) { return !recentSet[i.id]; });
    const fallbackPool = pool.filter(function (i) { return recentSet[i.id]; });

    // Pick from fresh items first; fall back to recent only if not enough fresh
    function shuffle(arr) {
      const out = arr.slice();
      for (let i = out.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = out[i]; out[i] = out[j]; out[j] = tmp;
      }
      return out;
    }
    let chosenPairs = shuffle(freshPool).slice(0, desiredPairs);
    if (chosenPairs.length < desiredPairs) {
      // Not enough fresh — top up with the least-recently-used items
      // (matchRecentlySeen is ordered oldest→newest, so we filter from the start)
      const recentOrder = {};
      state.matchRecentlySeen.forEach(function (id, idx) { recentOrder[id] = idx; });
      const sortedFallback = fallbackPool.slice().sort(function (a, b) {
        return (recentOrder[a.id] || 0) - (recentOrder[b.id] || 0);
      });
      const need = desiredPairs - chosenPairs.length;
      chosenPairs = chosenPairs.concat(sortedFallback.slice(0, need));
    }

    // If we STILL don't have enough (very small section), the section is too small;
    // we'll just play with what we have rather than crash.
    if (chosenPairs.length === 0) {
      // Fallback shouldn't normally happen but guard against it
      chosenPairs = shuffle(pool).slice(0, desiredPairs);
    }

    // Update recently-seen list with the items we picked.
    // Cap chosen so we can play many consecutive games before any word repeats.
    // For 8 pairs: cap of 64 means 8 games of completely fresh content before any repeat.
    const cap = Math.max(desiredPairs * 8, 64);
    const newIds = chosenPairs.map(function (i) { return i.id; });
    state.matchRecentlySeen = state.matchRecentlySeen
      .filter(function (id) { return newIds.indexOf(id) === -1; })  // remove dups
      .concat(newIds)
      .slice(-cap); // keep most recent N
    saveState();

    // Build all cards (JP + EN), mix into one shuffled deck
    const gameCards = [];
    chosenPairs.forEach(function (item, idx) {
      gameCards.push({ pairId: idx, face: "jp", item: item, id: "jp_" + idx });
      gameCards.push({ pairId: idx, face: "en", item: item, id: "en_" + idx });
    });
    for (let i = gameCards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = gameCards[i]; gameCards[i] = gameCards[j]; gameCards[j] = tmp;
    }

    // Assign a display number (1-N) per pair in the order they get matched.
    // We'll fill these in as matches happen.
    viewState.gameStarted = true;
    viewState.gameCards = gameCards;
    viewState.selected = null;        // {id, face} or null
    viewState.matched = {};            // {pairId: matchOrder (1-based)}
    viewState.attempts = 0;
    viewState.matches = 0;
    viewState.totalPairs = desiredPairs;
    viewState.startTime = Date.now();
    viewState.elapsedAtFinish = null;
    viewState.feedback = null;
    viewState.sizeOptions = sizeOptions;
    viewState.desiredPairs = desiredPairs;
    viewState.lockUntil = 0;
    viewState.combo = 0;
    viewState.bestCombo = 0;
  }

  // -------- Win check --------
  const allMatched = viewState.matches === viewState.totalPairs;
  if (allMatched && viewState.elapsedAtFinish === null) {
    viewState.elapsedAtFinish = Math.round((Date.now() - viewState.startTime) / 1000);
    const accuracy = viewState.totalPairs / Math.max(1, viewState.attempts);
    const speedBonus = Math.max(0, 200 - viewState.elapsedAtFinish);
    const comboBonus = (viewState.bestCombo || 0) * 10;
    const score = Math.round(accuracy * 100 + speedBonus + comboBonus);
    viewState.gameScore = score;
    viewState.gameComboBonus = comboBonus;
    if (!state.matchHighScore || score > state.matchHighScore) {
      state.matchHighScore = score;
      viewState.newRecord = true;
    }
    state.matchGamesPlayed = (state.matchGamesPlayed || 0) + 1;
    saveState();
  }

  // -------- WIN SCREEN --------
  if (allMatched) {
    return shell([
      header("Match Game", "完成!"),
      h("div", { class: "card surface border match-win" }, [
        viewState.newRecord ? h("div", { class: "match-new-record mono" }, "★ NEW BEST") : null,
        h("div", { class: "match-trophy" }, "🏆"),
        h("div", { class: "match-stats" }, [
          h("div", null, [
            h("div", { class: "stat-num" }, String(viewState.matches)),
            h("div", { class: "stat-label mono" }, "MATCHES"),
          ]),
          h("div", null, [
            h("div", { class: "stat-num" }, viewState.elapsedAtFinish + "s"),
            h("div", { class: "stat-label mono" }, "TIME"),
          ]),
          h("div", null, [
            h("div", { class: "stat-num" }, String(viewState.attempts)),
            h("div", { class: "stat-label mono" }, "TRIES"),
          ]),
        ]),
        (viewState.bestCombo || 0) >= 2 ? h("div", { class: "win-combo-line" }, [
          h("span", { class: "win-combo-badge" }, "🔥 BEST STREAK"),
          h("span", { class: "win-combo-num" }, String(viewState.bestCombo)),
          h("span", { class: "win-combo-bonus mono" }, "+" + (viewState.gameComboBonus || 0) + " pts"),
        ]) : null,
        h("div", { class: "match-score-big" }, String(viewState.gameScore)),
        h("div", { class: "match-score-label mono" }, "SCORE"),
        h("button", {
          class: "btn-primary mono full",
          style: "margin-top:20px",
          onClick: function () {
            viewState = { gameStarted: false, size: viewState.desiredPairs };
            render();
          },
        }, "Play again →"),
        h("button", {
          class: "btn-secondary mono full",
          style: "margin-top:8px",
          onClick: function () {
            viewState = {};
            setView("dashboard");
          },
        }, "Back to Dashboard"),
      ]),
    ]);
  }

  // -------- Tap handler with mixed-grid logic --------
  // Behavior:
  //   - First tap on unmatched tile selects it
  //   - Tap same tile again: deselects
  //   - Tap different tile, same face: switch selection (no penalty)
  //   - Tap different tile, opposite face: attempt match
  function handleTap(card) {
    if (Date.now() < viewState.lockUntil) return;
    if (viewState.matched[card.pairId]) return;

    const sel = viewState.selected;
    if (!sel) {
      viewState.selected = { id: card.id, face: card.face };
    } else if (sel.id === card.id) {
      // Same tile = deselect
      viewState.selected = null;
    } else if (sel.face === card.face) {
      // Same side, different tile = switch selection (no penalty)
      viewState.selected = { id: card.id, face: card.face };
    } else {
      // Opposite face = attempt match
      const prev = viewState.gameCards.find(function (c) { return c.id === sel.id; });
      viewState.attempts++;
      if (prev.pairId === card.pairId) {
        // MATCH
        viewState.matches++;
        viewState.matched[card.pairId] = viewState.matches; // store the order
        viewState.combo = (viewState.combo || 0) + 1;
        if (viewState.combo > viewState.bestCombo) viewState.bestCombo = viewState.combo;
        viewState.feedback = { pairId: card.pairId, result: "match" };
        viewState.selected = null;
        setTimeout(function () {
          if (viewState.feedback && viewState.feedback.result === "match") {
            viewState.feedback = null;
            render({ preserveScroll: true });
          }
        }, 500);
      } else {
        // MISS
        viewState.combo = 0;
        viewState.feedback = { missIds: [sel.id, card.id], result: "miss" };
        viewState.lockUntil = Date.now() + 700;
        setTimeout(function () {
          viewState.feedback = null;
          viewState.selected = null;
          render({ preserveScroll: true });
        }, 700);
      }
    }
    // Preserve scroll on all in-game taps so the user stays where they are
    render({ preserveScroll: true });
  }

  // -------- Build a tile element --------
  function buildTile(c) {
    const matchOrder = viewState.matched[c.pairId]; // undefined if not matched
    const isMatched = !!matchOrder;
    const isSelected = viewState.selected && viewState.selected.id === c.id;
    const isMissFlash = viewState.feedback && viewState.feedback.result === "miss"
      && viewState.feedback.missIds.indexOf(c.id) !== -1;
    const isMatchFlash = viewState.feedback && viewState.feedback.result === "match"
      && viewState.feedback.pairId === c.pairId;

    let mainText, subText;
    if (c.face === "jp") {
      if (c.item.type === "vocab") {
        mainText = c.item.jp;
        subText = c.item.r;
      } else if (c.item.type === "kanji") {
        mainText = c.item.jp;
        // shorter on/kun for tile space
        subText = c.item.on + " · " + c.item.kun;
      } else {
        mainText = c.item.jp;
        subText = "";
      }
    } else {
      // English: prefer the first comma-separated part if very long
      const meaning = c.item.type === "vocab" ? c.item.en : c.item.meaning;
      mainText = meaning;
      subText = "";
    }

    let cls = "pair-tile pair-tile-" + c.face;
    if (isMatched) cls += " matched";
    else if (isSelected) cls += " selected";
    if (isMissFlash) cls += " miss-flash";
    if (isMatchFlash) cls += " match-flash";

    // Hue per pair for subtle differentiation. 47 is coprime to 360 → good distribution.
    const hue = (c.pairId * 47) % 360;
    const style = isMatched ? ("--pair-hue:" + hue) : "";

    const children = [];
    if (c.face === "jp") {
      // Size class based on length: kana count > 6 = "long", > 9 = "very-long"
      let lenCls = "";
      const len = mainText.length;
      if (len > 9) lenCls = " very-long";
      else if (len > 6) lenCls = " long";
      children.push(h("div", { class: "tile-jp-main jp" + lenCls }, mainText));
      if (subText) children.push(h("div", { class: "tile-jp-sub jp" }, subText));
    } else {
      children.push(h("div", { class: "tile-en-main" }, mainText));
    }
    if (isMatched) {
      children.push(h("span", { class: "tile-pair-num mono" }, String(matchOrder)));
    }

    return h("button", {
      class: cls,
      style: style,
      onClick: function () { handleTap(c); },
      disabled: isMatched ? "" : null,
    }, children);
  }

  const tileEls = viewState.gameCards.map(buildTile);

  const elapsed = Math.round((Date.now() - viewState.startTime) / 1000);
  const combo = viewState.combo || 0;

  const stats = h("div", { class: "match-stats-bar" }, [
    h("div", { class: "match-stat" }, [
      h("span", { class: "match-stat-num" }, viewState.matches + "/" + viewState.totalPairs),
      h("span", { class: "match-stat-label mono" }, "PAIRS"),
    ]),
    h("div", { class: "match-stat" }, [
      h("span", { class: "match-stat-num" }, String(viewState.attempts)),
      h("span", { class: "match-stat-label mono" }, "TRIES"),
    ]),
    combo >= 2 ? h("div", { class: "combo-badge" }, "🔥 " + combo + " IN A ROW") : null,
  ]);

  const showDifficulty = viewState.attempts === 0 && viewState.matches === 0;
  const difficultyRow = showDifficulty ? h("div", { class: "match-difficulty" },
    [h("span", { class: "match-diff-label mono" }, "PAIRS:")].concat(
      viewState.sizeOptions.map(function (n) {
        return h("button", {
          class: "match-diff-btn mono" + (viewState.desiredPairs === n ? " active" : ""),
          onClick: function () {
            viewState = { gameStarted: false, size: n };
            render();
          },
        }, String(n));
      })
    )
  ) : null;

  // Apply awaiting-class to grid: if a tile is selected, opposite-face tiles glow subtly
  let gridCls = "pair-grid-4";
  if (viewState.selected && viewState.selected.face === "jp") gridCls += " awaiting-en";
  else if (viewState.selected && viewState.selected.face === "en") gridCls += " awaiting-jp";

  return shell([
    backRow("← Dashboard", function () {
      viewState = {};
      setView("dashboard");
    }),
    header("Match Game · " + (state.section || "all").toUpperCase(), "ペア合わせ"),
    h("div", { class: "match-blurb-row" }, "Tap a Japanese word, then its English meaning."),
    stats,
    difficultyRow,
    h("div", { class: gridCls }, tileEls),
    h("div", { class: "match-footer-row" }, [
      h("button", {
        class: "footer-link mono",
        onClick: function () {
          viewState = { gameStarted: false, size: viewState.desiredPairs };
          render();
        },
      }, "↻ New deal"),
      h("div", { class: "spacer" }),
      h("span", { class: "mono muted" }, "⏱ " + elapsed + "s"),
    ]),
  ]);
}

/* ============================================================
   SCREEN: PROGRESS
   ============================================================ */

function renderProgress() {
  const proj = projectReadiness();
  const cards = state.cards || {};
  const all = allItems();
  const breakdown = ["vocab", "kanji", "grammar"].map(function (type) {
    const typeItems = all.filter(function (i) { return i.type === type; });
    const seen = typeItems.map(function (i) { return cards[i.id]; }).filter(function (c) { return c; });
    const learning = seen.filter(function (c) { return c.status === "learning"; }).length;
    const review = seen.filter(function (c) { return c.status === "review"; }).length;
    const mastered = seen.filter(function (c) { return c.stability > 7; }).length;
    return { type: type, total: typeItems.length, seen: seen.length, learning: learning, review: review, mastered: mastered };
  });

  let totalLapses = 0, totalReviews = 0;
  Object.keys(cards).forEach(function (k) {
    totalLapses += cards[k].lapses || 0;
    totalReviews += cards[k].reviews || 0;
  });
  const accuracy = totalReviews > 0 ? Math.round(((totalReviews - totalLapses) / totalReviews) * 100) : 0;

  const right = h("button", {
    class: "footer-link mono",
    onClick: function () { setView("dashboard"); },
  }, "← Back");

  const stats = h("div", { class: "stats-grid" }, [
    h("div", { class: "card surface border" }, [
      h("div", { class: "card-label mono" }, "Days Left"),
      h("div", { class: "stat-big" }, String(proj.daysLeft)),
    ]),
    h("div", { class: "card surface border" }, [
      h("div", { class: "card-label mono" }, "Proj. Mastery"),
      h("div", { class: "stat-big" }, proj.projectedMasteryPct + "%"),
    ]),
    h("div", { class: "card surface border" }, [
      h("div", { class: "card-label mono" }, "Sessions"),
      h("div", { class: "stat-big" }, String(state.sessions || 0)),
    ]),
    h("div", { class: "card surface border" }, [
      h("div", { class: "card-label mono" }, "Accuracy"),
      h("div", { class: "stat-big" }, accuracy + "%"),
    ]),
  ]);

  const breakdownEls = breakdown.map(function (b) {
    const masterPct = (b.mastered / b.total) * 100;
    const reviewPct = (b.review / b.total) * 100;
    const learningPct = (b.learning / b.total) * 100;
    return h("div", { class: "card surface border breakdown-row" }, [
      h("div", { class: "breakdown-head" }, [
        h("div", { class: "breakdown-type" }, b.type),
        h("div", { class: "mono muted" }, b.seen + "/" + b.total),
      ]),
      h("div", { class: "stack-bar" }, [
        h("div", { class: "stack-mastered", style: "width:" + masterPct + "%" }),
        h("div", {
          class: "stack-review",
          style: "left:" + masterPct + "%; width:" + reviewPct + "%",
        }),
        h("div", {
          class: "stack-learning",
          style: "left:" + (masterPct + reviewPct) + "%; width:" + learningPct + "%",
        }),
      ]),
      h("div", { class: "breakdown-legend mono" }, [
        h("span", null, "● mastered " + b.mastered),
        h("span", null, "● review " + b.review),
        h("span", null, "● learning " + b.learning),
      ]),
    ]);
  });

  return shell([
    header("Your progress", "進捗", right),
    stats,
    h("div", { class: "section-block" }, [
      h("div", { class: "section-heading mono" }, "By Skill"),
      h("div", null, breakdownEls),
    ]),
    h("div", { class: "card surface border reading-summary" }, [
      h("div", { class: "card-label mono" }, "Reading"),
      h("div", null, [
        "Completed: ",
        h("strong", null, String((state.readingsDone || []).length)),
        " / " + READINGS.length,
      ]),
    ]),
    h("div", { class: "beta-notes" }, [
      h("div", { class: "section-heading mono" }, "Beta Notes"),
      h("p", { class: "italic" }, "Corpus: " + proj.total + " items (" + VOCAB.length + " vocab + " + KANJI.length + " kanji + " + GRAMMAR.length + " grammar) + " + READINGS.length + " reading passages. Algorithm being validated: FSRS-lite SRS, past-exam-weighted prioritization, self-assessed diagnostic placement."),
    ]),
    renderReportsSection(),
  ]);
}

function renderReportsSection() {
  const reports = state.reports || [];
  const children = [
    h("div", { class: "section-heading mono" }, "Card Reports"),
  ];

  if (reports.length === 0) {
    children.push(h("p", { class: "muted italic", style: "font-size:13px;" },
      "No reports yet. Tap the ⚑ Report button on any card to flag wrong content. Reports stay on your device until you export them."));
    return h("div", { class: "reports-section", style: "margin-top:32px;" }, children);
  }

  children.push(h("p", { class: "muted", style: "font-size:13px; margin-bottom:12px;" },
    reports.length + " report" + (reports.length === 1 ? "" : "s") + " saved. Tap 'Copy reports' to copy all reports as text — paste them back in the chat for fixes."));

  const reasonLabels = {};
  REPORT_REASONS.forEach(function (r) { reasonLabels[r.id] = r.label; });

  const listEls = reports.slice().reverse().map(function (r, idx) {
    return h("div", { class: "report-item" }, [
      h("div", { class: "report-item-snapshot jp" }, r.snapshot),
      h("div", { class: "report-item-meta mono" }, [
        r.itemId + " · " + (r.itemType || "?") + " · " + (reasonLabels[r.reason] || r.reason),
      ]),
      h("button", {
        class: "report-item-remove mono",
        onClick: function () {
          if (confirm("Remove this report?")) {
            state.reports.splice(state.reports.length - 1 - idx, 1);
            saveState();
            render();
          }
        },
      }, "× Remove"),
    ]);
  });
  children.push(h("div", { class: "reports-list" }, listEls));

  children.push(h("div", { class: "reports-actions" }, [
    h("button", {
      class: "btn-secondary mono",
      onClick: function () {
        const lines = ["JLPT N3 Beta — Card Reports", "Exported: " + new Date().toISOString(), ""];
        reports.forEach(function (r) {
          lines.push("[" + r.itemId + " · " + (r.itemType || "?") + "] " + r.snapshot);
          lines.push("  Issue: " + (reasonLabels[r.reason] || r.reason));
          lines.push("");
        });
        const txt = lines.join("\n");
        // Try clipboard API, fall back to prompt
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(txt).then(function () {
            showReportToast("Copied " + reports.length + " reports to clipboard.");
          }, function () {
            window.prompt("Copy reports (Cmd/Ctrl+C, then Enter):", txt);
          });
        } else {
          window.prompt("Copy reports (Cmd/Ctrl+C, then Enter):", txt);
        }
      },
    }, "Copy reports"),
    h("button", {
      class: "footer-link mono danger",
      style: "margin-left:auto;",
      onClick: function () {
        if (confirm("Clear all " + reports.length + " reports? They cannot be recovered.")) {
          state.reports = [];
          saveState();
          render();
        }
      },
    }, "Clear all"),
  ]));

  return h("div", { class: "reports-section", style: "margin-top:32px;" }, children);
}

/* ============================================================
   SCREEN: BROWSE — view all items with answers visible
   ============================================================ */

function renderBrowse() {
  if (!viewState.tab) viewState.tab = "vocab";
  if (viewState.search === undefined) viewState.search = "";
  if (!viewState.expanded) viewState.expanded = {};

  const cards = state.cards || {};
  const tab = viewState.tab;
  const search = viewState.search.trim().toLowerCase();

  function statusBadge(itemId) {
    const c = cards[itemId];
    if (!c) return h("span", { class: "badge new mono" }, "·");
    if (c.stability > 7 && c.status === "review") return h("span", { class: "badge mastered mono" }, "✓");
    if (c.status === "review") return h("span", { class: "badge review mono" }, "↻");
    return h("span", { class: "badge learning mono" }, "…");
  }

  function tabBtn(key, label, count) {
    return h("button", {
      class: "tab-btn mono" + (tab === key ? " active" : ""),
      onClick: function () {
        viewState.tab = key;
        viewState.expanded = {};
        render();
      },
    }, [
      h("span", { class: "tab-label" }, label),
      h("span", { class: "tab-count" }, "(" + count + ")"),
    ]);
  }

  const tabBar = h("div", { class: "tab-bar" }, [
    tabBtn("vocab", "Vocab", VOCAB.length),
    tabBtn("kanji", "Kanji", KANJI.length),
    tabBtn("grammar", "Grammar", GRAMMAR.length),
    tabBtn("reading", "Reading", READINGS.length),
  ]);

  const searchInput = h("input", {
    type: "text",
    class: "input search-input",
    placeholder: "Search " + tab + "…",
    value: viewState.search,
  });
  searchInput.addEventListener("input", function (e) {
    viewState.search = e.target.value;
    // Re-render only the list; full render also fine
    render();
  });

  let listEls = [];

  if (tab === "vocab") {
    const filtered = VOCAB.filter(function (v) {
      if (!search) return true;
      return (
        v.jp.toLowerCase().indexOf(search) >= 0 ||
        v.r.toLowerCase().indexOf(search) >= 0 ||
        v.en.toLowerCase().indexOf(search) >= 0
      );
    });
    listEls = filtered.map(function (v) {
      const expanded = viewState.expanded[v.id];
      return h("div", { class: "browse-item" + (expanded ? " expanded" : "") }, [
        h("button", {
          class: "browse-row",
          onClick: function () {
            viewState.expanded[v.id] = !expanded;
            render();
          },
        }, [
          h("div", { class: "browse-row-left" }, [
            statusBadge(v.id),
            h("span", { class: "browse-jp jp" }, v.jp),
            h("span", { class: "browse-reading jp muted" }, v.r),
          ]),
          h("span", { class: "browse-en" }, v.en),
        ]),
        expanded
          ? h("div", { class: "browse-detail" }, [
              h("div", { class: "section-label mono" }, "Example"),
              h("div", { class: "browse-example jp" }, v.ex),
            ])
          : null,
      ]);
    });
  } else if (tab === "kanji") {
    const filtered = KANJI.filter(function (k) {
      if (!search) return true;
      return (
        k.jp.indexOf(search) >= 0 ||
        (k.on || "").toLowerCase().indexOf(search) >= 0 ||
        (k.kun || "").toLowerCase().indexOf(search) >= 0 ||
        k.meaning.toLowerCase().indexOf(search) >= 0
      );
    });
    listEls = filtered.map(function (k) {
      const expanded = viewState.expanded[k.id];
      return h("div", { class: "browse-item" + (expanded ? " expanded" : "") }, [
        h("button", {
          class: "browse-row",
          onClick: function () {
            viewState.expanded[k.id] = !expanded;
            render();
          },
        }, [
          h("div", { class: "browse-row-left" }, [
            statusBadge(k.id),
            h("span", { class: "browse-jp jp kanji" }, k.jp),
            h("span", { class: "browse-onkun mono muted" }, k.on + " / " + k.kun),
          ]),
          h("span", { class: "browse-en" }, k.meaning),
        ]),
        expanded
          ? h("div", { class: "browse-detail" }, [
              h("div", { class: "section-label mono" }, "Components"),
              h("div", { class: "browse-detail-text jp" }, k.comp),
              h("div", { class: "section-label mono" }, "Mnemonic"),
              h("div", { class: "browse-detail-text italic" }, k.mnem),
            ])
          : null,
      ]);
    });
  } else if (tab === "grammar") {
    const filtered = GRAMMAR.filter(function (g) {
      if (!search) return true;
      return (
        g.jp.indexOf(search) >= 0 ||
        g.meaning.toLowerCase().indexOf(search) >= 0 ||
        g.explanation.toLowerCase().indexOf(search) >= 0
      );
    });
    listEls = filtered.map(function (g) {
      const expanded = viewState.expanded[g.id];
      return h("div", { class: "browse-item" + (expanded ? " expanded" : "") }, [
        h("button", {
          class: "browse-row",
          onClick: function () {
            viewState.expanded[g.id] = !expanded;
            render();
          },
        }, [
          h("div", { class: "browse-row-left" }, [
            statusBadge(g.id),
            h("span", { class: "browse-jp jp" }, g.jp),
          ]),
          h("span", { class: "browse-en" }, g.meaning),
        ]),
        expanded
          ? h("div", { class: "browse-detail" }, [
              h("div", { class: "section-label mono" }, "Explanation"),
              h("div", { class: "browse-detail-text" }, g.explanation),
              h("div", { class: "section-label mono" }, "Example"),
              h("div", { class: "browse-detail-text jp" }, g.ex),
            ])
          : null,
      ]);
    });
  } else if (tab === "reading") {
    listEls = READINGS.map(function (r, i) {
      const expanded = viewState.expanded[r.id];
      const done = (state.readingsDone || []).indexOf(r.id) >= 0;
      return h("div", { class: "browse-item reading-item" + (expanded ? " expanded" : "") }, [
        h("button", {
          class: "browse-row",
          onClick: function () {
            viewState.expanded[r.id] = !expanded;
            render();
          },
        }, [
          h("div", { class: "browse-row-left" }, [
            h("span", { class: done ? "badge mastered mono" : "badge new mono" }, done ? "✓" : (i + 1)),
            h("span", { class: "browse-jp jp" }, r.title),
          ]),
          h("span", { class: "browse-en italic muted" }, r.title_en),
        ]),
        expanded
          ? h("div", { class: "browse-detail" }, [
              h("div", { class: "section-label mono" }, "Passage"),
              h("div", { class: "passage-text jp" }, r.passage),
              h("div", { class: "section-label mono", style: "margin-top:16px" }, "Questions & Answers"),
              h("div", null, r.questions.map(function (q, qi) {
                return h("div", { class: "qa-block" }, [
                  h("div", { class: "qa-q jp" }, (qi + 1) + ". " + q.q),
                  h("div", null, q.options.map(function (opt, oi) {
                    return h("div", {
                      class: "qa-opt jp" + (oi === q.a ? " correct" : ""),
                    }, [
                      h("span", { class: "mono opt-letter" }, String.fromCharCode(65 + oi)),
                      opt,
                      oi === q.a ? h("span", { class: "qa-mark mono" }, " ✓") : null,
                    ]);
                  })),
                ]);
              })),
            ])
          : null,
      ]);
    });
  }

  const right = h("button", {
    class: "footer-link mono",
    onClick: function () { setView("dashboard"); },
  }, "← Back");

  return shell([
    header("Browse all items", "目録", right),
    tabBar,
    tab === "reading" ? null : searchInput,
    h("div", { class: "browse-list" }, listEls.length > 0
      ? listEls
      : [h("div", { class: "muted-italic" }, "No matches.")]),
  ]);
}


/* ============================================================
   BOOT
   ============================================================ */

function boot() {
  try {
    state = loadState();
    if (state) {
      view = state.diagnosticDone ? "dashboard" : "diagnostic";
    } else {
      view = "onboarding";
    }
    render();
  } catch (err) {
    showError(err);
  }
}

window.addEventListener("DOMContentLoaded", boot);

</script>
</body>
</html>
