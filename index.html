<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F5F1E8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="JLPT N3">
<title>JLPT N3 Beta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Reset + base */
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: #F5F1E8;
  color: #1A1A1A;
  font-family: 'Fraunces', Georgia, serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}
body { overscroll-behavior-y: contain; min-height: 100vh; }
button { touch-action: manipulation; cursor: pointer; font-family: inherit; }
input { font-family: inherit; }

.jp { font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif; }
.mono { font-family: 'JetBrains Mono', Menlo, Consolas, monospace; }
.muted { color: #8B8178; }
.italic { font-style: italic; }
.center { text-align: center; }
.full { width: 100%; }

/* Loading */
.loading {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: #8B8178;
  padding-top: 128px;
}

/* Layout shells */
.shell { min-height: 100vh; padding: 32px 0; }
.container { max-width: 672px; margin: 0 auto; padding: 0 24px; }

/* Headers */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid #D9D0BC;
}
.header-subtitle {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: #8B8178;
  margin-bottom: 4px;
}
.header-title {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0;
  line-height: 1.2;
}
.header-right {
  text-align: right;
}
.header-right .status-good { font-size: 11px; color: #4A7C3A; letter-spacing: 0.2em; font-weight: 500; }
.header-right .status-warn { font-size: 11px; color: #C47E1F; letter-spacing: 0.2em; font-weight: 500; }
.header-right .status-bad  { font-size: 11px; color: #B33A3A; letter-spacing: 0.2em; font-weight: 500; }
.header-projlabel {
  font-size: 11px;
  color: #8B8178;
  margin-top: 4px;
}
.header-en { font-size: 11px; color: #8B8178; font-style: italic; }

/* Cards */
.card {
  padding: 24px;
  margin-bottom: 16px;
}
.card.small { padding: 16px; }
.surface { background: #EDE7D8; }
.border { border: 1px solid #D9D0BC; }

.card-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #8B8178;
  margin-bottom: 16px;
}
.card-label-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
}
.card-label-row .card-label { margin-bottom: 0; }
.card-counter { font-size: 11px; color: #8B8178; }

/* Stat rows */
.stat-row {
  display: flex;
  align-items: baseline;
  gap: 32px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.stat-num {
  font-size: 36px;
  font-weight: 300;
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: #8B8178;
  margin-top: 4px;
  letter-spacing: 0.1em;
}
.big-num {
  font-size: 56px;
  font-weight: 300;
  margin-bottom: 8px;
  line-height: 1;
}
.stat-big { font-size: 36px; font-weight: 300; margin-top: 8px; line-height: 1; }
.type-num { font-size: 24px; font-weight: 300; margin-top: 4px; line-height: 1; }
.type-num .small { font-size: 14px; }

/* Buttons */
.btn-primary {
  display: block;
  width: 100%;
  padding: 16px 24px;
  background: #B33A3A;
  color: white;
  border: none;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { opacity: 0.8; }
.btn-primary.disabled { opacity: 0.4; pointer-events: none; }

.btn-secondary {
  display: block;
  width: 100%;
  padding: 14px 24px;
  background: #EDE7D8;
  color: #1A1A1A;
  border: 1px solid #D9D0BC;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: border-color 0.15s;
}
.btn-secondary:hover { border-color: #B33A3A; }
.btn-secondary.reveal { padding: 16px 24px; }

.btn-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.btn-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.btn-rate {
  padding: 16px 8px;
  background: transparent;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  border: 1px solid;
  transition: all 0.15s;
}
.btn-rate.again { color: #B33A3A; border-color: #B33A3A; }
.btn-rate.again:hover { background: #B33A3A; color: white; }
.btn-rate.hard { color: #C47E1F; border-color: #C47E1F; }
.btn-rate.hard:hover { background: #C47E1F; color: white; }
.btn-rate.good { color: #4A7C3A; border-color: #4A7C3A; }
.btn-rate.good:hover { background: #4A7C3A; color: white; }
.btn-rate.easy { color: #3A5A7C; border-color: #3A5A7C; }
.btn-rate.easy:hover { background: #3A5A7C; color: white; }

/* Onboarding */
.onb-hero { padding-top: 64px; }
.tag-accent {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: #B33A3A;
  margin-bottom: 16px;
}
.onb-title {
  font-size: 48px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0 0 8px 0;
}
.onb-subtitle {
  font-size: 24px;
  font-weight: 300;
  margin: 0 0 48px 0;
}
.onb-lead {
  font-size: 18px;
  line-height: 1.6;
  color: #8B8178;
  margin: 0 0 8px 0;
  max-width: 28em;
}
.onb-note {
  font-size: 14px;
  line-height: 1.6;
  color: #8B8178;
  margin: 0 0 48px 0;
  max-width: 28em;
}

/* Form fields */
.label {
  display: block;
  font-size: 12px;
  color: #8B8178;
  margin-bottom: 8px;
}
.input {
  width: 100%;
  padding: 12px 16px;
  background: #EDE7D8;
  border: 1px solid #D9D0BC;
  font-size: 16px;
  font-family: 'Fraunces', serif;
  color: #1A1A1A;
  outline: none;
}
.input:focus { border-color: #B33A3A; }
.field-help {
  font-size: 11px;
  color: #8B8178;
  font-style: italic;
  margin-top: 8px;
}

.minute-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.minute-btn {
  padding: 12px 8px;
  background: #EDE7D8;
  border: 1px solid #D9D0BC;
  font-size: 12px;
  transition: all 0.15s;
  color: #1A1A1A;
}
.minute-btn:hover { border-color: #B33A3A; }
.minute-btn.selected {
  background: #B33A3A;
  color: white;
  border-color: #B33A3A;
}

/* Diagnostic */
.diag-card {
  min-height: 240px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.card-type {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #8B8178;
  margin-bottom: 16px;
}
.diag-vocab { font-size: 48px; margin-bottom: 12px; text-align: center; }
.diag-reading { font-size: 14px; color: #8B8178; text-align: center; }
.diag-kanji { font-size: 96px; text-align: center; }
.diag-grammar { font-size: 28px; text-align: center; }
.diag-answer-section {
  border-top: 1px solid #D9D0BC;
  padding-top: 16px;
  margin-top: 20px;
  width: 100%;
}
.diag-meaning {
  text-align: center;
  font-size: 18px;
  font-style: italic;
  margin-bottom: 12px;
}
.diag-onkun {
  text-align: center;
  font-size: 13px;
  color: #8B8178;
  margin-bottom: 12px;
}
.diag-example {
  text-align: center;
  font-size: 15px;
  margin-top: 8px;
}
.diag-explanation {
  text-align: left;
  font-size: 13px;
  line-height: 1.6;
  margin-top: 8px;
  color: #1A1A1A;
}
.diag-rated-tag {
  display: inline-block;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.15em;
  padding: 4px 10px;
  border: 1px solid;
  margin-top: 8px;
}
.diag-rated-tag.unknown { color: #B33A3A; border-color: #B33A3A; }
.diag-rated-tag.partial { color: #C47E1F; border-color: #C47E1F; }
.diag-rated-tag.known   { color: #4A7C3A; border-color: #4A7C3A; }
.diag-exit-row {
  display: flex;
  justify-content: center;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid #D9D0BC;
}
.diag-results {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  text-align: center;
  gap: 16px;
  margin-top: 16px;
}
.diag-num { font-size: 36px; font-weight: 300; line-height: 1; }
.diag-label {
  font-size: 11px;
  color: #8B8178;
  margin-top: 4px;
  letter-spacing: 0.1em;
}
.diag-note {
  color: #8B8178;
  font-size: 13px;
  font-style: italic;
  margin-top: 24px;
  text-align: center;
  line-height: 1.6;
}
.diag-help {
  font-size: 11px;
  color: #8B8178;
  text-align: center;
  letter-spacing: 0.1em;
  margin-top: 12px;
  line-height: 1.6;
}
.diag-score-big {
  text-align: center;
  font-size: 56px;
  font-weight: 300;
  line-height: 1;
  color: #B33A3A;
}
.diag-score-sub {
  text-align: center;
  font-size: 11px;
  color: #8B8178;
  letter-spacing: 0.2em;
  margin-top: 8px;
}

/* MCQ — multiple choice options on diagnostic */
.diag-prompt-card {
  padding: 28px 20px;
  text-align: center;
  margin-bottom: 16px;
}
.diag-prompt-card .card-type {
  font-size: 10px;
  margin-bottom: 16px;
  letter-spacing: 0.15em;
}
.mcq-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.mcq-option {
  display: flex;
  align-items: center;
  text-align: left;
  width: 100%;
  padding: 14px 16px;
  background: #EDE7D8;
  border: 1px solid #D9D0BC;
  font-size: 15px;
  font-family: 'Fraunces', serif;
  color: #1A1A1A;
  transition: all 0.15s;
  line-height: 1.4;
}
.mcq-option:hover { border-color: #B33A3A; background: #F5F1E8; }
.mcq-option.correct {
  background: #E8F4E0;
  border-color: #4A7C3A;
  color: #1A1A1A;
}
.mcq-option.wrong {
  background: #FBE8E5;
  border-color: #B33A3A;
  color: #1A1A1A;
}
.mcq-option.other {
  opacity: 0.4;
  pointer-events: none;
}
.mcq-letter {
  display: inline-block;
  font-size: 11px;
  margin-right: 14px;
  color: #8B8178;
  letter-spacing: 0.1em;
  min-width: 16px;
  flex-shrink: 0;
}
.mcq-text {
  flex: 1;
}
.mcq-mark {
  margin-left: 12px;
  font-size: 16px;
  color: #4A7C3A;
  font-weight: bold;
}
.mcq-mark.wrong { color: #B33A3A; }

/* Feedback box after picking */
.diag-feedback {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  font-size: 14px;
  margin-bottom: 12px;
  border: 1px solid;
}
.diag-feedback.good {
  background: #E8F4E0;
  border-color: #4A7C3A;
  color: #2D5A1F;
}
.diag-feedback.bad {
  background: #FBE8E5;
  border-color: #B33A3A;
  color: #7A1F1F;
}
.feedback-icon {
  font-size: 22px;
  margin-right: 12px;
  font-weight: bold;
}
.feedback-text {
  flex: 1;
}

/* Detail card shown after revealing */
.diag-detail-card {
  padding: 16px;
  margin-bottom: 16px;
}

/* Progress bar */
.progress-section { margin-bottom: 24px; }
.progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.progress-bg {
  height: 8px;
  background: #EDE7D8;
  position: relative;
}
.progress-fill {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  background: #B33A3A;
  transition: width 0.3s;
}

/* Breakdown grid */
.breakdown-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

/* Footer */
.footer-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding-top: 24px;
  border-top: 1px solid #D9D0BC;
}
.spacer { flex: 1; }
.footer-link {
  background: none;
  border: none;
  padding: 0;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #8B8178;
  transition: color 0.15s;
}
.footer-link:hover { color: #1A1A1A; }
.footer-link.danger:hover { color: #B33A3A; }

/* Study session */
.study-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.study-kind {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #8B8178;
}
.study-counter { font-size: 11px; color: #8B8178; }
.study-progress {
  height: 2px;
  background: #EDE7D8;
  position: relative;
  margin-bottom: 32px;
}
.study-progress-fill {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  background: #B33A3A;
  transition: width 0.3s;
}
.study-card {
  min-height: 320px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  margin-bottom: 16px;
}
.card-jp-large { font-size: 56px; text-align: center; margin-bottom: 16px; font-weight: 500; }
.card-jp-huge { font-size: 96px; text-align: center; margin-bottom: 16px; font-weight: 500; line-height: 1; }
.card-jp-medium { font-size: 36px; text-align: center; margin-bottom: 16px; font-weight: 500; }
.card-reading { font-size: 18px; color: #8B8178; text-align: center; margin-bottom: 8px; }
.card-meaning {
  text-align: center;
  font-size: 18px;
  margin-bottom: 16px;
  font-style: italic;
}
.card-onkun {
  font-size: 13px;
  color: #8B8178;
  text-align: center;
  margin-bottom: 16px;
}
.card-section {
  border-top: 1px solid #D9D0BC;
  padding-top: 16px;
  margin-top: 8px;
}
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #8B8178;
  margin-bottom: 6px;
}
.section-text {
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 12px;
}
.card-example { font-size: 16px; }

.exit-row { margin-top: 32px; display: flex; justify-content: flex-end; }
.muted-italic {
  color: #8B8178;
  font-style: italic;
  text-align: center;
  padding: 12px 0;
  font-size: 14px;
}

/* Reading */
.passage { padding: 32px; }
.passage-text { font-size: 16px; line-height: 2.2; }
.questions-list { display: flex; flex-direction: column; gap: 24px; }
.question { padding: 20px; }
.question-text { font-size: 16px; margin-bottom: 16px; font-weight: 500; }
.options { display: flex; flex-direction: column; gap: 8px; }
.option-btn {
  width: 100%;
  text-align: left;
  padding: 12px 16px;
  background: #F5F1E8;
  border: 1px solid #D9D0BC;
  font-size: 14px;
  transition: all 0.15s;
  color: #1A1A1A;
}
.option-btn:hover { border-color: #B33A3A; }
.option-btn.selected {
  background: #B33A3A;
  color: white;
  border-color: #B33A3A;
}
.opt-letter { font-size: 11px; margin-right: 12px; }
.check-btn { margin-top: 24px; }
.results-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
.result-card {
  border: 1px solid;
  padding: 16px;
}
.result-card.right { border-color: #4A7C3A; }
.result-card.wrong { border-color: #B33A3A; }
.result-q { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.result-you { font-size: 11px; color: #8B8178; }
.result-correct { font-size: 11px; color: #4A7C3A; margin-top: 4px; }

/* Progress page */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.section-block { margin-bottom: 32px; }
.section-heading {
  font-size: 11px;
  color: #8B8178;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 16px;
}
.breakdown-row { padding: 16px; margin-bottom: 8px; }
.breakdown-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.breakdown-type {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 500;
}
.stack-bar {
  height: 6px;
  background: #F5F1E8;
  position: relative;
  margin-bottom: 8px;
}
.stack-mastered {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  background: #4A7C3A;
}
.stack-review {
  position: absolute;
  top: 0;
  bottom: 0;
  background: #C47E1F;
}
.stack-learning {
  position: absolute;
  top: 0;
  bottom: 0;
  background: #B33A3A;
}
.breakdown-legend {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: #8B8178;
}
.reading-summary { margin-bottom: 24px; }
.reading-summary > div:last-child { font-size: 14px; }
.beta-notes {
  border-top: 1px solid #D9D0BC;
  padding-top: 24px;
}
.beta-notes p {
  font-size: 13px;
  line-height: 1.6;
  margin: 0;
}

/* Top banner: JLPT badge + streak */
.top-banner {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.jlpt-badge {
  display: inline-block;
  padding: 6px 12px;
  background: #1A1A1A;
  color: #F5F1E8;
  font-size: 11px;
  letter-spacing: 0.2em;
}
.streak-pill {
  display: inline-block;
  padding: 6px 12px;
  background: #FFF3E0;
  color: #C47E1F;
  border: 1px solid #C47E1F;
  font-size: 11px;
  letter-spacing: 0.15em;
}

/* Section selector */
.section-selector {
  margin-bottom: 24px;
}
.section-label-mini {
  font-size: 10px;
  color: #8B8178;
  letter-spacing: 0.2em;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.section-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.section-btn {
  padding: 10px 4px;
  background: #EDE7D8;
  border: 1px solid #D9D0BC;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: #1A1A1A;
  transition: all 0.15s;
}
.section-btn:hover { border-color: #B33A3A; }
.section-btn.active {
  background: #B33A3A;
  color: white;
  border-color: #B33A3A;
}
/* Category colors override the active state for each section */
.section-btn.active.section-vocab   { background: #B85C3C; border-color: #B85C3C; }
.section-btn.active.section-kanji   { background: #2E4A7C; border-color: #2E4A7C; }
.section-btn.active.section-grammar { background: #2D6B5A; border-color: #2D6B5A; }
.section-btn.section-vocab:hover   { border-color: #B85C3C; }

/* ============================================================
   COLOR PSYCHOLOGY: each study mode has a consistent hue.
   Research (Wichmann 2002, Lewandowsky 1989) shows color-coded
   categories aid recall. Hues chosen for distinguishability on
   the warm cream background:
     vocab   → rust / terracotta (warm, social, practical)
     kanji   → deep indigo (reflective, structural)
     grammar → forest teal (calm, pattern-recognition)
     reading → muted plum (narrative, comprehension)
   Vermillion stays as the universal error color.
   ============================================================ */

.type-vocab-text   { color: #B85C3C !important; }
.type-kanji-text   { color: #2E4A7C !important; }
.type-grammar-text { color: #2D6B5A !important; }

.study-card.type-grammar { border-top: 3px solid #2D6B5A; }

/* ====== INU-SENSEI MASCOT & DIALOGUE BUBBLE ====== */
.sensei-block {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 0 0 20px 0;
  padding: 14px;
  background: #EDE7D8;
  border: 1px solid #D9D0BC;
  border-radius: 4px;
  position: relative;
}
.inu-sensei {
  flex-shrink: 0;
  filter: drop-shadow(0 2px 4px rgba(26, 26, 26, 0.08));
}
.sensei-bubble {
  flex: 1;
  background: #F5F1E8;
  border: 1px solid #C8C2B5;
  border-radius: 4px;
  padding: 10px 14px;
  position: relative;
  min-width: 0;
}
.sensei-bubble::before {
  content: "";
  position: absolute;
  left: -7px;
  top: 50%;
  transform: translateY(-50%);
  width: 0;
  height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-right: 7px solid #C8C2B5;
}
.sensei-bubble::after {
  content: "";
  position: absolute;
  left: -5px;
  top: 50%;
  transform: translateY(-50%);
  width: 0;
  height: 0;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  border-right: 6px solid #F5F1E8;
}
.sensei-jp {
  font-size: 17px;
  font-weight: 500;
  color: #1A1A1A;
  line-height: 1.3;
}

  color: #8B8178;
  margin-top: 2px;
  letter-spacing: 0.02em;
}

  font-style: italic;

  margin-top: 4px;
  line-height: 1.4;
}

}

/* ====== STAGE SELECT GRID ====== */
.stage-select-heading {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #8B8178;
  text-transform: uppercase;
  margin: 16px 0 10px 0;
}
.stage-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.stage-card {
  display: block;
  width: 100%;
  text-align: left;
  padding: 14px 16px;
  background: #F2E4D2;
  border: 1.5px solid #D9C9B0;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  color: inherit;
  font-family: inherit;
  letter-spacing: normal;
}
.stage-card:hover:not(:disabled) {
  border-color: #C47E1F;
  transform: translateY(-1px);
  box-shadow: 0 3px 8px rgba(196, 126, 31, 0.15);
}
.stage-card.cleared {
  background: #E4EEE2;
  border-color: #7A9870;
}
.stage-card.cleared:hover {

}
.stage-card.locked {
  background: #EFEAD9;
  border-color: #D9D0BC;
  opacity: 0.55;
  cursor: not-allowed;
  filter: saturate(0.4);
}
.stage-row {

  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.stage-label-block { display: flex; flex-direction: column; }
.stage-name {
  font-size: 15px;
  font-weight: 600;

  letter-spacing: 0.02em;
}
.stage-jp {
  font-size: 13px;

  margin-top: 2px;
}
.stage-meta {

  gap: 8px;
  font-size: 11px;
}
.stage-pairs {
  color: #5C5346;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}
.stage-checkmark {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #7A9870;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;

}

.stage-desc {

  color: #5C5346;

.stage-stats {

/* Trial stages — golden tint */

}

}
.stage-card.trial.cleared {

.stage-icon {

}

/* Endless stages — deep ink + sage */

}

/* Trial result banner on win screen */
.trial-result {
  margin: 8px 0 12px 0;
  padding: 10px 14px;

}
.trial-result.failed {

}
.trial-result-text { flex: 1; }

/* ====== PAIR MATCH GRID (4-column, mixed JP+EN, square tiles) ====== */
.pair-grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}

.pair-tile {
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 6px 4px;
  border: 2px solid transparent;
  border-radius: 8px;
  font-family: inherit;
  color: #1A1A1A;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s, border-color 0.1s, background-color 0.1s;
  position: relative;
  box-shadow: 0 1px 2px rgba(26, 26, 26, 0.06);
  overflow: hidden;
}

/* Warm peach for Japanese tiles, cool sage for English. Maintains scannability even when mixed. */
.pair-tile-jp {
  background: #F2E4D2;
  border-color: #DDC9AC;
}
.pair-tile-en {
  background: #E4EEE2;
  border-color: #C1D4BD;
}

.pair-tile:hover {
  transform: translateY(-1px);
  box-shadow: 0 3px 6px rgba(26, 26, 26, 0.12);
}
.pair-tile-jp:hover { border-color: #B85C3C; }
.pair-tile-en:hover { border-color: #2D6B5A; }

.pair-tile.selected {
  border-color: #1A1A1A;
  box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.18), 0 4px 10px rgba(26, 26, 26, 0.15);
  transform: translateY(-2px) scale(1.03);
  z-index: 2;
}
.pair-tile-jp.selected { background: #F8EBD9; }
.pair-tile-en.selected { background: #EAF4E7; }

.pair-tile.matched {
  cursor: default;
  pointer-events: none;
  /* Desaturated grey tone so matched tiles fade into background */
  border-color: #C8C2B5 !important;
  background: #EFEAD9 !important;
  box-shadow: none;
  opacity: 0.5;
  filter: saturate(0.3);
}
.pair-tile.matched .tile-jp-main,
.pair-tile.matched .tile-jp-sub,
.pair-tile.matched .tile-en-main {
  color: #8B8178 !important;
}
/* The pair number badge keeps its hue so you can still trace pairs */
.pair-tile.matched .tile-pair-num {
  opacity: 0.9;
}

.pair-tile.match-flash {
  animation: tile-match-pulse 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 5;
}
.pair-tile.match-flash::after {
  /* sparkle burst overlay */
  content: "✦";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 32px;
  color: #C47E1F;
  opacity: 0;
  pointer-events: none;
  animation: sparkle-burst 0.7s ease-out;
}
.pair-tile.miss-flash {
  animation: tile-miss-shake 0.5s ease;
  background: #FBE8E5 !important;
  border-color: #B33A3A !important;
}
@keyframes tile-match-pulse {
  0%   { transform: scale(1); }
  25%  { transform: scale(1.18); box-shadow: 0 0 0 8px rgba(74, 124, 58, 0.35), 0 6px 18px rgba(74, 124, 58, 0.3); }
  55%  { transform: scale(0.96); box-shadow: 0 0 0 20px rgba(74, 124, 58, 0); }
  100% { transform: scale(1); }
}
@keyframes sparkle-burst {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(0deg); }
  30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(180deg); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.4) rotate(360deg); }
}
@keyframes tile-miss-shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-5px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Tile entrance animation — staggered pop-in when game starts */
.pair-tile {
  animation: tile-enter 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes tile-enter {
  0%   { opacity: 0; transform: scale(0.5) translateY(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
/* stagger entrance via nth-child */
.pair-tile:nth-child(1)  { animation-delay: 0.00s; }
.pair-tile:nth-child(2)  { animation-delay: 0.04s; }
.pair-tile:nth-child(3)  { animation-delay: 0.08s; }
.pair-tile:nth-child(4)  { animation-delay: 0.12s; }
.pair-tile:nth-child(5)  { animation-delay: 0.16s; }
.pair-tile:nth-child(6)  { animation-delay: 0.20s; }
.pair-tile:nth-child(7)  { animation-delay: 0.24s; }
.pair-tile:nth-child(8)  { animation-delay: 0.28s; }
.pair-tile:nth-child(9)  { animation-delay: 0.32s; }
.pair-tile:nth-child(10) { animation-delay: 0.36s; }
.pair-tile:nth-child(11) { animation-delay: 0.40s; }
.pair-tile:nth-child(12) { animation-delay: 0.44s; }
.pair-tile:nth-child(13) { animation-delay: 0.48s; }
.pair-tile:nth-child(14) { animation-delay: 0.52s; }
.pair-tile:nth-child(15) { animation-delay: 0.56s; }
.pair-tile:nth-child(16) { animation-delay: 0.60s; }
.pair-tile:nth-child(17) { animation-delay: 0.64s; }
.pair-tile:nth-child(18) { animation-delay: 0.68s; }
.pair-tile:nth-child(19) { animation-delay: 0.72s; }
.pair-tile:nth-child(20) { animation-delay: 0.76s; }
.pair-tile:nth-child(n+21) { animation-delay: 0.80s; }
/* Disable entrance animation after game has started (so re-renders don't re-trigger) */
.pair-grid-4.no-entrance .pair-tile { animation: none; }

/* Selected tile — stronger pulse to "call" for its pair */
.pair-tile.selected {
  animation: tile-selected-pulse 1s ease-in-out infinite;
  z-index: 4;
}
@keyframes tile-selected-pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(196, 126, 31, 0.5); }
  50%      { transform: scale(1.04); box-shadow: 0 0 0 8px rgba(196, 126, 31, 0); }
}

/* ====== SCORE POP-UP ("+50!" flying up from matched pair) ====== */
.score-popup {
  position: absolute;
  font-family: 'JetBrains Mono', monospace;
  font-weight: bold;
  font-size: 20px;
  color: #4A7C3A;
  pointer-events: none;
  z-index: 100;
  animation: score-fly 1.1s ease-out forwards;
  text-shadow: 0 1px 3px rgba(255, 255, 255, 0.9), 0 0 8px rgba(255, 255, 255, 0.6);
  letter-spacing: 0.05em;
}
.score-popup.combo {
  color: #C47E1F;
  font-size: 24px;
  text-shadow: 0 1px 3px rgba(255, 255, 255, 0.9), 0 0 12px rgba(196, 126, 31, 0.4);
}
.score-popup.combo-big {
  color: #B33A3A;
  font-size: 28px;
  text-shadow: 0 1px 3px rgba(255, 255, 255, 0.9), 0 0 16px rgba(179, 58, 58, 0.5);
}
@keyframes score-fly {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  20%  { opacity: 1; transform: translate(-50%, -100%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -200%) scale(0.9); }
}

/* ====== CONFETTI for stage clear ====== */
.confetti-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -20px;
  width: 9px;
  height: 14px;
  opacity: 0.9;
  animation: confetti-fall 2.6s linear forwards;
}
@keyframes confetti-fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0.8; }
}

/* ====== SENSEI IDLE BOB ====== */
.inu-sensei {
  animation: sensei-bob 3s ease-in-out infinite;
}
@keyframes sensei-bob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}
/* Sensei on win screen does a happy hop */
.match-win .inu-sensei {
  animation: sensei-hop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1, sensei-bob 3s ease-in-out infinite 0.8s;
}
@keyframes sensei-hop {
  0%   { transform: translateY(0) scale(1); }
  40%  { transform: translateY(-18px) scale(1.05); }
  70%  { transform: translateY(-6px) scale(0.98); }
  100% { transform: translateY(0) scale(1); }
}

/* Tile content */
.tile-jp-main {
  font-size: 19px;
  font-weight: 500;
  line-height: 1.15;
  max-width: 100%;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-all;
}
/* Shrink longer Japanese strings (most often grammar patterns like 〜なければならない) */
.tile-jp-main.long {
  font-size: 14px;
  line-height: 1.2;
  -webkit-line-clamp: 3;
  line-clamp: 3;
}
.tile-jp-main.very-long {
  font-size: 12px;
  line-height: 1.2;
  -webkit-line-clamp: 3;
  line-clamp: 3;
}
.tile-jp-sub {
  font-size: 10px;
  color: #6B5F4F;
  margin-top: 3px;
  line-height: 1.15;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.tile-en-main {
  font-size: 12px;
  line-height: 1.25;
  font-style: italic;
  color: #2A3A2A;
  word-break: break-word;
  hyphens: auto;
  max-width: 100%;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Numbered pair badge on matched tiles */
.tile-pair-num {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: hsl(var(--pair-hue), 50%, 30%);
  color: white;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

/* Awaiting glow on opposite-face tiles when one side selected */
.pair-grid-4.awaiting-en .pair-tile-en:not(.matched) {
  animation: tile-awaiting-en 1.4s ease-in-out infinite;
}
.pair-grid-4.awaiting-jp .pair-tile-jp:not(.matched) {
  animation: tile-awaiting-jp 1.4s ease-in-out infinite;
}
@keyframes tile-awaiting-en {
  0%, 100% { border-color: #C1D4BD; }
  50%      { border-color: #6B9F5A; }
}
@keyframes tile-awaiting-jp {
  0%, 100% { border-color: #DDC9AC; }
  50%      { border-color: #B85C3C; }
}

/* Combo streak badge */
.combo-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  background: #FFF3E0;

const GRAMMAR = [
  { id: "g1", jp: "〜ばかり", meaning: "just did / only", explanation: "After た-form: just did. After noun/dict form: only.", ex: "食べたばかりだ。", ex_en: "I just ate.", mnem: "BA-KA-RI = bag-already-full → just did / only that", efreq: 9, gfreq: 8, pre: 6 },
  { id: "g2", jp: "〜わけだ", meaning: "that's why / naturally", explanation: "Logical conclusion based on reason or evidence.", ex: "寒いわけだ、窓が開いている。", ex_en: "No wonder it's cold — the window is open.", mnem: "WAKE = wake-up-realize → that's why!", efreq: 9, gfreq: 7, pre: 6 },
  { id: "g3", jp: "〜ことになる", meaning: "it is decided that", explanation: "External or passive decision — arranged.", ex: "転勤することになった。", ex_en: "It's been decided I'll transfer (jobs).", mnem: "事になる = matter just becomes (passive — someone else decided)", efreq: 9, gfreq: 8, pre: 6 },
  { id: "g4", jp: "〜ことにする", meaning: "decide to (active)", explanation: "Speaker's own active decision.", ex: "毎日勉強することにした。", ex_en: "I've decided to study every day.", mnem: "事にする = make it a matter (active — I decided)", efreq: 9, gfreq: 8, pre: 6 },
  { id: "g5", jp: "〜ようになる", meaning: "come to / start to", explanation: "Change of state — gradually becoming able.", ex: "刺身が食べられるようになった。", ex_en: "I've come to be able to eat sashimi.", mnem: "ようになる = the WAY becomes (gradual change)", efreq: 9, gfreq: 8, pre: 6 },
  { id: "g6", jp: "〜ようにする", meaning: "try to / make sure", explanation: "Conscious effort to make something happen.", ex: "毎日運動するようにしている。", ex_en: "I try to exercise every day.", mnem: "ようにする = make it the way (active effort to habituate)", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g7", jp: "〜ために", meaning: "for / because of", explanation: "Purpose (verb dict) or cause (past/noun).", ex: "健康のために運動する。", ex_en: "Exercise for the sake of health.", mnem: "TAME = for the sake of (purpose) or because of (cause)", efreq: 9, gfreq: 9, pre: 6 },
  { id: "g8", jp: "〜はずだ", meaning: "should be / supposed to", explanation: "Expectation based on reason.", ex: "彼は今日来るはずだ。", ex_en: "He's supposed to come today.", mnem: "HAZU = expectation; 'he-hazu come' = should be coming", efreq: 9, gfreq: 9, pre: 6 },
  { id: "g9", jp: "〜かもしれない", meaning: "might / may", explanation: "Possibility.", ex: "雨が降るかもしれない。", ex_en: "It might rain.", mnem: "KAMO = duck appearing — maybe, maybe not", efreq: 8, gfreq: 9, pre: 5 },
  { id: "g10", jp: "〜らしい", meaning: "seems / I heard", explanation: "Hearsay or strong inference.", ex: "彼は結婚したらしい。", ex_en: "Apparently he got married.", mnem: "RASHII = sounds-like-it; secondhand or strong inference", efreq: 9, gfreq: 8, pre: 6 },
  { id: "g11", jp: "〜まま", meaning: "as is / unchanged", explanation: "State continues without change.", ex: "エアコンをつけたまま寝た。", ex_en: "I slept with the AC on.", mnem: "MAMA = stays the SAME way", efreq: 8, gfreq: 7, pre: 5 },
  { id: "g12", jp: "〜うちに", meaning: "while / before", explanation: "While condition lasts, or before it ends.", ex: "明るいうちに帰ろう。", ex_en: "Let's go home while it's still light.", mnem: "UCHI = inside the time-window (while it lasts)", efreq: 8, gfreq: 7, pre: 5 },
  { id: "g13", jp: "〜ように", meaning: "so that / like", explanation: "Purpose or simile.", ex: "聞こえるように大きな声で話す。", ex_en: "Speak loudly so it can be heard.", mnem: "よう = aim for that WAY to happen", efreq: 9, gfreq: 8, pre: 6 },
  { id: "g14", jp: "〜ながら", meaning: "while (doing)", explanation: "Simultaneous actions, same subject.", ex: "音楽を聞きながら勉強する。", ex_en: "Study while listening to music.", mnem: "NAGARA = nothing-stops, both at once", efreq: 8, gfreq: 9, pre: 5 },
  { id: "g15", jp: "〜てしまう", meaning: "completion / regret", explanation: "Completed with nuance of finality/regret.", ex: "全部食べてしまった。", ex_en: "I ate it all (oops).", mnem: "SHIMAU = put away (done & gone, often regret)", efreq: 9, gfreq: 9, pre: 6 },
  { id: "g16", jp: "〜ておく", meaning: "do in advance", explanation: "Preparing for future use.", ex: "ビールを冷やしておく。", ex_en: "Chill the beer in advance.", mnem: "OKU = place/leave it ready in advance", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g17", jp: "〜てみる", meaning: "try doing", explanation: "Attempt to see.", ex: "新しい店に行ってみた。", ex_en: "I tried going to the new shop.", mnem: "MIRU = see/try and see what happens", efreq: 8, gfreq: 9, pre: 5 },
  { id: "g18", jp: "〜ば〜ほど", meaning: "the more...the more", explanation: "Correlation.", ex: "考えれば考えるほど分からなくなる。", ex_en: "The more I think, the less I understand.", mnem: "if-then a HOARD more — proportional", efreq: 8, gfreq: 7, pre: 5 },
  { id: "g19", jp: "〜代わりに", meaning: "instead of", explanation: "Substitution or trade-off.", ex: "手紙の代わりにメールを送る。", ex_en: "Send an email instead of a letter.", mnem: "代 = substitute generation (instead of)", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g20", jp: "〜つもりだ", meaning: "intend to", explanation: "Speaker's intention.", ex: "来年留学するつもりだ。", ex_en: "I intend to study abroad next year.", mnem: "TSUMORI = my plan; I plan to…", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g21", jp: "〜たことがある", meaning: "have experienced", explanation: "Past experience.", ex: "富士山に登ったことがある。", ex_en: "I've climbed Mt. Fuji.", mnem: "事がある = there exists a matter of having done", efreq: 7, gfreq: 9, pre: 5 },

  { id: "g24", jp: "〜によって", meaning: "depending on / by", explanation: "Variation by, agent of.", ex: "国によって習慣が違う。", ex_en: "Customs differ depending on the country.", mnem: "より-って = depends on / by means of agent", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g25", jp: "〜について", meaning: "about / regarding", explanation: "Topic of discussion.", ex: "環境問題について話す。", ex_en: "Talk about environmental issues.", mnem: "ついて = stuck on / attached to topic", efreq: 9, gfreq: 9, pre: 6 },
  { id: "g26", jp: "〜なければならない", meaning: "must / have to", explanation: "Obligation. Also: 〜なくてはいけない.", ex: "明日までに終わらせなければならない。", ex_en: "I must finish it by tomorrow.", mnem: "must: 'if-not, won't-become' = mandatory", efreq: 9, gfreq: 9, pre: 6 },
  { id: "g27", jp: "〜なくてもいい", meaning: "don't have to", explanation: "Not required.", ex: "急がなくてもいい。", ex_en: "You don't have to hurry.", mnem: "even without doing, it's fine — optional", efreq: 7, gfreq: 8, pre: 4 },
  { id: "g28", jp: "〜てはいけない", meaning: "must not", explanation: "Prohibition.", ex: "ここで遊んではいけない。", ex_en: "You must not play here.", mnem: "doing-it doesn't go = forbidden", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g29", jp: "〜てもいい", meaning: "may / it's okay to", explanation: "Permission.", ex: "入ってもいいですか。", ex_en: "May I come in?", mnem: "even if you do, fine — permission", efreq: 7, gfreq: 9, pre: 5 },
  { id: "g30", jp: "〜ほうがいい", meaning: "had better / should", explanation: "Advice or recommendation.", ex: "早く寝たほうがいい。", ex_en: "You should go to bed early.", mnem: "ほう = the way; this way is good = recommended", efreq: 8, gfreq: 9, pre: 5 },
  { id: "g31", jp: "〜のに", meaning: "even though / in spite of", explanation: "Unexpected contrast.", ex: "勉強したのに、テストに落ちた。", ex_en: "Even though I studied, I failed the test.", mnem: "のに = even though! (frustration vibe)", efreq: 9, gfreq: 9, pre: 6 },
  { id: "g32", jp: "〜ので", meaning: "because (soft)", explanation: "Reason. Softer than から.", ex: "雨が降っているので、行けない。", ex_en: "Because it's raining, I can't go.", mnem: "ので = the soft because (factual)", efreq: 9, gfreq: 10, pre: 6 },
  { id: "g33", jp: "〜ても", meaning: "even if", explanation: "Concession — action happens regardless.", ex: "雨が降っても行きます。", ex_en: "Even if it rains, I'll go.", mnem: "ても = even-if-do (regardless)", efreq: 8, gfreq: 9, pre: 5 },
  { id: "g34", jp: "〜すぎる", meaning: "too much", explanation: "Excess.", ex: "食べすぎた。", ex_en: "I ate too much.", mnem: "SUGI = excess; over-the-line", efreq: 8, gfreq: 9, pre: 5 },
  { id: "g35", jp: "〜やすい / 〜にくい", meaning: "easy/hard to", explanation: "Describes ease of doing.", ex: "この本は読みやすい。", ex_en: "This book is easy to read.", mnem: "YASUI = cheap-easy; NIKUI = hate-hard", efreq: 8, gfreq: 9, pre: 5 },
  { id: "g36", jp: "〜がる", meaning: "to show signs of", explanation: "Objective observation of third-person feelings.", ex: "妹が行きたがっている。", ex_en: "My sister is showing she wants to go.", mnem: "GARU = visible signs of (3rd-person feelings)", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g37", jp: "〜っぽい", meaning: "-ish / tendency", explanation: "Characteristic or tendency.", ex: "彼は怒りっぽい。", ex_en: "He's the type to get angry easily.", mnem: "POI = throws-the-feel-of (~ish)", efreq: 6, gfreq: 7, pre: 3 },
  { id: "g38", jp: "〜がち", meaning: "tends to (often negative)", explanation: "Frequent tendency, often undesirable.", ex: "最近、忘れがちだ。", ex_en: "Lately I've been forgetting things.", mnem: "GACHI = caught in habit (often unwanted)", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g39", jp: "〜気味", meaning: "feeling a bit", explanation: "Slight tendency or symptom.", ex: "風邪気味だ。", ex_en: "I'm coming down with a cold.", mnem: "KIMI = your slight feeling/symptom", efreq: 6, gfreq: 6, pre: 3 },
  { id: "g40", jp: "〜とおり / 〜どおり", meaning: "just as / exactly as", explanation: "Matches expectation or instruction.", ex: "言ったとおりにしなさい。", ex_en: "Do as I told you.", mnem: "通り = exactly the path/way told", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g41", jp: "〜に対して", meaning: "toward / against", explanation: "Attitude or action directed at.", ex: "先生に対して失礼だ。", ex_en: "It's rude toward the teacher.", mnem: "対 = against/toward (like 反対 oppose)", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g42", jp: "〜にとって", meaning: "for / from the viewpoint of", explanation: "From the perspective of.", ex: "私にとって大切な人。", ex_en: "An important person to me.", mnem: "TOTTE = grab from your viewpoint", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g43", jp: "〜に関して", meaning: "regarding / concerning", explanation: "Formal 'about'.", ex: "その件に関しては後で話します。", ex_en: "I'll talk about that matter later.", mnem: "関 = barrier/connection — regarding", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g44", jp: "〜に基づいて", meaning: "based on", explanation: "Foundation for action.", ex: "事実に基づいて判断する。", ex_en: "Judge based on the facts.", mnem: "MOTO = origin; based on this foundation", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g45", jp: "〜をもとに", meaning: "on the basis of", explanation: "Using as material or source.", ex: "実話をもとにした映画。", ex_en: "A movie based on a true story.", mnem: "MOTO = origin; using as raw material", efreq: 6, gfreq: 6, pre: 3 },
  { id: "g46", jp: "〜をきっかけに", meaning: "triggered by", explanation: "An event that started something.", ex: "事故をきっかけに転職した。", ex_en: "I changed jobs after the accident triggered it.", mnem: "KIKKAKE = the trigger spark", efreq: 6, gfreq: 6, pre: 3 },
  { id: "g47", jp: "〜たり〜たり", meaning: "do things like", explanation: "Listing non-exhaustive actions.", ex: "週末は読んだり、歩いたりする。", ex_en: "On weekends I read, walk, etc.", mnem: "TARI-TARI = listing things casually (like A, B, etc.)", efreq: 7, gfreq: 9, pre: 5 },
  { id: "g48", jp: "〜かどうか", meaning: "whether or not", explanation: "Embedded yes/no question.", ex: "行くかどうかまだ決めていない。", ex_en: "I haven't decided whether to go yet.", mnem: "KA-DOU-KA = is-it-or-isn't-it (whether)", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g49", jp: "〜ついでに", meaning: "while you're at it", explanation: "Doing something additional on the same occasion.", ex: "買い物のついでに郵便局に寄った。", ex_en: "While shopping, I stopped by the post office.", mnem: "ついで = follow-up errand (while you're at it)", efreq: 6, gfreq: 6, pre: 3 },
  { id: "g50", jp: "〜わりに", meaning: "considering / for", explanation: "Contrast with expectation.", ex: "値段のわりにおいしい。", ex_en: "It tastes good for the price.", mnem: "WARI = ratio — relative to what's expected", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g51", jp: "〜くせに", meaning: "despite (critical)", explanation: "Contrast with blame or disapproval.", ex: "知っているくせに教えてくれない。", ex_en: "You won't tell me even though you know.", mnem: "KUSE = bad habit; despite the nasty habit", efreq: 6, gfreq: 6, pre: 3 },
  { id: "g52", jp: "〜せいで", meaning: "because of (negative)", explanation: "Blaming — negative cause.", ex: "雨のせいで遅れた。", ex_en: "I'm late because of the rain.", mnem: "SEI = blame/fault (negative cause)", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g53", jp: "〜おかげで", meaning: "thanks to", explanation: "Positive cause.", ex: "先生のおかげで合格した。", ex_en: "Thanks to my teacher, I passed.", mnem: "OKAGE = honored shadow → thanks to", efreq: 7, gfreq: 8, pre: 4 },
  { id: "g54", jp: "〜としても", meaning: "even if (hypothetical)", explanation: "Hypothetical concession.", ex: "本当だとしても信じない。", ex_en: "Even if it's true, I don't believe it.", mnem: "として = even if hypothetically", efreq: 6, gfreq: 6, pre: 3 },
  { id: "g55", jp: "〜ところ", meaning: "about to / just did / in the middle of", explanation: "Tense marker for verb phase.", ex: "今、食べているところだ。", ex_en: "I'm in the middle of eating.", mnem: "TOKORO = the point/moment (about to / just / mid)", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g56", jp: "〜ばかりでなく", meaning: "not only ... but also", explanation: "Adding beyond what's stated.", ex: "彼女は頭がいいばかりでなく、優しい。", ex_en: "She's not only smart but also kind.", mnem: "not only-bag-full — even more besides", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g57", jp: "〜だけでなく", meaning: "not only ... but also", explanation: "Colloquial version of ばかりでなく.", ex: "日本語だけでなく英語も話せる。", ex_en: "She speaks not only Japanese but also English.", mnem: "DAKE = only; not-only that…", efreq: 8, gfreq: 9, pre: 5 },
  { id: "g58", jp: "〜から〜にかけて", meaning: "from ... through", explanation: "Range in time or space.", ex: "春から夏にかけて花が咲く。", ex_en: "Flowers bloom from spring through summer.", mnem: "from-one-end hooked to other end", efreq: 6, gfreq: 6, pre: 3 },
  { id: "g59", jp: "〜ながらも", meaning: "although / while still", explanation: "Contrast — doing despite.", ex: "遅くなりながらも参加した。", ex_en: "Despite running late, I participated.", mnem: "while doing… BUT contrast", efreq: 5, gfreq: 5, pre: 2 },
  { id: "g60", jp: "〜ものだ", meaning: "it's natural that / used to", explanation: "General truth or nostalgic past.", ex: "昔はよく海に行ったものだ。", ex_en: "We used to go to the sea often back then.", mnem: "MONO = the thing as a general truth / used to", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g61", jp: "〜うえに", meaning: "moreover / on top of", explanation: "Adds a second related point — 'and on top of that'.", ex: "雨が降っているうえに、寒い。", ex_en: "It's raining, and on top of that, cold.", mnem: "UE = up-on top of: extra info stacked on", efreq: 7, gfreq: 8, pre: 5 },
  { id: "g62", jp: "〜うえで", meaning: "after doing / in the process of", explanation: "After verb-た or noun の: 'after doing X' (necessary basis).", ex: "確認したうえで、決めます。", ex_en: "I'll decide after confirming.", mnem: "UE-DE = up-on the basis of doing X first", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g63", jp: "〜うえは", meaning: "now that / since", explanation: "Since (decision/condition) is set, must follow through.", ex: "やると決めたうえは、最後までやる。", ex_en: "Now that I've decided to do it, I'll see it through.", mnem: "UE-HA = up-on this commitment, must follow", efreq: 4, gfreq: 6, pre: 2 },
  { id: "g64", jp: "〜せいか", meaning: "perhaps because of", explanation: "Softer than せいで — possible (negative) cause.", ex: "疲れたせいか、眠れない。", ex_en: "Perhaps because I'm tired, I can't sleep.", mnem: "SEI-KA = fault-maybe → perhaps because", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g65", jp: "〜だけに", meaning: "precisely because / especially because", explanation: "Reinforces that effect is strong BECAUSE of the cause.", ex: "練習しただけに、上手だ。", ex_en: "It's precisely because she practiced that she's good.", mnem: "DAKE-NI = just-because: pinpoint cause for strong effect", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g66", jp: "〜だけあって", meaning: "as expected of / fitting that", explanation: "Outcome matches expectations from a notable cause.", ex: "プロだけあって、上手い。", ex_en: "As expected of a pro, he's skilled.", mnem: "DAKE-ATTE = just-being: lives up to expectations", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g67", jp: "〜あまり", meaning: "so much that / out of", explanation: "Excessive emotion/state causes the result.", ex: "驚きのあまり、声が出なかった。", ex_en: "Out of surprise, I couldn't speak.", mnem: "AMARI = too-much: extreme emotion overflows", efreq: 5, gfreq: 6, pre: 3 },
  { id: "g68", jp: "〜ばかりに", meaning: "simply because (to my regret)", explanation: "Trivial cause leads to bad outcome — regretful tone.", ex: "知らなかったばかりに、損をした。", ex_en: "Simply because I didn't know, I lost out.", mnem: "BAKARI-NI = just-because: a small thing caused regret", efreq: 5, gfreq: 6, pre: 3 },
  { id: "g69", jp: "〜から〜にかけて", meaning: "from X through Y (span)", explanation: "Range across time or place.", ex: "東京から大阪にかけて雪が降る。", ex_en: "It's snowing from Tokyo through Osaka.", mnem: "KARA-KAKETE = from→reaching: range across", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g70", jp: "〜にあたって", meaning: "on the occasion of / when (formal)", explanation: "At the time of a notable event/start.", ex: "出発にあたって、注意点を確認する。", ex_en: "Upon departure, check the precautions.", mnem: "ATATTE = hitting-the-moment of an event", efreq: 4, gfreq: 6, pre: 2 },
  { id: "g71", jp: "〜さえ", meaning: "even / as long as", explanation: "Emphasizes the minimum: 'even X' or surprising inclusion.", ex: "子供さえ知っている。", ex_en: "Even a child knows.", mnem: "SAE = say-even → even X (minimum)", efreq: 7, gfreq: 8, pre: 5 },
  { id: "g72", jp: "〜さえ〜ば", meaning: "if only / as long as", explanation: "Sufficient condition: 'as long as X, then Y'.", ex: "あなたさえいれば幸せだ。", ex_en: "As long as you're here, I'm happy.", mnem: "SAE-BA = if-only-this-one-thing", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g73", jp: "〜なら", meaning: "if it's the case of / as for", explanation: "Topic/conditional — 'if we're talking about'.", ex: "日本語ならできる。", ex_en: "If it's Japanese, I can do it.", mnem: "NARA = no-other-area: in this domain, yes", efreq: 8, gfreq: 9, pre: 7 },
  { id: "g74", jp: "〜たら", meaning: "when / if (sequential)", explanation: "Past form + ら — when X happens, then Y.", ex: "雨が降ったら、中止だ。", ex_en: "If it rains, it's canceled.", mnem: "TA-RA = ta-(done)-ra: after this happens, then", efreq: 9, gfreq: 9, pre: 8 },
  { id: "g75", jp: "〜と", meaning: "whenever / if (automatic)", explanation: "Two events always linked — natural consequence.", ex: "ボタンを押すと、開く。", ex_en: "When you press the button, it opens.", mnem: "TO = together: A and then automatically B", efreq: 8, gfreq: 8, pre: 6 },
  { id: "g76", jp: "〜ば", meaning: "if (formal conditional)", explanation: "Hypothetical with ば form — 'if X, then Y'.", ex: "時間があれば、行きます。", ex_en: "If I have time, I'll go.", mnem: "BA = base/if-base: if this base holds", efreq: 8, gfreq: 9, pre: 6 },
  { id: "g77", jp: "〜ばよかった", meaning: "should have done", explanation: "Regret about past action — 'I should have'.", ex: "もっと早く来ればよかった。", ex_en: "I should have come earlier.", mnem: "BA-YOKATTA = if-good-was: would have been good if", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g78", jp: "〜とすれば / 〜とすると", meaning: "supposing / if we assume", explanation: "Hypothetical for argument.", ex: "もし当選するとすれば、何をする?", ex_en: "If we suppose you win, what will you do?", mnem: "TO-SUREBA = as-if-doing: assume this", efreq: 5, gfreq: 7, pre: 3 },
  { id: "g79", jp: "〜としても", meaning: "even if / even assuming", explanation: "Concedes a hypothetical — 'even if X'.", ex: "本当だとしても、信じない。", ex_en: "Even if it's true, I won't believe it.", mnem: "TO-SHITE-MO = as-doing-but: even if so", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g80", jp: "〜にしても", meaning: "even if / even though", explanation: "Concedes either a real or hypothetical situation.", ex: "難しいにしても、やってみる。", ex_en: "Even if it's hard, I'll try.", mnem: "NI-SHITE-MO = at-doing-but: even granted this", efreq: 5, gfreq: 6, pre: 3 },
  { id: "g81", jp: "〜しか〜ない", meaning: "only / nothing but", explanation: "Strong limiting — 'only X (nothing else)'.", ex: "千円しかない。", ex_en: "I only have 1000 yen.", mnem: "SHIKA-NAI = nothing-but-this", efreq: 8, gfreq: 8, pre: 6 },
  { id: "g82", jp: "〜だけ", meaning: "only / just", explanation: "Limit — softer than しか, just stating quantity/scope.", ex: "一回だけ会った。", ex_en: "I met him just once.", mnem: "DAKE = the-only-extent of this", efreq: 9, gfreq: 9, pre: 7 },
  { id: "g83", jp: "〜ほど", meaning: "to the extent of / as much as", explanation: "Degree comparison.", ex: "死ぬほど疲れた。", ex_en: "Tired to the point of death.", mnem: "HODO = extent/degree marker", efreq: 7, gfreq: 8, pre: 5 },
  { id: "g84", jp: "〜くらい / 〜ぐらい", meaning: "about / to the degree of", explanation: "Approximate or 'at least this much'.", ex: "泣くくらい嬉しかった。", ex_en: "I was happy enough to cry.", mnem: "KURAI = about-this-degree", efreq: 7, gfreq: 8, pre: 5 },
  { id: "g85", jp: "〜ばかりか", meaning: "not only / besides", explanation: "Stronger than だけでなく — emphasizes 'on top of that'.", ex: "彼は頭がいいばかりか、優しい。", ex_en: "He's not only smart but also kind.", mnem: "BAKARI-KA = just-this-and-more", efreq: 5, gfreq: 6, pre: 3 },
  { id: "g86", jp: "〜どころか", meaning: "far from / let alone", explanation: "Reality is opposite/exceeds expectation — strong contrast.", ex: "簡単どころか、難しい。", ex_en: "Far from easy, it's difficult.", mnem: "DOKO-KORO = where? — beyond that point", efreq: 5, gfreq: 6, pre: 3 },
  { id: "g87", jp: "〜どころではない", meaning: "no time / no situation for", explanation: "Strongly rejects something is possible/appropriate now.", ex: "今、遊ぶどころではない。", ex_en: "Now's no time to play.", mnem: "DOKO-RO-DENAI = no place/time for it", efreq: 4, gfreq: 6, pre: 2 },
  { id: "g88", jp: "〜にすぎない", meaning: "no more than / merely", explanation: "Plays down — 'merely', 'just'.", ex: "ただの偶然にすぎない。", ex_en: "It's no more than coincidence.", mnem: "SUGI-NAI = not-exceeding: just this much", efreq: 5, gfreq: 6, pre: 3 },
  { id: "g89", jp: "〜わけがない", meaning: "no way / can't possibly", explanation: "Strong denial — 'there's no reason it would be so'.", ex: "そんなことあるわけがない。", ex_en: "There's no way that's true.", mnem: "WAKE-GA-NAI = no reason for it", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g90", jp: "〜わけではない", meaning: "it's not that / not necessarily", explanation: "Soft denial — 'it's not exactly the case that'.", ex: "嫌いなわけではない。", ex_en: "It's not that I hate it.", mnem: "WAKE-DE-WA-NAI = not the case that", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g91", jp: "〜わけにはいかない", meaning: "can't (for social reasons)", explanation: "Can't do X due to obligation/circumstance.", ex: "今、休むわけにはいかない。", ex_en: "I can't just take a break now.", mnem: "WAKE = reason — can't, in good reason", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g92", jp: "〜はずがない", meaning: "there's no way / can't be", explanation: "Logical impossibility.", ex: "彼が嘘をつくはずがない。", ex_en: "There's no way he'd lie.", mnem: "HAZU-GA-NAI = no expectation can hold", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g93", jp: "〜たびに", meaning: "every time / whenever", explanation: "Each time X happens, Y also happens.", ex: "会うたびに笑う。", ex_en: "Every time we meet, we laugh.", mnem: "TABI = trip/occasion: each time", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g94", jp: "〜たとたん", meaning: "the moment / as soon as", explanation: "Sudden, unexpected event immediately after.", ex: "ドアを開けたとたん、犬が飛び出した。", ex_en: "The moment I opened the door, the dog jumped out.", mnem: "TOTAN = the-instant moment", efreq: 5, gfreq: 6, pre: 3 },
  { id: "g95", jp: "〜つつ", meaning: "while / although", explanation: "Two simultaneous actions, or contrast.", ex: "悪いと知りつつ、やった。", ex_en: "I did it knowing it was wrong.", mnem: "TSU-TSU = side-by-side: doing both", efreq: 4, gfreq: 6, pre: 2 },
  { id: "g96", jp: "〜つつある", meaning: "is currently / in the process of", explanation: "Gradual progress toward a state.", ex: "状況が改善しつつある。", ex_en: "The situation is gradually improving.", mnem: "TSU-TSU-ARU = is-side-by-side: in motion", efreq: 4, gfreq: 6, pre: 2 },
  { id: "g97", jp: "〜最中に", meaning: "in the middle of / right when", explanation: "Mid-action when something else happens.", ex: "食事の最中に電話が鳴った。", ex_en: "The phone rang right in the middle of dinner.", mnem: "SAI-CHU = peak-middle", efreq: 5, gfreq: 6, pre: 3 },
  { id: "g98", jp: "〜間に", meaning: "while / during", explanation: "During the period that X is happening.", ex: "寝ている間に泥棒が入った。", ex_en: "While I was sleeping, a thief came in.", mnem: "AIDA = the gap/interval", efreq: 7, gfreq: 7, pre: 4 },
  { id: "g99", jp: "〜間", meaning: "during / throughout", explanation: "Throughout the period — continuous.", ex: "夏休みの間、旅行した。", ex_en: "I traveled throughout summer break.", mnem: "AIDA = the whole stretch", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g100", jp: "〜までに", meaning: "by (deadline)", explanation: "Deadline — must finish by this time.", ex: "五時までに帰る。", ex_en: "I'll be back by 5.", mnem: "MADE-NI = at-the-by-time", efreq: 8, gfreq: 8, pre: 5 },
  { id: "g101", jp: "〜のうちに", meaning: "while still / before it changes", explanation: "Do X while the favorable state still holds.", ex: "若いうちに勉強する。", ex_en: "Study while you're still young.", mnem: "UCHI-NI = inside-of: while still in this state", efreq: 6, gfreq: 7, pre: 4 },
  { id: "g102", jp: "〜てから", meaning: "after (in sequence)", explanation: "After doing X, then Y.", ex: "宿題をしてから、寝る。", ex_en: "After doing homework, I sleep.", mnem: "TE-KARA = doing-then-from: after that", efreq: 8, gfreq: 8, pre: 6 },
  { id: "g103", jp: "〜べき", meaning: "should / ought to", explanation: "Strong recommendation — moral or logical 'should'.", ex: "もっと努力すべきだ。", ex_en: "You should try harder.", mnem: "BEKI = must-be-key: the right thing to do", efreq: 7, gfreq: 8, pre: 5 },

<script>
/* ============================================================
   APP LOGIC (vanilla JS, no framework)
   ============================================================ */

const RATING = { AGAIN: 1, HARD: 2, GOOD: 3, EASY: 4 };
const SKEY = "jlpt_n3_beta_v4";
const SKEY_LEGACY = "jlpt_n3_beta_v3"; // migrate from previous build
const DAY_MS = 24 * 60 * 60 * 1000;

let state = null;
let view = "loading";
let viewState = {};

function loadState() {
  try {
    let v = localStorage.getItem(SKEY);
    if (!v) {
      // Migrate from previous build
      const legacy = localStorage.getItem(SKEY_LEGACY);
      if (legacy) {
        localStorage.setItem(SKEY, legacy);
        v = legacy;
      }
    }
    return v ? JSON.parse(v) : null;
  } catch (e) {
    console.error("load failed", e);
    return null;
  }
}

function saveState() {
  try {
    localStorage.setItem(SKEY, JSON.stringify(state));
  } catch (e) {
    console.error("save failed", e);
  }
}

/* ============================================================
   REPORT SYSTEM — let users flag incorrect content for review
   ============================================================ */

function addReport(itemId, itemType, reason, snapshot) {
  state.reports = state.reports || [];
  // Prevent duplicate reports of the same item with the same reason
  const existing = state.reports.find(function (r) {
    return r.itemId === itemId && r.reason === reason;
  });
  if (existing) return false;
  state.reports.push({
    itemId: itemId,
    itemType: itemType,
    reason: reason,
    snapshot: snapshot, // small preview so I can see what they were looking at
    ts: Date.now(),
  });
  saveState();
  return true;
}

function buildReportSnapshot(item) {
  if (!item) return "";
  if (item.type === "vocab") return item.jp + " (" + item.r + ") → " + item.en;
  if (item.type === "kanji") return item.jp + " → " + item.meaning;
  if (item.type === "grammar") return item.jp + " → " + item.meaning;
  if (item.title) return "Reading: " + item.title; // reading passage
  return item.id || "?";
}

// Reason options shown in the report dialog
const REPORT_REASONS = [
  { id: "wrong_meaning", label: "Wrong English meaning" },
  { id: "wrong_reading", label: "Wrong reading (furigana)" },
  { id: "unnatural_example", label: "Example sentence sounds unnatural" },
  { id: "wrong_translation", label: "Example translation is wrong" },
  { id: "wrong_mnemonic", label: "Mnemonic is confusing/wrong" },
  { id: "not_n3", label: "Not actually N3 level" },
  { id: "other", label: "Something else" },
];

function openReportDialog(item) {
  // Build a modal overlay
  const overlay = document.createElement("div");
  overlay.className = "report-overlay";
  overlay.addEventListener("click", function (e) {
    if (e.target === overlay) closeReportDialog();
  });

  const snapshot = buildReportSnapshot(item);
  const modal = document.createElement("div");
  modal.className = "report-modal";

  modal.appendChild(h("div", { class: "report-title" }, "Report this card"));
  modal.appendChild(h("div", { class: "report-preview jp" }, snapshot));
  modal.appendChild(h("div", { class: "report-help" }, "What's wrong? Your reports get saved locally so you can share them back later."));

  const reasonList = h("div", { class: "report-reasons" }, REPORT_REASONS.map(function (r) {
    return h("button", {
      class: "report-reason-btn mono",
      onClick: function () {
        const added = addReport(item.id, item.type || "reading", r.id, snapshot);
        // Show confirmation in same modal
        closeReportDialog();
        showReportToast(added ? "Thanks — report saved." : "Already reported.");
      },
    }, r.label);
  }));
  modal.appendChild(reasonList);

  modal.appendChild(h("button", {
    class: "report-cancel mono",
    onClick: closeReportDialog,
  }, "Cancel"));

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function closeReportDialog() {
  const o = document.querySelector(".report-overlay");
  if (o) o.parentNode.removeChild(o);
}

function showReportToast(text) {
  const toast = document.createElement("div");
  toast.className = "report-toast";
  toast.textContent = text;
  document.body.appendChild(toast);
  setTimeout(function () {
    toast.classList.add("fade-out");
  }, 2000);
  setTimeout(function () {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
  }, 2500);
}

// Small report button helper used in screens
function reportBtn(item) {
  return h("button", {
    class: "report-btn-inline mono",
    onClick: function (e) {
      e.stopPropagation();
      openReportDialog(item);
    },
  }, "⚑ Report");
}

function initCard(id, itemType, initialStability) {
  if (initialStability === undefined) initialStability = 0.5;
  return {
    id: id,
    itemType: itemType,
    difficulty: 5.0,
    stability: initialStability,
    lastReview: null,
    dueDate: Date.now(),
    reviews: 0,
    lapses: 0,
    status: initialStability > 3 ? "review" : "new",
  };
}

function schedule(card, rating) {
  const now = Date.now();
  const next = Object.assign({}, card, { lastReview: now, reviews: card.reviews + 1 });
  if (rating === RATING.AGAIN) {
    next.stability = Math.max(0.2, card.stability * 0.3);
    next.difficulty = Math.min(10, card.difficulty + 1.0);
    next.lapses = card.lapses + 1;
    next.status = "learning";
  } else if (rating === RATING.HARD) {
    next.stability = card.stability * 1.3;
    next.difficulty = Math.min(10, card.difficulty + 0.3);
    next.status = card.status === "new" ? "learning" : "review";
  } else if (rating === RATING.GOOD) {
    const mult = card.status === "new" ? 2.0 : 2.5;
    next.stability = card.stability * mult;
    next.status = "review";
  } else if (rating === RATING.EASY) {
    next.stability = card.stability * 4.0;
    next.difficulty = Math.max(1, card.difficulty - 0.5);
    next.status = "review";
  }
  next.dueDate = now + next.stability * DAY_MS;
  return next;
}

function getPriority(item) {
  return item.efreq * 0.5 + item.gfreq * 0.3 + item.pre * 0.2;
}

function allItems() {
  const out = [];
  for (let i = 0; i < VOCAB.length; i++) out.push(Object.assign({}, VOCAB[i], { type: "vocab" }));
  for (let i = 0; i < KANJI.length; i++) out.push(Object.assign({}, KANJI[i], { type: "kanji" }));
  for (let i = 0; i < GRAMMAR.length; i++) out.push(Object.assign({}, GRAMMAR[i], { type: "grammar" }));
  return out;
}

// Derive a memory aid for vocab from its kanji components (using KANJI bank we already have)
function deriveVocabMnemonic(item) {
  if (item.mnem) return item.mnem; // hand-written wins
  if (!item.jp) return null;
  const parts = [];
  for (let i = 0; i < item.jp.length; i++) {
    const ch = item.jp.charAt(i);
    // skip kana and punctuation
    const code = ch.charCodeAt(0);
    if (code < 0x4e00 || code > 0x9fff) continue;
    const k = KANJI.find(function (x) { return x.jp === ch; });
    if (k) parts.push(ch + " (" + k.meaning + ")");
    else parts.push(ch + " (?)");
  }
  if (parts.length < 2) return null;
  return parts.join(" + ");
}

// Filter items by section preference
function filterBySection(items, section) {
  if (!section || section === "all") return items;
  return items.filter(function (i) { return i.type === section; });
}

function buildTodayQueue(section) {
  const now = Date.now();
  const cards = state.cards || {};
  const all = allItems();
  const dueCardIds = Object.keys(cards).filter(function (id) {
    return cards[id].status !== "new" && cards[id].dueDate <= now;
  });
  let due = dueCardIds
    .map(function (id) {
      const item = all.find(function (i) { return i.id === id; });
      return item ? { card: cards[id], item: item } : null;
    })
    .filter(function (x) { return x !== null; });
  due = filterBySection(due.map(function (d) { return d.item; }), section)
    .map(function (i) { return { card: cards[i.id], item: i }; });

  const seenIds = {};
  Object.keys(cards).forEach(function (k) { seenIds[k] = true; });
  const newTarget = Math.max(5, Math.round(state.dailyMinutes / 3));
  const newCandidates = filterBySection(all.filter(function (i) { return !seenIds[i.id]; }), section)
    .sort(function (a, b) { return getPriority(b) - getPriority(a); })
    .slice(0, newTarget);
  return {
    due: due,
    newItems: newCandidates,
    total: filterBySection(all, section).length,
    learned: filterBySection(all.filter(function (i) { return seenIds[i.id]; }), section).length,
  };
}

function projectReadiness() {
  const total = allItems().length;
  const learned = Object.keys(state.cards || {}).length;
  const cards = state.cards || {};
  let mastered = 0;
  Object.keys(cards).forEach(function (k) {
    if (cards[k].stability > 7 && cards[k].status === "review") mastered++;
  });
  const now = Date.now();
  const daysLeft = Math.max(0, Math.ceil((state.examDate - now) / DAY_MS));
  const newPerDay = Math.max(5, Math.round(state.dailyMinutes / 3));
  const projectedLearned = Math.min(total, learned + newPerDay * daysLeft);
  const projectedMasteryPct = Math.round((projectedLearned / total) * 100);
  return {
    total: total,
    learned: learned,
    mastered: mastered,
    daysLeft: daysLeft,
    projectedLearned: projectedLearned,
    projectedMasteryPct: projectedMasteryPct,
  };
}

/* ============================================================
   GAMIFICATION HELPERS
   ============================================================ */

function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function dayDiff(a, b) {
  if (!a || !b) return 999;
  const da = new Date(a + "T00:00:00");
  const db = new Date(b + "T00:00:00");
  return Math.round((db - da) / DAY_MS);
}

// Update streak after a session. Returns { streak, isNewDay, isLongerStreak }
function updateStreak() {
  const today = todayKey();
  const last = state.lastSessionDate;
  if (last === today) return { streak: state.streak || 1, isNewDay: false, isLongerStreak: false };
  const diff = dayDiff(last, today);
  let isLonger = false;
  if (diff === 1) {
    state.streak = (state.streak || 0) + 1;
    isLonger = true;
  } else {
    state.streak = 1;
  }
  state.lastSessionDate = today;
  return { streak: state.streak, isNewDay: true, isLongerStreak: isLonger };
}

/* ============================================================
   DOM HELPERS
   ============================================================ */

function h(tag, props, children) {
  const el = document.createElement(tag);
  if (props) {
    for (const key in props) {
      const val = props[key];
      // Skip null/undefined/false attribute values entirely (prevents disabled='null' bug)
      if (key !== "onClick" && key !== "onChange" && (val === null || val === undefined || val === false)) continue;
      if (key === "class") el.className = val;
      else if (key === "onClick") el.addEventListener("click", val);
      else if (key === "onChange") el.addEventListener("change", val);
      else if (key === "style") {
        if (typeof val === "string") el.style.cssText = val;
        else Object.assign(el.style, val);
      }
      else if (key === "html") el.innerHTML = val;
      else el.setAttribute(key, val);
    }
  }
  if (children !== undefined && children !== null) {
    if (!Array.isArray(children)) children = [children];
    // Flatten one level so .map() results inside children work naturally
    const flat = [];
    for (let i = 0; i < children.length; i++) {
      const c = children[i];
      if (Array.isArray(c)) {
        for (let j = 0; j < c.length; j++) flat.push(c[j]);
      } else {
        flat.push(c);
      }
    }
    for (let i = 0; i < flat.length; i++) {
      const c = flat[i];
      if (c === null || c === undefined || c === false) continue;
      if (typeof c === "string" || typeof c === "number") {
        el.appendChild(document.createTextNode(String(c)));
      } else {
        el.appendChild(c);
      }
    }
  }
  return el;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

function clearRoot() {
  const root = document.getElementById("root");
  while (root.firstChild) root.removeChild(root.firstChild);
}

function render(opts) {
  try {
    const preserveScroll = opts && opts.preserveScroll;
    const prevScrollY = preserveScroll ? window.scrollY : null;
    clearRoot();
    let view_el;
    if (view === "onboarding") view_el = renderOnboarding();
    else if (view === "diagnostic") view_el = renderDiagnostic();
    else if (view === "study") view_el = renderStudy();
    else if (view === "reading") view_el = renderReading();
    else if (view === "match") view_el = renderMatch();
    else if (view === "exam") view_el = renderExam();
    else if (view === "moods") view_el = renderMoods();
    else if (view === "progress") view_el = renderProgress();
    else if (view === "browse") view_el = renderBrowse();
    else if (view === "dashboard") view_el = renderDashboard();
    else view_el = h("div", { class: "loading" }, "LOADING…");
    document.getElementById("root").appendChild(view_el);
    if (preserveScroll) {
      window.scrollTo(0, prevScrollY);
    } else {
      window.scrollTo(0, 0);
    }
  } catch (err) {
    showError(err);
  }
}

function showError(err) {
  const display = document.getElementById("error-display");
  display.style.display = "block";
  display.textContent = "ERROR\n\n" + (err.message || err) + "\n\nStack:\n" + (err.stack || "(no stack)") + "\n\nReload to retry.";
}

function setView(v) {

}

// Get the meaning text for any item type (used as the "right answer" and as distractors)
function meaningOf(item) {
  return item.type === "vocab" ? item.en : item.meaning;
}

// Pick `count` plausible wrong answers from the same item type pool.
// Avoids: the correct meaning, exact duplicates of meaning text, items with identical first word
// (so e.g. "to start" doesn't get "to start (intr.)" as a distractor — too easy).
function getDistractors(item, allItemsList, count) {
  const correctMeaning = meaningOf(item);
  const correctFirstWord = correctMeaning.split(/[\s,(]/)[0].toLowerCase();
  const pool = allItemsList.filter(function (i) {
    if (i.type !== item.type || i.id === item.id) return false;
    const m = meaningOf(i);
    if (!m || m === correctMeaning) return false;
    // Avoid distractors that share the head word (too similar)
    const fw = m.split(/[\s,(]/)[0].toLowerCase();
    if (fw === correctFirstWord) return false;
    return true;
  });
  // Fisher-Yates shuffle
  const arr = pool.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  const out = [];
  const seen = {};
  for (let i = 0; i < arr.length && out.length < count; i++) {
    const m = meaningOf(arr[i]);
    if (!seen[m]) {
      seen[m] = true;
      out.push(m);
    }
  }
  return out;
}

function generateOptions(item, allItemsList) {
  const correct = meaningOf(item);
  const distractors = getDistractors(item, allItemsList, 3);
  const opts = [{ text: correct, isCorrect: true }];
  distractors.forEach(function (d) { opts.push({ text: d, isCorrect: false }); });
  // Shuffle the order so correct isn't always first
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = opts[i]; opts[i] = opts[j]; opts[j] = tmp;
  }
  return opts;
}

function renderDiagnostic() {
  if (viewState.idx === undefined) {
    viewState.idx = 0;
    viewState.options = {};   // {itemId: [{text, isCorrect}, ...]}
    viewState.picked = {};    // {itemId: optionIndex}
  }
  const all = allItems();
  const diagItems = DIAG_IDS.map(function (id) {
    return all.find(function (i) { return i.id === id; });
  }).filter(function (x) { return x; });

  // ====== Completion screen ======
  if (viewState.idx >= diagItems.length) {
    const cards = {};
    const correctList = [], wrongList = [];
    diagItems.forEach(function (item) {
      const picked = viewState.picked[item.id];
      const opts = viewState.options[item.id];
      if (picked === undefined || !opts) {
        wrongList.push(item);
        return;
      }
      if (opts[picked] && opts[picked].isCorrect) {
        // Got it right → seed with 7-day stability
        cards[item.id] = initCard(item.id, item.type, 7);
        correctList.push(item);
      } else {
        wrongList.push(item);
      }
    });
    const score = Math.round((correctList.length / diagItems.length) * 100);
    return shell([
      header("Placement complete", "診断結果"),
      h("div", { class: "card surface border" }, [
        h("div", { class: "diag-score-big" }, score + "%"),
        h("div", { class: "diag-score-sub mono" }, correctList.length + " / " + diagItems.length + " CORRECT"),
        h("div", { class: "diag-results" }, [
          h("div", null, [
            h("div", { class: "diag-num", style: "color:#4A7C3A" }, String(correctList.length)),
            h("div", { class: "diag-label mono" }, "CORRECT"),
          ]),
          h("div", null, [
            h("div", { class: "diag-num", style: "color:#B33A3A" }, String(wrongList.length)),
            h("div", { class: "diag-label mono" }, "TO LEARN"),
          ]),
        ]),
        h("p", { class: "diag-note" }, "Items you got right are spaced for review. Items you missed enter your study queue, prioritized by exam frequency."),
      ]),
      h("button", {
        class: "btn-primary mono full",
        onClick: function () {
          state.cards = cards;
          state.diagnosticDone = true;
          saveState();
          setView("dashboard");
        },
      }, "Go to Dashboard →"),
    ]);
  }

  // ====== Question screen ======
  const item = diagItems[viewState.idx];

  // Lazily generate options once per item (so they don't reshuffle on rerender)
  if (!viewState.options[item.id]) {
    viewState.options[item.id] = generateOptions(item, all);
  }
  const options = viewState.options[item.id];
  const picked = viewState.picked[item.id];
  const revealed = picked !== undefined;
  const isCorrect = revealed && options[picked] && options[picked].isCorrect;

  function pickOption(idx) {
    if (revealed) return; // can't change answer after picking
    viewState.picked[item.id] = idx;
    render();
  }

  function nextCard() {
    viewState.idx++;
    render();
  }

  function exitDiagnostic() {
    if (confirm("Exit placement? Your answers so far will be discarded; you can retake it later via Reset.")) {
      state.cards = {};
      state.diagnosticDone = true;
      saveState();
      setView("dashboard");
    }
  }

  // Prompt card (the Japanese term)
  const promptChildren = [h("div", { class: "card-type mono type-" + item.type + "-text" }, item.type + " · WHAT DOES THIS MEAN?")];
  if (item.type === "vocab") {
    promptChildren.push(h("div", { class: "diag-vocab jp" }, item.jp));
    promptChildren.push(h("div", { class: "diag-reading jp" }, item.r));
  } else if (item.type === "kanji") {
    promptChildren.push(h("div", { class: "diag-kanji jp" }, item.jp));
  } else {
    promptChildren.push(h("div", { class: "diag-grammar jp" }, item.jp));
  }

  // MCQ option buttons
  const optionEls = options.map(function (opt, oi) {
    let cls = "mcq-option";
    if (revealed) {
      if (opt.isCorrect) cls += " correct";
      else if (oi === picked) cls += " wrong";
      else cls += " other";
    }
    return h("button", {
      class: cls,
      onClick: function () { pickOption(oi); },
    }, [
      h("span", { class: "mcq-letter mono" }, String.fromCharCode(65 + oi)),
      h("span", { class: "mcq-text" }, opt.text),
      revealed && opt.isCorrect ? h("span", { class: "mcq-mark" }, "✓") : null,
      revealed && oi === picked && !opt.isCorrect ? h("span", { class: "mcq-mark wrong" }, "✗") : null,
    ]);
  });

  // After-pick: show feedback + the rich detail
  const detailChildren = [];
  if (revealed) {
    detailChildren.push(h("div", { class: "diag-feedback " + (isCorrect ? "good" : "bad") }, [
      h("span", { class: "feedback-icon" }, isCorrect ? "✓" : "✗"),
      h("span", { class: "feedback-text" }, isCorrect ? "Correct!" : "Not this time — review below"),
    ]));

    // Rich detail panel
    if (item.type === "vocab") {
      detailChildren.push(h("div", { class: "diag-detail-card surface border" }, [
        h("div", { class: "section-label mono" }, "Example"),
        h("div", { class: "diag-example jp" }, item.ex),
        item.ex_en ? h("div", { class: "diag-example-en" }, item.ex_en) : null,
        (function () {
          const m = deriveVocabMnemonic(item);
          return m ? h("div", null, [
            h("div", { class: "section-label mono", style: "margin-top:12px" }, "Memory aid"),
            h("div", { class: "section-text mnem-text" }, m),
          ]) : null;
        })(),
      ]));
    } else if (item.type === "kanji") {
      detailChildren.push(h("div", { class: "diag-detail-card surface border" }, [
        h("div", { class: "diag-onkun" }, [
          "On: ", h("span", { class: "jp" }, item.on),
          " · Kun: ", h("span", { class: "jp" }, item.kun),
        ]),
        h("div", { class: "section-label mono", style: "margin-top:12px" }, "Components"),
        h("div", { class: "section-text jp" }, item.comp),
        h("div", { class: "section-label mono", style: "margin-top:12px" }, "Mnemonic"),
        h("div", { class: "section-text mnem-text" }, item.mnem),
      ]));
    } else {
      detailChildren.push(h("div", { class: "diag-detail-card surface border" }, [
        h("div", { class: "section-label mono" }, "Explanation"),
        h("div", { class: "section-text" }, item.explanation),
        h("div", { class: "section-label mono", style: "margin-top:12px" }, "Example"),
        h("div", { class: "section-text jp" }, item.ex),
        item.ex_en ? h("div", { class: "section-text-en" }, item.ex_en) : null,
        item.mnem ? h("div", null, [
          h("div", { class: "section-label mono", style: "margin-top:12px" }, "Memory aid"),
          h("div", { class: "section-text mnem-text" }, item.mnem),
        ]) : null,
      ]));
    }
  }

  const continueBtn = revealed
    ? h("button", {
        class: "btn-primary mono full",
        onClick: nextCard,
      }, viewState.idx + 1 < diagItems.length ? "Continue →" : "Finish placement →")
    : null;

  return shell([
    viewState.idx > 0
      ? backRow("← Previous question", function () {
          viewState.idx--;
          render();
        })
      : null,
    header("Placement · " + (viewState.idx + 1) + "/" + diagItems.length, revealed ? (isCorrect ? "Correct" : "Review") : "Pick the meaning"),

    revealed ? h("div", { class: "report-row center" }, [reportBtn(Object.assign({}, item))]) : null,
    h("div", { class: "diag-exit-row" }, [
      h("button", {
        class: "footer-link mono",
        onClick: exitDiagnostic,

    ]),

}

  if (!state.section) state.section = "all";

  const readingsRemaining = READINGS.length - (state.readingsDone || []).length;
  const streak = state.streak || 0;

    h("div", { class: "card-label mono" }, "SRS · TODAY"),

        h("div", { class: "stat-label mono" }, "REVIEWS DUE"),

    ]),

        }, "Next passage →")

      h("div", { class: "card-counter mono" }, "🎮 " + (state.matchHighScore || 0) + " BEST"),
    ]),

      class: "btn-secondary mono full",

      h("span", { class: "muted" }, "CORPUS MASTERY"),
