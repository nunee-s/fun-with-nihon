<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F5F1E8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="JLPT N3">
<title>JLPT N3 Beta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Reset + base */
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: #F5F1E8;
  color: #1A1A1A;
  font-family: 'Fraunces', Georgia, serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}
body { overscroll-behavior-y: contain; min-height: 100vh; }
button { touch-action: manipulation; cursor: pointer; font-family: inherit; }
input { font-family: inherit; }

.jp { font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif; }
.mono { font-family: 'JetBrains Mono', Menlo, Consolas, monospace; }
.muted { color: #8B8178; }
.italic { font-style: italic; }
.center { text-align: center; }
.full { width: 100%; }

/* Loading */
.loading {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: #8B8178;
  padding-top: 128px;
}

/* Layout shells */
.shell { min-height: 100vh; padding: 32px 0; }
.container { max-width: 672px; margin: 0 auto; padding: 0 24px; }

/* Headers */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid #D9D0BC;
}
.header-subtitle {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: #8B8178;
  margin-bottom: 4px;
}
.header-title {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0;
  line-height: 1.2;
}
.header-right {
  text-align: right;
}
.header-right .status-good { font-size: 11px; color: #4A7C3A; letter-spacing: 0.2em; font-weight: 500; }
.header-right .status-warn { font-size: 11px; color: #C47E1F; letter-spacing: 0.2em; font-weight: 500; }
.header-right .status-bad  { font-size: 11px; color: #B33A3A; letter-spacing: 0.2em; font-weight: 500; }
.header-projlabel {
  font-size: 11px;
  color: #8B8178;
  margin-top: 4px;
}
.header-en { font-size: 11px; color: #8B8178; font-style: italic; }

/* Cards */
.card {
  padding: 24px;
  margin-bottom: 16px;
}
.card.small { padding: 16px; }
.surface { background: #EDE7D8; }
.border { border: 1px solid #D9D0BC; }

.card-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #8B8178;
  margin-bottom: 16px;
}
.card-label-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
}
.card-label-row .card-label { margin-bottom: 0; }
.card-counter { font-size: 11px; color: #8B8178; }

/* Stat rows */
.stat-row {
  display: flex;
  align-items: baseline;
  gap: 32px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.stat-num {
  font-size: 36px;
  font-weight: 300;
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: #8B8178;
  margin-top: 4px;
  letter-spacing: 0.1em;
}
.big-num {
  font-size: 56px;
  font-weight: 300;
  margin-bottom: 8px;
  line-height: 1;
}
.stat-big { font-size: 36px; font-weight: 300; margin-top: 8px; line-height: 1; }
.type-num { font-size: 24px; font-weight: 300; margin-top: 4px; line-height: 1; }
.type-num .small { font-size: 14px; }

/* Buttons */
.btn-primary {
  display: block;
  width: 100%;
  padding: 16px 24px;
  background: #B33A3A;
  color: white;
  border: none;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { opacity: 0.8; }
.btn-primary.disabled { opacity: 0.4; pointer-events: none; }

.btn-secondary {
  display: block;
  width: 100%;
  padding: 14px 24px;
  background: #EDE7D8;
  color: #1A1A1A;
  border: 1px solid #D9D0BC;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: border-color 0.15s;
}
.btn-secondary:hover { border-color: #B33A3A; }
.btn-secondary.reveal { padding: 16px 24px; }

.btn-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.btn-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.btn-rate {
  padding: 16px 8px;
  background: transparent;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  border: 1px solid;
  transition: all 0.15s;
}
.btn-rate.again { color: #B33A3A; border-color: #B33A3A; }
.btn-rate.again:hover { background: #B33A3A; color: white; }
.btn-rate.hard { color: #C47E1F; border-color: #C47E1F; }
.btn-rate.hard:hover { background: #C47E1F; color: white; }
.btn-rate.good { color: #4A7C3A; border-color: #4A7C3A; }
.btn-rate.good:hover { background: #4A7C3A; color: white; }
.btn-rate.easy { color: #3A5A7C; border-color: #3A5A7C; }
.btn-rate.easy:hover { background: #3A5A7C; color: white; }

/* Onboarding */
.onb-hero { padding-top: 64px; }
.tag-accent {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: #B33A3A;
  margin-bottom: 16px;
}
.onb-title {
  font-size: 48px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0 0 8px 0;
}
.onb-subtitle {
  font-size: 24px;
  font-weight: 300;
  margin: 0 0 48px 0;
}
.onb-lead {
  font-size: 18px;
  line-height: 1.6;
  color: #8B8178;
  margin: 0 0 8px 0;
  max-width: 28em;
}
.onb-note {
  font-size: 14px;
  line-height: 1.6;
  color: #8B8178;
  margin: 0 0 48px 0;
  max-width: 28em;
}

/* Form fields */
.label {
  display: block;
  font-size: 12px;
  color: #8B8178;
  margin-bottom: 8px;
}
.input {
  width: 100%;
  padding: 12px 16px;
  background: #EDE7D8;
  border: 1px solid #D9D0BC;
  font-size: 16px;
  font-family: 'Fraunces', serif;
  color: #1A1A1A;
  outline: none;
}
.input:focus { border-color: #B33A3A; }
.field-help {
  font-size: 11px;
  color: #8B8178;
  font-style: italic;
  margin-top: 8px;
}

.minute-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.minute-btn {
  padding: 12px 8px;
  background: #EDE7D8;
  border: 1px solid #D9D0BC;
  font-size: 12px;
  transition: all 0.15s;
  color: #1A1A1A;
}
.minute-btn:hover { border-color: #B33A3A; }
.minute-btn.selected {
  background: #B33A3A;
  color: white;
  border-color: #B33A3A;
}

/* Diagnostic */
.diag-card {
  min-height: 240px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.card-type {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #8B8178;
  margin-bottom: 16px;
}
.diag-vocab { font-size: 48px; margin-bottom: 12px; text-align: center; }
.diag-reading { font-size: 14px; color: #8B8178; text-align: center; }
.diag-kanji { font-size: 96px; text-align: center; }
.diag-grammar { font-size: 28px; text-align: center; }
.diag-answer-section {
  border-top: 1px solid #D9D0BC;
  padding-top: 16px;
  margin-top: 20px;
  width: 100%;
}
.diag-meaning {
  text-align: center;
  font-size: 18px;
  font-style: italic;
  margin-bottom: 12px;
}
.diag-onkun {
  text-align: center;
  font-size: 13px;
  color: #8B8178;
  margin-bottom: 12px;
}
.diag-example {
  text-align: center;
  font-size: 15px;
  margin-top: 8px;
}
.diag-explanation {
  text-align: left;
  font-size: 13px;
  line-height: 1.6;
  margin-top: 8px;
  color: #1A1A1A;
}
.diag-rated-tag {
  display: inline-block;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.15em;
  padding: 4px 10px;
  border: 1px solid;
  margin-top: 8px;
}
.diag-rated-tag.unknown { color: #B33A3A; border-color: #B33A3A; }
.diag-rated-tag.partial { color: #C47E1F; border-color: #C47E1F; }
.diag-rated-tag.known   { color: #4A7C3A; border-color: #4A7C3A; }
.diag-exit-row {
  display: flex;
  justify-content: center;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid #D9D0BC;
}
.diag-results {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  text-align: center;
  gap: 16px;
  margin-top: 16px;
}
.diag-num { font-size: 36px; font-weight: 300; line-height: 1; }
.diag-label {
  font-size: 11px;
  color: #8B8178;
  margin-top: 4px;
  letter-spacing: 0.1em;
}
.diag-note {
  color: #8B8178;
  font-size: 13px;
  font-style: italic;
  margin-top: 24px;
  text-align: center;
  line-height: 1.6;
}
.diag-help {
  font-size: 11px;
  color: #8B8178;
  text-align: center;
  letter-spacing: 0.1em;
  margin-top: 12px;
  line-height: 1.6;
}
.diag-score-big {
  text-align: center;
  font-size: 56px;
  font-weight: 300;
  line-height: 1;
  color: #B33A3A;
}
.diag-score-sub {
  text-align: center;
  font-size: 11px;
  color: #8B8178;
  letter-spacing: 0.2em;
  margin-top: 8px;
}

/* MCQ — multiple choice options on diagnostic */
.diag-prompt-card {
  padding: 28px 20px;
  text-align: center;
  margin-bottom: 16px;
}
.diag-prompt-card .card-type {
  font-size: 10px;
  margin-bottom: 16px;
  letter-spacing: 0.15em;
}
.mcq-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.mcq-option {
  display: flex;
  align-items: center;
  text-align: left;
  width: 100%;
  padding: 14px 16px;
  background: #EDE7D8;
  border: 1px solid #D9D0BC;
  font-size: 15px;
  font-family: 'Fraunces', serif;
  color: #1A1A1A;
  transition: all 0.15s;
  line-height: 1.4;
}
.mcq-option:hover { border-color: #B33A3A; background: #F5F1E8; }
.mcq-option.correct {
  background: #E8F4E0;
  border-color: #4A7C3A;
  color: #1A1A1A;
}
.mcq-option.wrong {
  background: #FBE8E5;
  border-color: #B33A3A;
  color: #1A1A1A;
}
.mcq-option.other {
  opacity: 0.4;
  pointer-events: none;
}
.mcq-letter {
  display: inline-block;
  font-size: 11px;
  margin-right: 14px;
  color: #8B8178;
  letter-spacing: 0.1em;
  min-width: 16px;
  flex-shrink: 0;
}
.mcq-text {
  flex: 1;
}
.mcq-mark {
  margin-left: 12px;
  font-size: 16px;
  color: #4A7C3A;
  font-weight: bold;
}
.mcq-mark.wrong { color: #B33A3A; }

/* Feedback box after picking */
.diag-feedback {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  font-size: 14px;
  margin-bottom: 12px;
  border: 1px solid;
}
.diag-feedback.good {
  background: #E8F4E0;
  border-color: #4A7C3A;
  color: #2D5A1F;
}
.diag-feedback.bad {
  background: #FBE8E5;
  border-color: #B33A3A;
  color: #7A1F1F;
}
.feedback-icon {
  font-size: 22px;
  margin-right: 12px;
  font-weight: bold;
}
.feedback-text {
  flex: 1;
}

/* Detail card shown after revealing */
.diag-detail-card {
  padding: 16px;
  margin-bottom: 16px;
}

/* Progress bar */
.progress-section { margin-bottom: 24px; }
.progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.progress-bg {
  height: 8px;
  background: #EDE7D8;
  position: relative;
}
.progress-fill {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  background: #B33A3A;
  transition: width 0.3s;
}

/* Breakdown grid */
.breakdown-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

/* Footer */
.footer-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding-top: 24px;
  border-top: 1px solid #D9D0BC;
}
.spacer { flex: 1; }
.footer-link {
  background: none;
  border: none;
  padding: 0;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #8B8178;
  transition: color 0.15s;
}
.footer-link:hover { color: #1A1A1A; }
.footer-link.danger:hover { color: #B33A3A; }

/* Study session */
.study-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.study-kind {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #8B8178;
}
.study-counter { font-size: 11px; color: #8B8178; }
.study-progress {
  height: 2px;
  background: #EDE7D8;
  position: relative;
  margin-bottom: 32px;
}
.study-progress-fill {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  background: #B33A3A;
  transition: width 0.3s;
}
.study-card {
  min-height: 320px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  margin-bottom: 16px;
}
.card-jp-large { font-size: 56px; text-align: center; margin-bottom: 16px; font-weight: 500; }
.card-jp-huge { font-size: 96px; text-align: center; margin-bottom: 16px; font-weight: 500; line-height: 1; }
.card-jp-medium { font-size: 36px; text-align: center; margin-bottom: 16px; font-weight: 500; }
.card-reading { font-size: 18px; color: #8B8178; text-align: center; margin-bottom: 8px; }
.card-meaning {
  text-align: center;
  font-size: 18px;
  margin-bottom: 16px;
  font-style: italic;
}
.card-onkun {
  font-size: 13px;
  color: #8B8178;
  text-align: center;
  margin-bottom: 16px;
}
.card-section {
  border-top: 1px solid #D9D0BC;
  padding-top: 16px;
  margin-top: 8px;
}
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #8B8178;
  margin-bottom: 6px;
}
.section-text {
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 12px;
}
.card-example { font-size: 16px; }

.exit-row { margin-top: 32px; display: flex; justify-content: flex-end; }
.muted-italic {
  color: #8B8178;
  font-style: italic;
  text-align: center;
  padding: 12px 0;
  font-size: 14px;
}

/* Reading */
.passage { padding: 32px; }
.passage-text { font-size: 16px; line-height: 2.2; }
.questions-list { display: flex; flex-direction: column; gap: 24px; }
.question { padding: 20px; }
.question-text { font-size: 16px; margin-bottom: 16px; font-weight: 500; }
.options { display: flex; flex-direction: column; gap: 8px; }
.option-btn {
  width: 100%;
  text-align: left;
  padding: 12px 16px;
  background: #F5F1E8;
  border: 1px solid #D9D0BC;
  font-size: 14px;
  transition: all 0.15s;
  color: #1A1A1A;
}
.option-btn:hover { border-color: #B33A3A; }
.option-btn.selected {
  background: #B33A3A;
  color: white;
  border-color: #B33A3A;
}
.opt-letter { font-size: 11px; margin-right: 12px; }
.check-btn { margin-top: 24px; }
.results-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
.result-card {
  border: 1px solid;
  padding: 16px;
}
.result-card.right { border-color: #4A7C3A; }
.result-card.wrong { border-color: #B33A3A; }
.result-q { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.result-you { font-size: 11px; color: #8B8178; }
.result-correct { font-size: 11px; color: #4A7C3A; margin-top: 4px; }

/* Progress page */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.section-block { margin-bottom: 32px; }
.section-heading {
  font-size: 11px;
  color: #8B8178;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 16px;
}
.breakdown-row { padding: 16px; margin-bottom: 8px; }
.breakdown-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.breakdown-type {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 500;
}
.stack-bar {
  height: 6px;
  background: #F5F1E8;
  position: relative;
  margin-bottom: 8px;
}
.stack-mastered {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  background: #4A7C3A;
}
.stack-review {
  position: absolute;
  top: 0;
  bottom: 0;
  background: #C47E1F;
}
.stack-learning {
  position: absolute;
  top: 0;
  bottom: 0;
  background: #B33A3A;
}
.breakdown-legend {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: #8B8178;
}
.reading-summary { margin-bottom: 24px; }
.reading-summary > div:last-child { font-size: 14px; }
.beta-notes {
  border-top: 1px solid #D9D0BC;
  padding-top: 24px;
}
.beta-notes p {
  font-size: 13px;
  line-height: 1.6;
  margin: 0;
}

/* Top banner: JLPT badge + streak */
.top-banner {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.jlpt-badge {
  display: inline-block;
  padding: 6px 12px;
  background: #1A1A1A;
  color: #F5F1E8;
  font-size: 11px;
  letter-spacing: 0.2em;
}
.streak-pill {
  display: inline-block;
  padding: 6px 12px;
  background: #FFF3E0;
  color: #C47E1F;
  border: 1px solid #C47E1F;
  font-size: 11px;
  letter-spacing: 0.15em;
}

/* Section selector */
.section-selector {
  margin-bottom: 24px;
}
.section-label-mini {
  font-size: 10px;
  color: #8B8178;
  letter-spacing: 0.2em;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.section-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.section-btn {
  padding: 10px 4px;
  background: #EDE7D8;
  border: 1px solid #D9D0BC;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: #1A1A1A;
  transition: all 0.15s;
}
.section-btn:hover { border-color: #B33A3A; }
.section-btn.active {
  background: #B33A3A;
  color: white;
  border-color: #B33A3A;
}
/* Category colors override the active state for each section */
.section-btn.active.section-vocab   { background: #B85C3C; border-color: #B85C3C; }
.section-btn.active.section-kanji   { background: #2E4A7C; border-color: #2E4A7C; }
.section-btn.active.section-grammar { background: #2D6B5A; border-color: #2D6B5A; }
.section-btn.section-vocab:hover   { border-color: #B85C3C; }

/* ============================================================

   Research (Wichmann 2002, Lewandowsky 1989) shows color-coded
   categories aid recall. Hues chosen for distinguishability on
   the warm cream background:
     vocab   → rust / terracotta (warm, social, practical)
     kanji   → deep indigo (reflective, structural)
     grammar → forest teal (calm, pattern-recognition)
     reading → muted plum (narrative, comprehension)
   Vermillion stays as the universal error color.
   ============================================================ */

.type-vocab-text   { color: #B85C3C !important; }
.type-kanji-text   { color: #2E4A7C !important; }
.type-grammar-text { color: #2D6B5A !important; }

/* ====== PAIR MATCH GRID (4-column, mixed JP+EN, square tiles) ====== */
.pair-grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}

.pair-tile {
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 6px 4px;
  border: 2px solid transparent;
  border-radius: 8px;
  font-family: inherit;
  color: #1A1A1A;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s, border-color 0.1s, background-color 0.1s;
  position: relative;
  box-shadow: 0 1px 2px rgba(26, 26, 26, 0.06);
  overflow: hidden;
}

/* Warm peach for Japanese tiles, cool sage for English. Maintains scannability even when mixed. */
.pair-tile-jp {
  background: #F2E4D2;
  border-color: #DDC9AC;
}
.pair-tile-en {
  background: #E4EEE2;
  border-color: #C1D4BD;
}

.pair-tile:hover {
  transform: translateY(-1px);
  box-shadow: 0 3px 6px rgba(26, 26, 26, 0.12);
}
.pair-tile-jp:hover { border-color: #B85C3C; }
.pair-tile-en:hover { border-color: #2D6B5A; }

.pair-tile.selected {
  border-color: #1A1A1A;
  box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.18), 0 4px 10px rgba(26, 26, 26, 0.15);
  transform: translateY(-2px) scale(1.03);
  z-index: 2;
}
.pair-tile-jp.selected { background: #F8EBD9; }
.pair-tile-en.selected { background: #EAF4E7; }

.pair-tile.matched {
  cursor: default;
  pointer-events: none;
  border-color: hsl(var(--pair-hue), 35%, 45%) !important;
  /* Subtle hue ribbon at bottom + soft tint */
  background: linear-gradient(
    to bottom,
    hsl(var(--pair-hue), 30%, 95%) 0%,
    hsl(var(--pair-hue), 35%, 88%) 100%
  ) !important;
  box-shadow: inset 0 -4px 0 hsl(var(--pair-hue), 50%, 50%);
  opacity: 0.92;
}

.pair-tile.match-flash {
  animation: tile-match-pulse 0.55s ease;
}
.pair-tile.miss-flash {
  animation: tile-miss-shake 0.5s ease;
  background: #FBE8E5 !important;
  border-color: #B33A3A !important;
}
@keyframes tile-match-pulse {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(74, 124, 58, 0.25); }
  60%  { transform: scale(1.03); box-shadow: 0 0 0 14px rgba(74, 124, 58, 0); }
  100% { transform: scale(1); }
}
@keyframes tile-miss-shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-5px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Tile content */
.tile-jp-main {
  font-size: 19px;
  font-weight: 500;
  line-height: 1.15;
  max-width: 100%;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-all;
}
/* Shrink longer Japanese strings (most often grammar patterns like 〜なければならない) */
.tile-jp-main.long {
  font-size: 14px;
  line-height: 1.2;
  -webkit-line-clamp: 3;
  line-clamp: 3;
}
.tile-jp-main.very-long {

const DIAG_IDS = [
  "v4", "v9", "v62", "v101", "v136", "v214", "v294", "v316", "v338",

<script>
/* ============================================================
   APP LOGIC (vanilla JS, no framework)
   ============================================================ */

const RATING = { AGAIN: 1, HARD: 2, GOOD: 3, EASY: 4 };
const SKEY = "jlpt_n3_beta_v4";
const SKEY_LEGACY = "jlpt_n3_beta_v3"; // migrate from previous build
const DAY_MS = 24 * 60 * 60 * 1000;

let state = null;
let view = "loading";
let viewState = {};

function loadState() {
  try {
    let v = localStorage.getItem(SKEY);
    if (!v) {
      // Migrate from previous build
      const legacy = localStorage.getItem(SKEY_LEGACY);
      if (legacy) {
        localStorage.setItem(SKEY, legacy);
        v = legacy;
      }
    }
    return v ? JSON.parse(v) : null;
  } catch (e) {
    console.error("load failed", e);
    return null;
  }
}

function saveState() {
  try {
    localStorage.setItem(SKEY, JSON.stringify(state));
  } catch (e) {
    console.error("save failed", e);
  }
}

function initCard(id, itemType, initialStability) {
  if (initialStability === undefined) initialStability = 0.5;
  return {
    id: id,
    itemType: itemType,
    difficulty: 5.0,
    stability: initialStability,
    lastReview: null,
    dueDate: Date.now(),
    reviews: 0,
    lapses: 0,
    status: initialStability > 3 ? "review" : "new",
  };
}

function schedule(card, rating) {
  const now = Date.now();
  const next = Object.assign({}, card, { lastReview: now, reviews: card.reviews + 1 });
  if (rating === RATING.AGAIN) {
    next.stability = Math.max(0.2, card.stability * 0.3);
    next.difficulty = Math.min(10, card.difficulty + 1.0);
    next.lapses = card.lapses + 1;
    next.status = "learning";
  } else if (rating === RATING.HARD) {
    next.stability = card.stability * 1.3;
    next.difficulty = Math.min(10, card.difficulty + 0.3);
    next.status = card.status === "new" ? "learning" : "review";
  } else if (rating === RATING.GOOD) {
    const mult = card.status === "new" ? 2.0 : 2.5;
    next.stability = card.stability * mult;
    next.status = "review";
  } else if (rating === RATING.EASY) {
    next.stability = card.stability * 4.0;
    next.difficulty = Math.max(1, card.difficulty - 0.5);
    next.status = "review";
  }
  next.dueDate = now + next.stability * DAY_MS;
  return next;
}

function getPriority(item) {
  return item.efreq * 0.5 + item.gfreq * 0.3 + item.pre * 0.2;
}

function allItems() {
  const out = [];
  for (let i = 0; i < VOCAB.length; i++) out.push(Object.assign({}, VOCAB[i], { type: "vocab" }));
  for (let i = 0; i < KANJI.length; i++) out.push(Object.assign({}, KANJI[i], { type: "kanji" }));
  for (let i = 0; i < GRAMMAR.length; i++) out.push(Object.assign({}, GRAMMAR[i], { type: "grammar" }));
  return out;
}

// Derive a memory aid for vocab from its kanji components (using KANJI bank we already have)
function deriveVocabMnemonic(item) {
  if (item.mnem) return item.mnem; // hand-written wins
  if (!item.jp) return null;
  const parts = [];
  for (let i = 0; i < item.jp.length; i++) {
    const ch = item.jp.charAt(i);
    // skip kana and punctuation
    const code = ch.charCodeAt(0);
    if (code < 0x4e00 || code > 0x9fff) continue;
    const k = KANJI.find(function (x) { return x.jp === ch; });
    if (k) parts.push(ch + " (" + k.meaning + ")");
    else parts.push(ch + " (?)");
  }
  if (parts.length < 2) return null;
  return parts.join(" + ");
}

// Filter items by section preference
function filterBySection(items, section) {
  if (!section || section === "all") return items;
  return items.filter(function (i) { return i.type === section; });
}

function buildTodayQueue(section) {
  const now = Date.now();
  const cards = state.cards || {};
  const all = allItems();
  const dueCardIds = Object.keys(cards).filter(function (id) {
    return cards[id].status !== "new" && cards[id].dueDate <= now;
  });
  let due = dueCardIds
    .map(function (id) {
      const item = all.find(function (i) { return i.id === id; });
      return item ? { card: cards[id], item: item } : null;
    })
    .filter(function (x) { return x !== null; });
  due = filterBySection(due.map(function (d) { return d.item; }), section)
    .map(function (i) { return { card: cards[i.id], item: i }; });

  const seenIds = {};
  Object.keys(cards).forEach(function (k) { seenIds[k] = true; });
  const newTarget = Math.max(5, Math.round(state.dailyMinutes / 3));
  const newCandidates = filterBySection(all.filter(function (i) { return !seenIds[i.id]; }), section)
    .sort(function (a, b) { return getPriority(b) - getPriority(a); })
    .slice(0, newTarget);
  return {
    due: due,
    newItems: newCandidates,
    total: filterBySection(all, section).length,
    learned: filterBySection(all.filter(function (i) { return seenIds[i.id]; }), section).length,
  };
}

function projectReadiness() {
  const total = allItems().length;
  const learned = Object.keys(state.cards || {}).length;
  const cards = state.cards || {};
  let mastered = 0;
  Object.keys(cards).forEach(function (k) {
    if (cards[k].stability > 7 && cards[k].status === "review") mastered++;
  });
  const now = Date.now();
  const daysLeft = Math.max(0, Math.ceil((state.examDate - now) / DAY_MS));
  const newPerDay = Math.max(5, Math.round(state.dailyMinutes / 3));
  const projectedLearned = Math.min(total, learned + newPerDay * daysLeft);
  const projectedMasteryPct = Math.round((projectedLearned / total) * 100);
  return {
    total: total,
    learned: learned,
    mastered: mastered,
    daysLeft: daysLeft,
    projectedLearned: projectedLearned,
    projectedMasteryPct: projectedMasteryPct,
  };
}

/* ============================================================
   GAMIFICATION HELPERS
   ============================================================ */

function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function dayDiff(a, b) {
  if (!a || !b) return 999;
  const da = new Date(a + "T00:00:00");
  const db = new Date(b + "T00:00:00");
  return Math.round((db - da) / DAY_MS);
}

// Update streak after a session. Returns { streak, isNewDay, isLongerStreak }
function updateStreak() {
  const today = todayKey();
  const last = state.lastSessionDate;
  if (last === today) return { streak: state.streak || 1, isNewDay: false, isLongerStreak: false };
  const diff = dayDiff(last, today);
  let isLonger = false;
  if (diff === 1) {
    state.streak = (state.streak || 0) + 1;
    isLonger = true;
  } else {
    state.streak = 1;
  }
  state.lastSessionDate = today;
  return { streak: state.streak, isNewDay: true, isLongerStreak: isLonger };
}

const ENCOURAGEMENT = {
  small: ["Small steps add up.", "Show up — that's the win.", "Consistency over volume."],
  medium: ["Solid session.", "頑張った — well done.", "Real progress today.", "That's how mastery is built."],
  big: ["Excellent focus.", "素晴らしい — outstanding.", "You're doing the work.", "This is how N3 gets passed."],
  marathon: ["驚くべき — extraordinary effort.", "Marathon session.", "Future-you thanks present-you."],
};

function pickEncouragement(count) {
  const tier = count <= 5 ? "small" : count <= 15 ? "medium" : count <= 30 ? "big" : "marathon";
  const arr = ENCOURAGEMENT[tier];

const MILESTONES = [

  { mastered: 25, label: "Quarter Hundred", jp: "二十五", note: "25 items mastered." },
  { mastered: 50, label: "Half Century", jp: "五十", note: "50 items mastered." },

  { mastered: 200, label: "Double Century", jp: "二百", note: "200 mastered — exam-ready trajectory." },
  { mastered: 350, label: "Vocab Sweep", jp: "三百五十", note: "Full vocab corpus mastered." },

function checkMilestone(mastered) {
  state.milestonesShown = state.milestonesShown || [];
  for (let i = 0; i < MILESTONES.length; i++) {
    const m = MILESTONES[i];
    if (mastered >= m.mastered && state.milestonesShown.indexOf(m.mastered) === -1) {
      state.milestonesShown.push(m.mastered);
      return m;
    }
  }
  return null;
}

/* ============================================================
   DOM HELPERS
   ============================================================ */

function h(tag, props, children) {
  const el = document.createElement(tag);
  if (props) {
    for (const key in props) {
      const val = props[key];
      // Skip null/undefined/false attribute values entirely (prevents disabled='null' bug)
      if (key !== "onClick" && key !== "onChange" && (val === null || val === undefined || val === false)) continue;
      if (key === "class") el.className = val;
      else if (key === "onClick") el.addEventListener("click", val);
      else if (key === "onChange") el.addEventListener("change", val);
      else if (key === "style") {
        if (typeof val === "string") el.style.cssText = val;
        else Object.assign(el.style, val);
      }
      else if (key === "html") el.innerHTML = val;
      else el.setAttribute(key, val);
    }
  }
  if (children !== undefined && children !== null) {
    if (!Array.isArray(children)) children = [children];
    // Flatten one level so .map() results inside children work naturally
    const flat = [];
    for (let i = 0; i < children.length; i++) {
      const c = children[i];
      if (Array.isArray(c)) {
        for (let j = 0; j < c.length; j++) flat.push(c[j]);
      } else {
        flat.push(c);
      }
    }
    for (let i = 0; i < flat.length; i++) {
      const c = flat[i];
      if (c === null || c === undefined || c === false) continue;
      if (typeof c === "string" || typeof c === "number") {
        el.appendChild(document.createTextNode(String(c)));
      } else {
        el.appendChild(c);
      }
    }
  }
  return el;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

function clearRoot() {
  const root = document.getElementById("root");
  while (root.firstChild) root.removeChild(root.firstChild);
}

function render(opts) {
  try {
    const preserveScroll = opts && opts.preserveScroll;
    const prevScrollY = preserveScroll ? window.scrollY : null;
    clearRoot();
    let view_el;
    if (view === "onboarding") view_el = renderOnboarding();
    else if (view === "diagnostic") view_el = renderDiagnostic();
    else if (view === "study") view_el = renderStudy();
    else if (view === "reading") view_el = renderReading();
    else if (view === "match") view_el = renderMatch();
    else if (view === "progress") view_el = renderProgress();
    else if (view === "browse") view_el = renderBrowse();
    else if (view === "dashboard") view_el = renderDashboard();
    else view_el = h("div", { class: "loading" }, "LOADING…");
    document.getElementById("root").appendChild(view_el);
    if (preserveScroll) {
      window.scrollTo(0, prevScrollY);
    } else {
      window.scrollTo(0, 0);
    }
  } catch (err) {
    showError(err);
  }
}

function showError(err) {
  const display = document.getElementById("error-display");
  display.style.display = "block";
  display.textContent = "ERROR\n\n" + (err.message || err) + "\n\nStack:\n" + (err.stack || "(no stack)") + "\n\nReload to retry.";
}

function setView(v) {
  view = v;
  viewState = {};
  render();
}

/* ============================================================
   SCREEN: SHELL WRAPPERS
   ============================================================ */

function shell(content) {
  return h("div", { class: "shell" }, [h("div", { class: "container" }, content)]);
}

function header(subtitle, title, right) {
  return h("div", { class: "header" }, [
    h("div", null, [
      subtitle ? h("div", { class: "header-subtitle mono" }, subtitle) : null,
      h("h1", { class: "header-title" }, title),
    ]),
    right || null,
  ]);
}

// Reusable back-link button (rendered in header right slot OR standalone)
function backLink(label, onClick) {
  return h("button", {
    class: "footer-link mono",
    onClick: onClick,
  }, label || "← Back");
}

// Back row above content (for screens that don't use header right slot)
function backRow(label, onClick) {
  return h("div", { class: "back-row" }, [
    h("button", { class: "footer-link mono", onClick: onClick }, label || "← Back"),

}

/* ============================================================
   SCREEN: ONBOARDING

function renderOnboarding() {
  const step = viewState.step || 0;
  const examDate = viewState.examDate || "2026-07-05";
  const dailyMinutes = viewState.dailyMinutes || 45;

  if (step === 0) {
    return shell([
      h("div", { class: "onb-hero" }, [
        h("div", { class: "tag-accent mono" }, "N3 · BETA v3"),
        h("h1", { class: "onb-title" }, "日本語能力試験"),
        h("h2", { class: "onb-subtitle jp" }, "N3への最短ルート"),
        h("p", { class: "onb-lead" }, "The most efficient path to N3 — backed by spaced repetition and analysis of past exams."),
        h("p", { class: "onb-note" }, "This beta includes vocabulary, kanji, grammar, and graded reading passages."),
        h("button", {
          class: "btn-primary mono",
          onClick: function () {
            viewState.step = 1;
            viewState.examDate = examDate;
            viewState.dailyMinutes = dailyMinutes;
            render();
          },
        }, "Begin →"),
      ]),

  }

  if (step === 1) {
    return shell([
      backRow("← Back", function () {
        viewState.step = 0;
        render();
      }),
      header("Step 1 of 2", "When is your exam?"),
      h("div", null, [
        h("label", { class: "label mono" }, "EXAM DATE"),
        (function () {
          const inp = h("input", {
            type: "date",
