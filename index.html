  let senseiTip = "";
  if (proj.daysLeft <= 7) {
    senseiMood = "determined";
    senseiTip = "Final stretch — focus on weak items, keep the streak alive.";
  } else if (streak >= 7) {
    senseiMood = "proud";
    senseiTip = streak + " days strong! Your discipline shows.";
  } else if (todayTotal === 0 && (state.cards && Object.keys(state.cards).length > 0)) {
    senseiMood = "happy";
    senseiTip = "All caught up for today! A rested mind learns deeper.";
  } else if (proj.projectedMasteryPct < 65) {
    senseiMood = "worried";
    senseiTip = "We need to pick up the pace, my pup. One session at a time.";
  } else if (todayTotal > 20) {
    senseiMood = "determined";
    senseiTip = "Big day ahead — but you've trained for this. Begin.";
  } else {
    senseiMood = "calm";
    senseiTip = "A good day to learn. Tap your section, then begin.";
  }
  const senseiDashboard = h("div", { class: "sensei-dashboard" }, [
    inuSensei(senseiMood, 60),
    h("div", { class: "sensei-dashboard-text" }, senseiTip),

  // ----- Mood Tools card -----
  const moodCard = h("div", { class: "card surface border mood-card-accent" }, [
    h("div", { class: "card-label-row" }, [
      h("div", { class: "card-label mono type-mood-text" }, "MOOD TOOLS"),
      h("div", { class: "card-counter mono" }, "🎨 " + MOOD_TOOLS.length + " STICKERS"),
    ]),
    h("div", { class: "match-blurb" }, "Mood stickers for natural Japanese · soften your speech · sound friendlier."),
    h("button", {
      class: "btn-secondary mono full",
      onClick: function () { setView("moods"); },
    }, "Explore mood tools →"),
  ]);

  return shell([
    header(proj.daysLeft + " DAYS TO EXAM", "今日の計画", right),
    topBanner,
    senseiDashboard,
    sectionSelector,
    todayCard,
    readingCard,
    matchCard,
    examCard,
    moodCard,
    progressBar,
    breakdown,
    footer,
  ]);
}

/* ============================================================
   SCREEN: STUDY
   ============================================================ */

function renderStudy() {
  if (!viewState.queue) {
    const q = [];
    const queue = buildTodayQueue(state.section || "all");
    const dueArr = queue.due.slice();
    const newArr = queue.newItems.slice();
    while (dueArr.length || newArr.length) {
      if (dueArr.length) q.push({ kind: "review", item: dueArr.shift().item });
      if (newArr.length) q.push({ kind: "new", item: newArr.shift() });
      if (dueArr.length) q.push({ kind: "review", item: dueArr.shift().item });
    }
    viewState.queue = q;
    viewState.idx = 0;
    viewState.localCards = Object.assign({}, state.cards || {});
    viewState.completed = 0;
    viewState.revealed = false;
    viewState.undoStack = [];
    viewState.weakItems = []; // ids rated Again or Hard during this session
    viewState.inWeakRound = false;
    viewState.weakRoundOffered = false;
  }

  // End-of-queue branching: weak items round prompt or completion
  if (viewState.idx >= viewState.queue.length) {
    // Offer weak-items round if not yet done and there are weak items
    if (!viewState.inWeakRound && !viewState.weakRoundOffered && viewState.weakItems.length > 0) {
      viewState.weakRoundOffered = true;
      return shell([
        header("Mid-session", "弱点復習"),
        h("div", { class: "card surface border center" }, [
          h("div", { class: "weak-icon" }, "🎯"),
          h("h2", { class: "weak-h" }, "Weak items round"),
          h("p", { class: "weak-p" }, "You marked " + viewState.weakItems.length + " card" + (viewState.weakItems.length === 1 ? "" : "s") + " as Again or Hard. Reviewing them now reinforces them while they're still fresh."),
          h("div", { class: "weak-buttons" }, [
            h("button", {
              class: "btn-primary mono full",
              onClick: function () {
                // Build a new queue from weak items
                const weakQueue = viewState.weakItems.map(function (id) {
                  const it = allItems().find(function (x) { return x.id === id; });
                  return it ? { kind: "review", item: it } : null;
                }).filter(Boolean);
                viewState.queue = weakQueue;
                viewState.idx = 0;
                viewState.weakItems = [];
                viewState.inWeakRound = true;
                viewState.revealed = false;
                render();
              },
            }, "Review weak items (" + viewState.weakItems.length + ") →"),
            h("button", {
              class: "btn-secondary mono full skip-btn",
              onClick: function () {
                viewState.weakItems = [];
                render();
              },
            }, "Skip → finish session"),
          ]),
        ]),
      ]);
    }

    // Final completion screen with celebration
    const finalProj = projectReadiness();
    const newMastered = Object.values(viewState.localCards).filter(function (c) {
      return c.stability > 7 && c.status === "review";
    }).length;
    // Compute milestone using new mastered count
    const milestoneToShow = (function () {
      const ms = (state.milestonesShown || []).slice();
      for (let i = 0; i < MILESTONES.length; i++) {
        const m = MILESTONES[i];
        if (newMastered >= m.mastered && ms.indexOf(m.mastered) === -1) {
          return m;
        }
      }
      return null;
    })();
    const encouragement = pickEncouragement(viewState.completed);

    return shell([
      header("Session Complete", "お疲れさまでした"),
      milestoneToShow
        ? h("div", { class: "card milestone-card" }, [
            h("div", { class: "milestone-jp jp" }, milestoneToShow.jp),
            h("div", { class: "milestone-label mono" }, "MILESTONE · " + milestoneToShow.label.toUpperCase()),
            h("div", { class: "milestone-note" }, milestoneToShow.note),
          ])
        : null,
      h("div", { class: "card surface border center" }, [
        h("div", { class: "big-num" }, String(viewState.completed)),
        h("div", { class: "stat-label mono" }, "CARDS COMPLETED"),
        h("p", { class: "encouragement" }, encouragement),
        h("button", {
          class: "btn-primary mono",
          onClick: function () {
            state.cards = viewState.localCards;
            state.sessions = (state.sessions || 0) + 1;
            updateStreak();
            // Persist milestone if shown
            if (milestoneToShow) {
              state.milestonesShown = state.milestonesShown || [];
              if (state.milestonesShown.indexOf(milestoneToShow.mastered) === -1) {
                state.milestonesShown.push(milestoneToShow.mastered);
              }
            }
            saveState();
            setView("dashboard");
          },
        }, "Back to Dashboard →"),
      ]),
    ]);
  }

  const current = viewState.queue[viewState.idx];
  const item = current.item;
  const kind = current.kind;
  const existing = viewState.localCards[item.id] || initCard(item.id, item.type);

  function handleRate(rating) {
    // Snapshot for undo
    viewState.undoStack.push({
      idx: viewState.idx,
      localCards: Object.assign({}, viewState.localCards),
      queue: viewState.queue.slice(),
      completed: viewState.completed,
      weakItems: viewState.weakItems.slice(),
    });
    const updated = schedule(existing, rating);
    viewState.localCards[item.id] = updated;
    viewState.completed++;
    // Track weak items for end-of-session re-review
    if (!viewState.inWeakRound && (rating === RATING.AGAIN || rating === RATING.HARD)) {
      if (viewState.weakItems.indexOf(item.id) === -1) {
        viewState.weakItems.push(item.id);
      }
    }
    if (rating === RATING.AGAIN && kind === "review" && viewState.idx < viewState.queue.length - 1) {
      const insertAt = Math.min(viewState.idx + 3, viewState.queue.length);
      viewState.queue.splice(insertAt, 0, { kind: kind, item: item });
    }
    viewState.idx++;
    viewState.revealed = false;
    render();
  }

  function handleUndo() {
    if (viewState.undoStack.length === 0) return;
    const prev = viewState.undoStack.pop();
    viewState.idx = prev.idx;
    viewState.localCards = prev.localCards;
    viewState.queue = prev.queue;
    viewState.completed = prev.completed;
    if (prev.weakItems) viewState.weakItems = prev.weakItems;
    viewState.revealed = true; // show the answer side since they're going back
    render();
  }

  // Build card display
  const cardChildren = [];
  // JLPT N3 badge in top-right of card
  cardChildren.push(h("div", { class: "card-n3-badge mono" }, "N3"));
  if (item.type === "vocab") {
    cardChildren.push(h("div", { class: "card-jp-large jp" }, item.jp));
    if (viewState.revealed) {
      cardChildren.push(h("div", { class: "card-reading jp" }, item.r));
      cardChildren.push(h("div", { class: "card-meaning" }, item.en));
      cardChildren.push(h("div", { class: "card-section" }, [
        h("div", { class: "section-label mono" }, "Example"),
        h("div", { class: "card-example jp" }, item.ex),
        item.ex_en ? h("div", { class: "card-example-en" }, item.ex_en) : null,
      ]));
      const vocabMnem = deriveVocabMnemonic(item);
      if (vocabMnem) {
        cardChildren.push(h("div", { class: "card-section" }, [
          h("div", { class: "section-label mono" }, "Memory aid"),
          h("div", { class: "section-text mnem-text" }, vocabMnem),
        ]));
      }
    }
  } else if (item.type === "kanji") {
    cardChildren.push(h("div", { class: "card-jp-huge jp" }, item.jp));
    if (viewState.revealed) {
      cardChildren.push(h("div", { class: "card-meaning" }, item.meaning));
      cardChildren.push(h("div", { class: "card-onkun mono" }, [
        "On: ",
        h("span", { class: "jp" }, item.on),
        " · Kun: ",
        h("span", { class: "jp" }, item.kun),
      ]));
      cardChildren.push(h("div", { class: "card-section" }, [
        h("div", { class: "section-label mono" }, "Components"),
        h("div", { class: "section-text jp" }, item.comp),
        h("div", { class: "section-label mono" }, "Mnemonic"),
        h("div", { class: "section-text mnem-text" }, item.mnem),
      ]));
    }
  } else {
    cardChildren.push(h("div", { class: "card-jp-medium jp" }, item.jp));
    if (viewState.revealed) {
      cardChildren.push(h("div", { class: "card-meaning" }, item.meaning));
      cardChildren.push(h("div", { class: "card-section" }, [
        h("div", { class: "section-label mono" }, "Explanation"),
        h("div", { class: "section-text" }, item.explanation),
      ]));
      cardChildren.push(h("div", { class: "card-section" }, [
        h("div", { class: "section-label mono" }, "Example"),
        h("div", { class: "section-text jp" }, item.ex),
        item.ex_en ? h("div", { class: "section-text-en" }, item.ex_en) : null,
      ]));
      if (item.mnem) {
        cardChildren.push(h("div", { class: "card-section" }, [
          h("div", { class: "section-label mono" }, "Memory aid"),
          h("div", { class: "section-text mnem-text" }, item.mnem),
        ]));
      }
    }
  }

  const cardEl = h("div", { class: "card surface border study-card type-" + item.type }, cardChildren);

  let actions;
  if (!viewState.revealed) {
    actions = h("button", {
      class: "btn-secondary mono full reveal",
      onClick: function () { viewState.revealed = true; render(); },
    }, "Reveal ↓");
  } else {
    actions = h("div", { class: "btn-row-4" }, [
      h("button", { class: "btn-rate again mono", onClick: function () { handleRate(RATING.AGAIN); } }, "Again"),
      h("button", { class: "btn-rate hard mono", onClick: function () { handleRate(RATING.HARD); } }, "Hard"),
      h("button", { class: "btn-rate good mono", onClick: function () { handleRate(RATING.GOOD); } }, "Good"),
      h("button", { class: "btn-rate easy mono", onClick: function () { handleRate(RATING.EASY); } }, "Easy"),
    ]);
  }

  return shell([
    h("div", { class: "study-bar" }, [
      h("div", null, [
        h("button", {
          class: "footer-link mono",
          onClick: function () {
            state.cards = viewState.localCards;
            saveState();
            setView("dashboard");
          },
        }, "← Dashboard"),
      ]),
      h("div", { class: "study-counter mono" }, (viewState.idx + 1) + " / " + viewState.queue.length),
    ]),
    h("div", { class: "study-kind-row mono type-" + item.type + "-text" }, (kind === "new" ? "★ New" : "↻ Review") + " · " + item.type),
    h("div", { class: "study-progress" }, [
      h("div", {
        class: "study-progress-fill",
        style: "width:" + (((viewState.idx + 1) / viewState.queue.length) * 100) + "%",
      }),
    ]),
    cardEl,
    actions,
    viewState.undoStack.length > 0
      ? h("div", { class: "undo-row" }, [
          h("button", {
            class: "footer-link mono",
            onClick: handleUndo,
          }, "↶ Undo last rating"),
        ])
      : null,
    viewState.revealed
      ? h("div", { class: "report-row" }, [reportBtn(Object.assign({}, item))])
      : null,
  ]);
}

/* ============================================================
   SCREEN: READING
   ============================================================ */

function renderReading() {
  const done = state.readingsDone || [];
  const next = READINGS.find(function (r) { return done.indexOf(r.id) === -1; });
  if (!next) {
    return shell([
      header("Reading", "All passages complete"),
      h("button", {
        class: "btn-primary mono full",
        onClick: function () { setView("dashboard"); },
      }, "Back →"),
    ]);
  }

  if (!viewState.phase) {
    viewState.phase = "read";
    viewState.answers = [];
  }

  if (viewState.phase === "read") {
    return shell([
      header("Reading · " + (done.length + 1) + "/" + READINGS.length, next.title,
        h("div", { class: "header-en mono" }, next.title_en)
      ),
      h("div", { class: "card surface border passage" }, [
        h("div", { class: "passage-text jp" }, next.passage),
      ]),
      h("button", {
        class: "btn-primary mono full",
        onClick: function () { viewState.phase = "questions"; render(); },
      }, "Answer questions →"),
      h("div", { style: "margin-top:16px; display:flex; justify-content:space-between; align-items:center;" }, [
        h("button", {
          class: "footer-link mono",
          onClick: function () { setView("dashboard"); },
        }, "Exit"),
        reportBtn(next),
      ]),
    ]);
  }

  if (viewState.phase === "questions") {
    const questionEls = next.questions.map(function (q, qi) {
      const optionEls = q.options.map(function (opt, oi) {
        const selected = viewState.answers[qi] === oi;
        return h("button", {
          class: "option-btn jp" + (selected ? " selected" : ""),
          onClick: function () {
            viewState.answers[qi] = oi;
            render();
          },
        }, [
          h("span", { class: "mono opt-letter" }, String.fromCharCode(65 + oi)),
          opt,
        ]);
      });
      return h("div", { class: "card surface border question" }, [
        h("div", { class: "question-text jp" }, q.q),
        h("div", { class: "options" }, optionEls),
      ]);
    });
    const allAnswered = next.questions.every(function (_, qi) {
      return viewState.answers[qi] !== undefined;
    });
    return shell([
      backRow("← Re-read passage", function () {
        viewState.phase = "read";
        render();
      }),
      header("Reading · Questions", next.title),
      h("div", { class: "questions-list" }, questionEls),
      h("button", {
        class: "btn-primary mono full check-btn" + (allAnswered ? "" : " disabled"),
        onClick: function () {
          if (allAnswered) {
            viewState.phase = "results";
            render();
          }
        },
      }, "Check →"),
    ]);
  }

  // results
  let correct = 0;
  next.questions.forEach(function (q, qi) {
    if (viewState.answers[qi] === q.a) correct++;
  });
  const resultEls = next.questions.map(function (q, qi) {
    const isRight = viewState.answers[qi] === q.a;
    const children = [
      h("div", { class: "result-q jp" }, q.q),
      h("div", { class: "result-you mono" }, [
        "You: ",
        h("span", { class: "jp" }, q.options[viewState.answers[qi]] || "—"),
      ]),
    ];
    if (!isRight) {
      children.push(h("div", { class: "result-correct mono" }, [
        "Correct: ",
        h("span", { class: "jp" }, q.options[q.a]),
      ]));
    }
    return h("div", { class: "result-card surface " + (isRight ? "right" : "wrong") }, children);
  });
  return shell([
    header("Reading · Results", next.title),
    h("div", { class: "card surface border center" }, [
      h("div", { class: "big-num" }, correct + " / " + next.questions.length),
      h("div", { class: "stat-label mono" }, "CORRECT"),
    ]),
    h("div", { class: "results-list" }, resultEls),
    h("button", {
      class: "btn-primary mono full",
      onClick: function () {
        state.readingsDone = (state.readingsDone || []).concat([next.id]);
        saveState();
        setView("dashboard");
      },
    }, "Back to Dashboard →"),
  ]);
}

// ----- Stages -----
const STAGES = [
  { id: 1, pairs: 6, label: "Stage 1", jp: "初級", en: "Beginner", desc: "6 pairs — gentle warmup" },
  { id: 2, pairs: 8, label: "Stage 2", jp: "中級", en: "Intermediate", desc: "8 pairs — standard challenge" },
  { id: 3, pairs: 10, label: "Stage 3", jp: "上級", en: "Advanced", desc: "10 pairs — push yourself" },
  { id: 4, pairs: 12, label: "Stage 4", jp: "達人", en: "Master", desc: "12 pairs — for sensei-level only" },
  // Trial stages — same 12 pairs but with bonus objectives. Failing the objective never blocks progress.
  { id: 5, pairs: 12, label: "Stage 5", jp: "速度の試練", en: "Speed Trial", desc: "Clear in under 60 seconds", icon: "⚡", trial: { type: "speed", limit: 60 } },
  { id: 6, pairs: 12, label: "Stage 6", jp: "正確の試練", en: "Accuracy Trial", desc: "Max 3 mistakes allowed", icon: "✨", trial: { type: "perfect", maxMiss: 3 } },
  { id: 7, pairs: 12, label: "Stage 7", jp: "連撃の試練", en: "Combo Trial", desc: "Land a 5-combo streak", icon: "🔥", trial: { type: "combo", minCombo: 5 } },
  { id: 8, pairs: 12, label: "Stage 8", jp: "最終の試練", en: "Final Trial", desc: "All three: speed + accuracy + combo", icon: "⭐", trial: { type: "final", limit: 90, maxMiss: 4, minCombo: 4 } },
];

// Get stage definition by ID. For id > 8, procedurally generate endless stages.
function getStageById(id) {
  if (id >= 1 && id <= STAGES.length) return STAGES[id - 1];
  if (id > STAGES.length) {
    // Endless mode — same 12-pair game, personal-best chasing
    const endlessNum = id - STAGES.length;
    return {
      id: id,
      pairs: 12,
      label: "Stage " + id,
      jp: "達人の道",
      en: "Master's Path · " + endlessNum,
      desc: "Endless practice — beat your best",
      icon: "∞",
      endless: true,
    };
  }
  return STAGES[0];
}

// Highest stage user has unlocked in a section (for endless mode discovery)
function getMaxUnlockedStage(section) {
  const progress = (state.stageProgress && state.stageProgress[section]) || {};
  let maxCleared = 0;
  Object.keys(progress).forEach(function (id) {
    if (progress[id].cleared) maxCleared = Math.max(maxCleared, parseInt(id, 10));
  });
  // Next stage is unlocked
  return maxCleared + 1;
}

// ----- Confetti for stage clear celebrations -----
function fireConfetti() {
  // Remove any existing container first (so re-fires don't pile up)
  const existing = document.querySelector('.confetti-container');
  if (existing) existing.parentNode.removeChild(existing);

  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);

  const colors = ['#B33A3A', '#C47E1F', '#4A7C3A', '#7A9870', '#C9A876', '#1A1A1A', '#E8D5B7'];
  const pieceCount = 80;
  for (let i = 0; i < pieceCount; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (Math.random() * 100) + '%';
    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.animationDuration = (1.8 + Math.random() * 1.4) + 's';
    // Some pieces tilt different angles via transform-origin offset
    piece.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
    if (Math.random() > 0.5) {
      piece.style.width = '7px';
      piece.style.height = '7px';
      piece.style.borderRadius = '50%'; // round confetti for variety
    }
    container.appendChild(piece);

  // Clean up after animations finish
  setTimeout(function () {
    if (container.parentNode) container.parentNode.removeChild(container);
  }, 4000);
}

// ----- Stage progress state -----
// Stored as state.stageProgress[section][stageId] = {bestScore, bestTime, cleared: true}
function getStageProgress(section, stageId) {
  if (!state.stageProgress) state.stageProgress = {};
  if (!state.stageProgress[section]) state.stageProgress[section] = {};
  return state.stageProgress[section][stageId] || null;
}
function setStageProgress(section, stageId, data) {
  if (!state.stageProgress) state.stageProgress = {};
  if (!state.stageProgress[section]) state.stageProgress[section] = {};
  const existing = state.stageProgress[section][stageId] || {};

  const newScore = Math.max(existing.bestScore || 0, data.score || 0);
  const newTime = existing.bestTime ? Math.min(existing.bestTime, data.time || 999) : (data.time || 999);
  const newCombo = Math.max(existing.bestCombo || 0, data.combo || 0);

  // Star tracking: ★ for clearing puzzle, ★ extra for passing trial objective
  const stars = Math.max(existing.stars || 0, data.stars || 1);

  state.stageProgress[section][stageId] = {
    cleared: true,
    bestScore: newScore,
    bestTime: newTime,
    bestCombo: newCombo,
    stars: stars,
    trialPassed: existing.trialPassed || data.trialPassed || false,
    clears: (existing.clears || 0) + 1,
  };

  // Track whether this run set new personal records (for sensei reaction)
  state.stageProgress[section][stageId]._newRecord =
    (data.score && data.score > (existing.bestScore || 0)) ||
    (data.time && (!existing.bestTime || data.time < existing.bestTime));

  saveState();
}
function isStageUnlocked(section, stageId) {
  if (stageId === 1) return true; // Stage 1 always open
  const prev = getStageProgress(section, stageId - 1);
  return prev && prev.cleared;
}

// ----- In-progress game save/restore -----
// Called after every tap to persist game state. Restored on app reopen.
function saveMatchInProgress(section, stageId) {
  if (!viewState.gameStarted || !viewState.gameCards) return;
  // Compute elapsed seconds so the timer "pauses" when the tab is closed
  const elapsedSec = Math.round((Date.now() - viewState.startTime) / 1000);
  // Strip item objects down to just itemId (re-hydrated on restore from corpus)
  const slimCards = viewState.gameCards.map(function (c) {
    return { pairId: c.pairId, face: c.face, itemId: c.item.id, id: c.id };
  });
  if (!state.matchInProgress) state.matchInProgress = {};
  state.matchInProgress[section + ":" + stageId] = {
    stageId: stageId,
    gameCards: slimCards,
    matched: viewState.matched || {},
    attempts: viewState.attempts || 0,
    misses: viewState.misses || 0,
    bestCombo: viewState.bestCombo || 0,
    elapsedSec: elapsedSec,
  };
  saveState();
}

function clearMatchInProgress(section, stageId) {
  if (!state.matchInProgress) return;
  delete state.matchInProgress[section + ":" + stageId];
  saveState();
}

function renderStageSelect(section) {
  const introLine = pickSenseiLine("intro");
  const sectionLabel = section.toUpperCase();

  // Determine sensei mood: proud if all clear, calm otherwise
  const allCleared = STAGES.every(function (s) {
    const p = getStageProgress(section, s.id);
    return p && p.cleared;
  });
  const mood = allCleared ? "proud" : "calm";

  // Build list of stage IDs to display: all named stages (1-8) plus any unlocked endless stages
  const stageIds = STAGES.map(function (s) { return s.id; });
  const maxUnlocked = getMaxUnlockedStage(section);
  // If user has unlocked beyond Stage 8, show endless stages too
  for (let i = STAGES.length + 1; i <= maxUnlocked; i++) {
    stageIds.push(i);
  }

  const stageCards = stageIds.map(function (stageId) {
    const stage = getStageById(stageId);
    const progress = getStageProgress(section, stage.id);
    const unlocked = isStageUnlocked(section, stage.id);
    const cleared = progress && progress.cleared;

    const cls = "stage-card mono"
      + (cleared ? " cleared" : "")
      + (!unlocked ? " locked" : "")
      + (stage.trial ? " trial" : "")
      + (stage.endless ? " endless" : "");

    // Star display: 1 star for clear, 2 stars if trial passed
    let starsEl = null;
    if (cleared && stage.trial) {
      const earned = progress.stars || 1;
      starsEl = h("div", { class: "stage-stars" }, [
        h("span", { class: "star earned" }, "★"),
        earned >= 2 ? h("span", { class: "star earned" }, "★") : h("span", { class: "star empty" }, "☆"),
      ]);
    }

    const stats = cleared ? h("div", { class: "stage-stats" }, [
      h("span", null, "BEST " + (progress.bestScore || 0) + "pt"),
      h("span", null, "·"),
      h("span", null, (progress.bestTime || 0) + "s"),
      (progress.bestCombo || 0) >= 3 ? h("span", null, "· 🔥" + progress.bestCombo) : null,
      progress.clears > 1 ? h("span", { class: "stage-clears" }, "×" + progress.clears) : null,
    ]) : null;

    return h("button", {
      class: cls,
      disabled: !unlocked,
      onClick: !unlocked ? null : function () {
        viewState = { stageId: stage.id, gameStarted: false };
        render();
      },
    }, [
      h("div", { class: "stage-row" }, [
        h("div", { class: "stage-label-block" }, [
          h("div", { class: "stage-name" }, [
            stage.icon ? h("span", { class: "stage-icon" }, stage.icon + " ") : null,
            stage.label,
          ]),
          h("div", { class: "stage-jp jp" }, stage.jp + " · " + stage.en),
        ]),
        h("div", { class: "stage-meta" }, [
          h("div", { class: "stage-pairs" }, stage.pairs + " pairs"),
          starsEl,
          (cleared && !stage.trial) ? h("div", { class: "stage-checkmark" }, "✓") : null,
          !unlocked ? h("div", { class: "stage-lock" }, "🔒") : null,
        ]),
      ]),
      h("div", { class: "stage-desc" }, stage.desc),
      stats,
    ]);
  });

  // If user just cleared the highest stage, show a "Stage N is next" preview card with prompt
  const nextLockedId = maxUnlocked + 1;
  if (maxUnlocked >= STAGES.length && nextLockedId > stageIds[stageIds.length - 1]) {
    const nextStage = getStageById(nextLockedId);
    stageCards.push(h("div", { class: "stage-card locked next-preview" }, [
      h("div", { class: "stage-row" }, [
        h("div", { class: "stage-label-block" }, [
          h("div", { class: "stage-name" }, [
            nextStage.icon ? h("span", { class: "stage-icon" }, nextStage.icon + " ") : null,
            nextStage.label,
          ]),
          h("div", { class: "stage-jp jp" }, nextStage.jp + " · " + nextStage.en),
        ]),
        h("div", { class: "stage-meta" }, [
          h("div", { class: "stage-pairs" }, nextStage.pairs + " pairs"),
          h("div", { class: "stage-lock" }, "🔒"),
        ]),
      ]),
      h("div", { class: "stage-desc" }, "Clear the previous stage to unlock"),
    ]));
  }

  return shell([
    backRow("← Dashboard", function () {
      viewState = {};
      setView("dashboard");
    }),
    header("Match Game · " + sectionLabel, "ペア合わせ"),
    h("div", { class: "sensei-block" }, [
      inuSensei(mood, 100),
      h("div", { class: "sensei-bubble" }, [
        h("div", { class: "sensei-jp jp" }, introLine.jp),
        introLine.reading ? h("div", { class: "sensei-reading jp" }, introLine.reading) : null,
        h("div", { class: "sensei-en" }, introLine.en),
      ]),
    ]),
    h("div", { class: "stage-select-heading mono" }, "Choose a stage"),
    h("div", { class: "stage-grid" }, stageCards),
  ]);
}

function renderMatch() {
  const section = state.section || "vocab";

  // -------- STAGE SELECT SCREEN --------
  // Show stage select only if user hasn't picked AND there's no last-played stage to resume
  if (!viewState.stageId && !viewState.gameStarted) {
    // Check for a last-played stage to resume into
    if (state.lastStageId && state.lastStageId[section] && !viewState._cameFromStageSelect) {
      viewState.stageId = state.lastStageId[section];
    } else {
      return renderStageSelect(section);
    }
  }

  // -------- Setup new game on first render --------
  if (!viewState.gameStarted) {
    // Stage determines pair count — use getStageById for endless support
    const stage = getStageById(viewState.stageId || 1);
    const desiredPairs = stage.pairs;
    viewState.stage = stage;

    // Persist last-played stage for resume-on-return
    if (!state.lastStageId) state.lastStageId = {};
    state.lastStageId[section] = stage.id;
    saveState();

    // ---- Try to restore an in-progress game ----
    // saved key includes section + stageId so different stages don't collide
    const saveKey = section + ":" + stage.id;
    const savedGame = (state.matchInProgress && state.matchInProgress[saveKey]) || null;
    let restored = false;

    if (savedGame && savedGame.stageId === stage.id && Array.isArray(savedGame.gameCards)
        && savedGame.gameCards.length === desiredPairs * 2) {
      try {
        // Re-hydrate item references from current corpus (item objects in saved data are stale)
        const allItemsById = {};
        allItems().forEach(function (it) { allItemsById[it.id] = it; });
        const hydrated = savedGame.gameCards.map(function (c) {
          const fullItem = allItemsById[c.itemId];
          if (!fullItem) return null; // item no longer exists
          return { pairId: c.pairId, face: c.face, item: fullItem, id: c.id };
        });
        if (hydrated.every(function (c) { return c !== null; })) {
          // Successful hydration — restore the game
          viewState.gameStarted = true;
          viewState.gameCards = hydrated;
          viewState.selected = null;
          viewState.matched = savedGame.matched || {};
          viewState.attempts = savedGame.attempts || 0;
          viewState.matches = Object.keys(viewState.matched).length;
          viewState.misses = savedGame.misses || 0;
          viewState.totalPairs = desiredPairs;
          viewState.elapsedAtFinish = null;
          viewState.feedback = null;
          viewState.desiredPairs = desiredPairs;
          viewState.lockUntil = 0;
          viewState.combo = 0; // combo always resets when leaving
          viewState.bestCombo = savedGame.bestCombo || 0;
          // Compute start time so that elapsedSec(startTime, now) == savedGame.elapsedSec
          viewState.startTime = Date.now() - (savedGame.elapsedSec || 0) * 1000;
          viewState.resumed = true; // for one-time UI banner
          restored = true;
        }
      } catch (e) {
        // Hydration failed — fall through to fresh deal
        console.warn("Failed to restore saved game:", e);
      }
    }

    if (!restored) {
      // ---- Fresh new game setup ----
      const sectionPool = filterBySection(allItems(), state.section || "all");
      const cards = state.cards || {};
      const learnedItems = sectionPool.filter(function (i) { return cards[i.id]; });

    // Build the candidate pool, preferring learned items + high-priority unseen.
    // Pool must be substantially larger than the recently-seen window so we can
    // always find fresh items across many consecutive games.
    let pool;
    if (learnedItems.length >= desiredPairs * 3) {
      // Plenty of learned items — use only those for retention practice
      pool = learnedItems;
    } else {
      const unseen = sectionPool
        .filter(function (i) { return !cards[i.id]; })
        .sort(function (a, b) { return getPriority(b) - getPriority(a); });
      // Pull a large slice — much bigger than the recently-seen cap so rotation works.
      // For 8-pair games, recent cap is 64; pool should be at least 150 to give breathing room.
      pool = learnedItems.concat(unseen.slice(0, Math.max(desiredPairs * 20, 150)));
    }

    // Avoid items used in recent games (persisted across sessions)
    state.matchRecentlySeen = state.matchRecentlySeen || [];
    const recentSet = {};
    state.matchRecentlySeen.forEach(function (id) { recentSet[id] = true; });

    const freshPool = pool.filter(function (i) { return !recentSet[i.id]; });
    const fallbackPool = pool.filter(function (i) { return recentSet[i.id]; });

    // Pick from fresh items first; fall back to recent only if not enough fresh
    function shuffle(arr) {
      const out = arr.slice();
      for (let i = out.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = out[i]; out[i] = out[j]; out[j] = tmp;
      }
      return out;
    }
    let chosenPairs = shuffle(freshPool).slice(0, desiredPairs);
    if (chosenPairs.length < desiredPairs) {
      // Not enough fresh — top up with the least-recently-used items
      // (matchRecentlySeen is ordered oldest→newest, so we filter from the start)
      const recentOrder = {};
      state.matchRecentlySeen.forEach(function (id, idx) { recentOrder[id] = idx; });
      const sortedFallback = fallbackPool.slice().sort(function (a, b) {
        return (recentOrder[a.id] || 0) - (recentOrder[b.id] || 0);
      });
      const need = desiredPairs - chosenPairs.length;
      chosenPairs = chosenPairs.concat(sortedFallback.slice(0, need));
    }

    // If we STILL don't have enough (very small section), the section is too small;
    // we'll just play with what we have rather than crash.
    if (chosenPairs.length === 0) {
      // Fallback shouldn't normally happen but guard against it
      chosenPairs = shuffle(pool).slice(0, desiredPairs);
    }

    // Update recently-seen list with the items we picked.
    // Cap chosen so we can play many consecutive games before any word repeats.
    // For 8 pairs: cap of 64 means 8 games of completely fresh content before any repeat.
    const cap = Math.max(desiredPairs * 8, 64);
    const newIds = chosenPairs.map(function (i) { return i.id; });
    state.matchRecentlySeen = state.matchRecentlySeen
      .filter(function (id) { return newIds.indexOf(id) === -1; })  // remove dups
      .concat(newIds)
      .slice(-cap); // keep most recent N
    saveState();

    // Build all cards (JP + EN), mix into one shuffled deck
    const gameCards = [];
    chosenPairs.forEach(function (item, idx) {
      gameCards.push({ pairId: idx, face: "jp", item: item, id: "jp_" + idx });
      gameCards.push({ pairId: idx, face: "en", item: item, id: "en_" + idx });
    });
    for (let i = gameCards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = gameCards[i]; gameCards[i] = gameCards[j]; gameCards[j] = tmp;
    }

    // Assign a display number (1-N) per pair in the order they get matched.
    // We'll fill these in as matches happen.
    viewState.gameStarted = true;
    viewState.gameCards = gameCards;
    viewState.selected = null;        // {id, face} or null
    viewState.matched = {};            // {pairId: matchOrder (1-based)}
    viewState.attempts = 0;
    viewState.matches = 0;
    viewState.totalPairs = desiredPairs;
    viewState.startTime = Date.now();
    viewState.elapsedAtFinish = null;
    viewState.feedback = null;
    viewState.desiredPairs = desiredPairs;
    viewState.lockUntil = 0;
    viewState.combo = 0;
    viewState.bestCombo = 0;
    viewState.misses = 0;
    viewState.trialFailedReason = null;
    } // close if (!restored)
  }

  // -------- Win check --------
  const allMatched = viewState.matches === viewState.totalPairs;
  if (allMatched && viewState.elapsedAtFinish === null) {
    viewState.elapsedAtFinish = Math.round((Date.now() - viewState.startTime) / 1000);
    const accuracy = viewState.totalPairs / Math.max(1, viewState.attempts);
    const speedBonus = Math.max(0, 200 - viewState.elapsedAtFinish);
    const comboBonus = (viewState.bestCombo || 0) * 10;
    const score = Math.round(accuracy * 100 + speedBonus + comboBonus);
    viewState.gameScore = score;
    viewState.gameComboBonus = comboBonus;
    if (!state.matchHighScore || score > state.matchHighScore) {
      state.matchHighScore = score;
      viewState.newRecord = true;
    }
    state.matchGamesPlayed = (state.matchGamesPlayed || 0) + 1;

    // Clear saved in-progress game — this run is complete
    if (viewState.stage) {
      clearMatchInProgress(section, viewState.stage.id);
    }

    // ---- Trial evaluation ----
    let stars = 1; // Always earn 1 star for clearing the puzzle
    let trialPassed = false;
    let trialFailReason = null;
    const stage = viewState.stage;

    if (stage && stage.trial) {
      const trial = stage.trial;
      const time = viewState.elapsedAtFinish;
      const miss = viewState.misses || 0;
      const combo = viewState.bestCombo || 0;

      if (trial.type === "speed") {
        trialPassed = time <= trial.limit;
        if (!trialPassed) trialFailReason = "Time was " + time + "s (limit " + trial.limit + "s)";
      } else if (trial.type === "perfect") {
        trialPassed = miss <= trial.maxMiss;
        if (!trialPassed) trialFailReason = miss + " misses (max " + trial.maxMiss + ")";
      } else if (trial.type === "combo") {
        trialPassed = combo >= trial.minCombo;
        if (!trialPassed) trialFailReason = "Best combo: " + combo + " (need " + trial.minCombo + ")";
      } else if (trial.type === "final") {
        const okTime = time <= trial.limit;
        const okMiss = miss <= trial.maxMiss;
        const okCombo = combo >= trial.minCombo;
        trialPassed = okTime && okMiss && okCombo;
        if (!trialPassed) {
          const reasons = [];
          if (!okTime) reasons.push("time " + time + "s>" + trial.limit);
          if (!okMiss) reasons.push("misses " + miss + ">" + trial.maxMiss);
          if (!okCombo) reasons.push("combo " + combo + "<" + trial.minCombo);
          trialFailReason = reasons.join(", ");
        }
      }
      if (trialPassed) stars = 2;
    }

    viewState.gameStars = stars;
    viewState.trialPassed = trialPassed;
    viewState.trialFailReason = trialFailReason;

    // Record stage progress (per-section, per-stage)
    if (stage) {
      const prevProgress = getStageProgress(section, stage.id);
      const isFirstClear = !prevProgress || !prevProgress.cleared;

      setStageProgress(section, stage.id, {
        score: score,
        time: viewState.elapsedAtFinish,
        combo: viewState.bestCombo || 0,
        stars: stars,
        trialPassed: trialPassed,
      });

      // Pick sensei dialogue based on outcome
      const justClearedProgress = getStageProgress(section, stage.id);
      const beatRecord = justClearedProgress && justClearedProgress._newRecord;

      if (stage.endless && beatRecord && !isFirstClear) {
        viewState.senseiLine = pickSenseiLine("newRecord");
        viewState.senseiMood = "proud";
      } else if (stage.endless) {
        viewState.senseiLine = pickSenseiLine("endless");
        viewState.senseiMood = "happy";
      } else if (stage.trial && trialPassed) {
        viewState.senseiLine = pickSenseiLine("trialPass");
        viewState.senseiMood = "proud";
      } else if (stage.trial && !trialPassed) {
        viewState.senseiLine = pickSenseiLine("trialFail");
        viewState.senseiMood = "calm";
      } else if (stage.id === STAGES[STAGES.length - 1].id) {
        // After Stage 8: not allClear anymore (endless beyond)
        viewState.senseiLine = pickSenseiLine("clear");
        viewState.senseiMood = "happy";
      } else {
        viewState.senseiLine = pickSenseiLine("clear");
        viewState.senseiMood = "happy";
      }
    }
    saveState();
  }

  // -------- WIN SCREEN --------
  if (allMatched) {
    const stage = viewState.stage;
    const nextStage = stage ? getStageById(stage.id + 1) : null;
    const sLine = viewState.senseiLine || pickSenseiLine("clear");
    const sMood = viewState.senseiMood || "happy";

    // Fire confetti once per win (bigger celebration if trial passed)
    if (!viewState.confettiFired) {
      viewState.confettiFired = true;
      setTimeout(fireConfetti, 100);
    }

    return shell([
      header("Stage Cleared!", stage ? stage.jp + " 完成!" : "完成!"),
      h("div", { class: "card surface border match-win" }, [
        viewState.newRecord ? h("div", { class: "match-new-record mono" }, "★ NEW BEST") : null,
        h("div", { class: "sensei-block" }, [
          inuSensei(sMood, 110),
          h("div", { class: "sensei-bubble" }, [
            h("div", { class: "sensei-jp jp" }, sLine.jp),
            sLine.reading ? h("div", { class: "sensei-reading jp" }, sLine.reading) : null,
            h("div", { class: "sensei-en" }, sLine.en),
          ]),
        ]),
        // Trial result banner (only for stages with trials)
        (stage && stage.trial) ? h("div", {
          class: "trial-result " + (viewState.trialPassed ? "passed" : "failed"),
        }, [
          h("span", { class: "trial-result-icon" }, viewState.trialPassed ? "★★" : "★☆"),
          h("span", { class: "trial-result-text" },
            (stage.icon || "") + " " + stage.en + ": " +
            (viewState.trialPassed ? "PASSED" : "missed (" + (viewState.trialFailReason || "") + ")")
          ),
        ]) : null,
        h("div", { class: "match-stats" }, [
          h("div", null, [
            h("div", { class: "stat-num" }, String(viewState.matches)),
            h("div", { class: "stat-label mono" }, "PAIRS"),
          ]),
          h("div", null, [
            h("div", { class: "stat-num" }, viewState.elapsedAtFinish + "s"),
            h("div", { class: "stat-label mono" }, "TIME"),
          ]),
          h("div", null, [
            h("div", { class: "stat-num" }, String(viewState.attempts)),
            h("div", { class: "stat-label mono" }, "TRIES"),
          ]),
        ]),
        (viewState.bestCombo || 0) >= 2 ? h("div", { class: "win-combo-line" }, [
          h("span", { class: "win-combo-badge" }, "🔥 BEST STREAK"),
          h("span", { class: "win-combo-num" }, String(viewState.bestCombo)),
          h("span", { class: "win-combo-bonus mono" }, "+" + (viewState.gameComboBonus || 0) + " pts"),
        ]) : null,
        h("div", { class: "match-score-big" }, String(viewState.gameScore)),
        h("div", { class: "match-score-label mono" }, "SCORE"),
        // Next stage button — always works (endless extends forever)
        nextStage ? h("button", {
          class: "btn-primary mono full",
          style: "margin-top:20px",
          onClick: function () {
            const nextId = nextStage.id;
            viewState = { stageId: nextId, gameStarted: false };
            render();
          },
        }, "Next stage: " + nextStage.label + (nextStage.icon ? " " + nextStage.icon : "") + " →") : null,
        h("button", {
          class: "btn-secondary mono full",
          style: "margin-top:8px",
          onClick: function () {
            viewState = { stageId: stage ? stage.id : 1, gameStarted: false };
            render();
          },
        }, "Replay " + (stage ? stage.label : "this stage")),
        h("button", {
          class: "footer-link mono",
          style: "margin-top:12px;display:block;width:100%;",
          onClick: function () {
            // Going to stage select clears the auto-resume so user sees overview
            viewState = { _cameFromStageSelect: true };
            render();
          },
        }, "← Stage select"),
      ]),
    ]);
  }

  // -------- Tap handler with mixed-grid logic --------
  // Behavior:
  //   - First tap on unmatched tile selects it
  //   - Tap same tile again: deselects
  //   - Tap different tile, same face: switch selection (no penalty)
  //   - Tap different tile, opposite face: attempt match
  function handleTap(card) {
    if (Date.now() < viewState.lockUntil) return;
    if (viewState.matched[card.pairId]) return;
    // First interaction dismisses the "resumed" banner
    viewState.resumed = false;

    const sel = viewState.selected;
    if (!sel) {
      viewState.selected = { id: card.id, face: card.face };
    } else if (sel.id === card.id) {
      // Same tile = deselect
      viewState.selected = null;
    } else if (sel.face === card.face) {
      // Same side, different tile = switch selection (no penalty)
      viewState.selected = { id: card.id, face: card.face };
    } else {
      // Opposite face = attempt match
      const prev = viewState.gameCards.find(function (c) { return c.id === sel.id; });
      viewState.attempts++;
      if (prev.pairId === card.pairId) {
        // MATCH
        viewState.matches++;
        viewState.matched[card.pairId] = viewState.matches; // store the order
        viewState.combo = (viewState.combo || 0) + 1;
        if (viewState.combo > viewState.bestCombo) viewState.bestCombo = viewState.combo;
        viewState.feedback = { pairId: card.pairId, result: "match" };
        viewState.selected = null;

        // SCORE POP-UP: floats up from where the user just tapped
        const points = 10 + (viewState.combo > 1 ? (viewState.combo - 1) * 5 : 0);
        const tappedEl = document.querySelector('.pair-tile[data-tile-id="' + card.id + '"]');
        if (tappedEl) {
          const rect = tappedEl.getBoundingClientRect();
          const popup = document.createElement('div');
          let popupClass = "score-popup";
          let popupText = "+" + points;
          if (viewState.combo >= 5) {
            popupClass += " combo-big";
            popupText = "+" + points + " ✨ x" + viewState.combo;
          } else if (viewState.combo >= 3) {
            popupClass += " combo";
            popupText = "+" + points + " x" + viewState.combo;
          }
          popup.className = popupClass;
          popup.textContent = popupText;
          popup.style.left = (rect.left + rect.width / 2) + 'px';
          popup.style.top = (rect.top + rect.height / 2) + 'px';
          popup.style.position = 'fixed';
          document.body.appendChild(popup);
          setTimeout(function () { if (popup.parentNode) popup.parentNode.removeChild(popup); }, 1100);
        }

        setTimeout(function () {
          if (viewState.feedback && viewState.feedback.result === "match") {
            viewState.feedback = null;
            render({ preserveScroll: true });
          }
        }, 500);
      } else {
        // MISS
        viewState.combo = 0;
        viewState.misses = (viewState.misses || 0) + 1;
        viewState.feedback = { missIds: [sel.id, card.id], result: "miss" };
        viewState.lockUntil = Date.now() + 700;
        setTimeout(function () {
          viewState.feedback = null;
          viewState.selected = null;
          render({ preserveScroll: true });
        }, 700);
      }
    }
    // Save in-progress state after every interaction (so closing the tab preserves state)
    if (viewState.stage) {
      saveMatchInProgress(section, viewState.stage.id);
    }
    // Preserve scroll on all in-game taps so the user stays where they are
    render({ preserveScroll: true });
  }

  // -------- Build a tile element --------
  function buildTile(c) {
    const matchOrder = viewState.matched[c.pairId]; // undefined if not matched
    const isMatched = !!matchOrder;
    const isSelected = viewState.selected && viewState.selected.id === c.id;
    const isMissFlash = viewState.feedback && viewState.feedback.result === "miss"
      && viewState.feedback.missIds.indexOf(c.id) !== -1;
    const isMatchFlash = viewState.feedback && viewState.feedback.result === "match"
      && viewState.feedback.pairId === c.pairId;

    let mainText, subText;
    if (c.face === "jp") {
      if (c.item.type === "vocab") {
        mainText = c.item.jp;
        subText = c.item.r;
      } else if (c.item.type === "kanji") {
        mainText = c.item.jp;
        // shorter on/kun for tile space
        subText = c.item.on + " · " + c.item.kun;
      } else {
        mainText = c.item.jp;
        subText = "";
      }
    } else {
      // English: prefer the first comma-separated part if very long
      const meaning = c.item.type === "vocab" ? c.item.en : c.item.meaning;
      mainText = meaning;
      subText = "";
    }

    let cls = "pair-tile pair-tile-" + c.face;
    if (isMatched) cls += " matched";
    else if (isSelected) cls += " selected";
    if (isMissFlash) cls += " miss-flash";
    if (isMatchFlash) cls += " match-flash";

    // Hue per pair for subtle differentiation. 47 is coprime to 360 → good distribution.
    const hue = (c.pairId * 47) % 360;
    const style = isMatched ? ("--pair-hue:" + hue) : "";

    const children = [];
    if (c.face === "jp") {
      // Size class based on length: kana count > 6 = "long", > 9 = "very-long"
      let lenCls = "";
      const len = mainText.length;
      if (len > 9) lenCls = " very-long";
      else if (len > 6) lenCls = " long";
      children.push(h("div", { class: "tile-jp-main jp" + lenCls }, mainText));
      if (subText) children.push(h("div", { class: "tile-jp-sub jp" }, subText));
    } else {
      children.push(h("div", { class: "tile-en-main" }, mainText));
    }
    if (isMatched) {
      children.push(h("span", { class: "tile-pair-num mono" }, String(matchOrder)));
    }

    return h("button", {
      class: cls,
      style: style,
      "data-tile-id": c.id,
      onClick: function () { handleTap(c); },
      disabled: isMatched ? "" : null,
    }, children);
  }

  const tileEls = viewState.gameCards.map(buildTile);

  const elapsed = Math.round((Date.now() - viewState.startTime) / 1000);
  const combo = viewState.combo || 0;

  const stats = h("div", { class: "match-stats-bar" }, [
    h("div", { class: "match-stat" }, [
      h("span", { class: "match-stat-num" }, viewState.matches + "/" + viewState.totalPairs),
      h("span", { class: "match-stat-label mono" }, "PAIRS"),
    ]),
    h("div", { class: "match-stat" }, [
      h("span", { class: "match-stat-num" }, String(viewState.attempts)),
      h("span", { class: "match-stat-label mono" }, "TRIES"),
    ]),
    combo >= 2 ? h("div", { class: "combo-badge" }, "🔥 " + combo + " IN A ROW") : null,
  ]);

  // Apply awaiting-class to grid: if a tile is selected, opposite-face tiles glow subtly
  let gridCls = "pair-grid-4";
  if (viewState.selected && viewState.selected.face === "jp") gridCls += " awaiting-en";
  else if (viewState.selected && viewState.selected.face === "en") gridCls += " awaiting-jp";
  // Disable entrance animation after any user interaction (so we don't replay it on every re-render)
  if (viewState.attempts > 0 || viewState.matches > 0 || viewState.selected) {
    gridCls += " no-entrance";
  }

  // Header shows section + stage label
  const stageLabel = viewState.stage ? " · " + viewState.stage.label : "";

  return shell([
    backRow("← Stage select", function () {
      viewState = { _cameFromStageSelect: true };
      render();
    }),
    header("Match Game · " + (state.section || "all").toUpperCase() + stageLabel, "ペア合わせ"),
    viewState.resumed ? h("div", { class: "resumed-banner mono" }, [
      h("span", null, "↻ Resumed from your last session"),
      h("button", {
        class: "resumed-banner-fresh",
        onClick: function () {
          const stageId = viewState.stage ? viewState.stage.id : 1;
          clearMatchInProgress(section, stageId);
          viewState = { stageId: stageId, gameStarted: false };
          render();
        },
      }, "× Start fresh"),
    ]) : null,
    h("div", { class: "match-blurb-row" }, "Tap any tile, then its pair — Japanese or English, either direction."),
    stats,
    h("div", { class: gridCls }, tileEls),
    h("div", { class: "match-footer-row" }, [
      h("button", {
        class: "footer-link mono",
        onClick: function () {
          const stageId = viewState.stage ? viewState.stage.id : 1;
          // User explicitly wants a fresh deal — discard any in-progress save
          clearMatchInProgress(section, stageId);
          viewState = { stageId: stageId, gameStarted: false };
          render();
        },
      }, "↻ New deal"),
      h("div", { class: "spacer" }),
      h("span", { class: "mono muted" }, "⏱ " + elapsed + "s"),
    ]),
  ]);
}

/* ============================================================
   SCREEN: EXAM PRACTICE (MCQ simulation — vocab / grammar / reading)
   ============================================================ */

// ----- Question generators -----
// Each returns { q: string, options: [string×4], correct: number (0-3), explanation: string, item: original-item, subtype: "vocab"|"grammar"|"reading" }

function shuffleArray(arr) {
  const out = arr.slice();
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = out[i]; out[i] = out[j]; out[j] = tmp;
  }
  return out;
}

// VOCAB QUESTION: "What does this word mean?" — show JP, pick correct EN translation
function generateVocabQuestion(usedIds) {
  const pool = VOCAB.filter(function (v) { return !usedIds[v.id] && v.en && v.jp && v.r; });
  if (pool.length < 4) return null;
  const sorted = pool.slice().sort(function (a, b) { return (b.gfreq || 0) - (a.gfreq || 0); });
  // Pick from top 60% by frequency for higher-quality questions
  const topSlice = sorted.slice(0, Math.max(20, Math.floor(sorted.length * 0.6)));
  const item = topSlice[Math.floor(Math.random() * topSlice.length)];

  // Pick 3 distractors from items with similar frequency (so they're not obviously wrong)
  const candidates = pool.filter(function (v) {
    if (v.id === item.id) return false;
    return Math.abs((v.gfreq || 0) - (item.gfreq || 0)) <= 3;
  });
  const distractorsPool = candidates.length >= 3 ? candidates : pool.filter(function (v) { return v.id !== item.id; });
  const distractors = shuffleArray(distractorsPool).slice(0, 3);

  // Use two question styles: meaning-based or fill-in-blank from example
  const useFillIn = Math.random() < 0.5 && item.ex && item.ex_en;
  let q, optsRaw, correctValue;

  if (useFillIn) {
    // "Choose the correct word for the blank" — replace the word in the JP example with ____
    let blanked = item.ex;
    // Try to substitute, dropping particle/inflection suffixes
    const jpWord = item.jp;
    if (blanked.indexOf(jpWord) !== -1) {
      blanked = blanked.replace(jpWord, "____");
      q = "次の文の____に入る言葉を選んでください。\n\n" + blanked;
      optsRaw = [item.jp].concat(distractors.map(function (d) { return d.jp; }));
      correctValue = item.jp;
    } else {
      // Word doesn't appear verbatim — fall back to meaning style
      q = "「" + item.jp + "」(" + item.r + ") の意味は?";
      optsRaw = [item.en].concat(distractors.map(function (d) { return d.en; }));
      correctValue = item.en;
    }
  } else {
    q = "「" + item.jp + "」(" + item.r + ") の意味は?";
    optsRaw = [item.en].concat(distractors.map(function (d) { return d.en; }));
    correctValue = item.en;
  }

  const shuffled = shuffleArray(optsRaw);
  return {
    q: q,
    options: shuffled,
    correct: shuffled.indexOf(correctValue),
    explanation: item.jp + " (" + item.r + ") = " + item.en
      + (item.ex && item.ex_en ? "\n\n例: " + item.ex + " — " + item.ex_en : ""),
    item: item,
    subtype: "vocab",
  };
}

// GRAMMAR QUESTION: Choose correct pattern based on context
function generateGrammarQuestion(usedIds) {
  const pool = GRAMMAR.filter(function (g) { return !usedIds[g.id] && g.jp && g.meaning && g.ex; });
  if (pool.length < 4) return null;
  const item = pool[Math.floor(Math.random() * pool.length)];

  // Distractors: other grammar patterns
  const distractors = shuffleArray(pool.filter(function (g) { return g.id !== item.id; })).slice(0, 3);

  // Question styles:
  // A. "Which pattern means X?" — given English meaning, pick JP pattern
  // B. "Choose the pattern for the blank" — example with the pattern blanked out
  const useFillIn = Math.random() < 0.6 && item.ex;
  let q, optsRaw, correctValue;

  if (useFillIn) {
    // Try blanking the pattern in the example. Pattern starts with 〜 — strip that.
    const patternCore = item.jp.replace(/^〜/, "").replace(/〜/g, "").split("/")[0].trim();
    let blanked = item.ex;
    if (patternCore && blanked.indexOf(patternCore) !== -1) {
      blanked = blanked.replace(patternCore, "____");
      q = "次の文の____に入る文法を選んでください。\n\n" + blanked;
      optsRaw = [item.jp].concat(distractors.map(function (d) { return d.jp; }));
      correctValue = item.jp;
    } else {
      // Fall back to meaning style
      q = "「" + item.meaning + "」を表す文法はどれですか。";
      optsRaw = [item.jp].concat(distractors.map(function (d) { return d.jp; }));
      correctValue = item.jp;
    }
  } else {
    q = "「" + item.meaning + "」を表す文法はどれですか。";
    optsRaw = [item.jp].concat(distractors.map(function (d) { return d.jp; }));
    correctValue = item.jp;
  }

  const shuffled = shuffleArray(optsRaw);
  return {
    q: q,
    options: shuffled,
    correct: shuffled.indexOf(correctValue),
    explanation: item.jp + " = " + item.meaning
      + (item.explanation ? "\n\n" + item.explanation : "")
      + (item.ex && item.ex_en ? "\n\n例: " + item.ex + " — " + item.ex_en : "")
      + (item.mnem ? "\n\n💡 " + item.mnem : ""),
    item: item,
    subtype: "grammar",
  };
}

// READING QUESTION: pull a question from one of the existing reading passages
function generateReadingQuestion(usedIds) {
  // usedIds tracks passage-question pairs as "rN_qK"
  const allReadingQs = [];
  READINGS.forEach(function (passage) {
    passage.questions.forEach(function (q, qIdx) {
      const key = passage.id + "_q" + qIdx;
      if (!usedIds[key]) {
        allReadingQs.push({ passage: passage, qIdx: qIdx, key: key });
      }
    });
  });
  if (allReadingQs.length === 0) return null;
  const picked = allReadingQs[Math.floor(Math.random() * allReadingQs.length)];
  const passage = picked.passage;
  const rawQ = passage.questions[picked.qIdx];

  return {
    q: "【読解】\n\n" + passage.passage + "\n\n" + rawQ.q,
    options: rawQ.options.slice(),
    correct: rawQ.a,
    explanation: "正解: " + rawQ.options[rawQ.a]
      + "\n\nThis question is from the passage \"" + passage.title + " (" + passage.title_en + ")\". Re-read the relevant section to understand why this is the answer.",
    item: { id: picked.key, kind: "reading" },
    subtype: "reading",
  };
}

// Generate N questions of the given category. Returns array (length may be < N if pool exhausted)
function generateExamQuestions(category, count) {
  if (!state.examUsedIds) state.examUsedIds = { vocab: {}, grammar: {}, reading: {} };
  // Migration: if old structure missing keys, repair
  ["vocab", "grammar", "reading"].forEach(function (k) {
    if (!state.examUsedIds[k]) state.examUsedIds[k] = {};
  });

  const out = [];
  const generators = {
    vocab: generateVocabQuestion,
    grammar: generateGrammarQuestion,
    reading: generateReadingQuestion,
  };

  for (let i = 0; i < count; i++) {
    let useCat = category;
    if (category === "mixed") {
      // Alternate categories for mixed mode
      const cats = ["vocab", "grammar", "reading"];
      useCat = cats[i % cats.length];
    }
    const fn = generators[useCat];
    if (!fn) continue;
    const q = fn(state.examUsedIds[useCat]);
    if (!q) {
      // Pool exhausted for this category — try resetting it (let the user have fresh questions again)
      state.examUsedIds[useCat] = {};
      const retry = fn(state.examUsedIds[useCat]);
      if (!retry) break;
      out.push(retry);
      state.examUsedIds[useCat][retry.item.id] = true;
    } else {
      out.push(q);
      state.examUsedIds[useCat][q.item.id] = true;
    }
  }
  saveState();
  return out;
}

// Convert bracket-furigana syntax to <ruby> HTML
// "明日[あした]は雨[あめ]が降[ふ]る" => "<ruby>明日<rt>あした</rt></ruby>は<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>る"
function rubyify(text) {
  if (!text) return "";
  // Escape any existing HTML, then convert the bracket syntax
  const escaped = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
  return escaped.replace(
    /([\u4E00-\u9FFF\u3005]+)\[([\u3040-\u309F\u30A0-\u30FFー]+)\]/g,
    '<ruby>$1<rt>$2</rt></ruby>'
  );
}

  const returnPage = viewState.moodPageReturn || 1;

  return shell([
    backRow("← Mood tools", function () {
      viewState = { moodPage: returnPage };
      render();
    }),
    h("div", { class: "mood-detail-header mood-tint-" + m.color }, [
      h("div", { class: "mood-detail-emoji" }, m.emoji),
      h("div", { class: "mood-detail-meta" }, [
        h("div", { class: "mood-detail-cat mono" }, m.category),
        h("h1", { class: "mood-detail-jp jp", html: rubyify(m.jp) }),
        h("div", { class: "mood-detail-reading jp" }, m.reading),
        h("div", { class: "mood-detail-en" }, m.en),
      ]),
    ]),
    h("div", { class: "mood-detail-section" }, [
      h("div", { class: "mood-section-label mono" }, "WHAT IT DOES"),
      h("div", { class: "mood-section-body" }, m.purpose),
    ]),
    h("div", { class: "mood-detail-section" }, [
      h("div", { class: "mood-section-label mono" }, "TRY IT IN REAL LIFE"),
      h("div", { class: "mood-examples" }, m.examples.map(function (ex, i) {
        return h("div", { class: "mood-example mood-bg-" + m.color }, [
          h("div", { class: "mood-example-scene mono" }, [
            h("span", { class: "mood-example-num" }, String(i + 1)),
            h("span", null, ex.scene),
          ]),
          h("div", { class: "mood-example-jp jp", html: rubyify(ex.jp) }),
          h("div", { class: "mood-example-en" }, ex.en),
        ]);
      })),
    ]),
    h("div", { class: "mood-detail-section mood-tip-section" }, [
      h("div", { class: "mood-section-label mono" }, "💡 TIP"),
      h("div", { class: "mood-tip-body" }, m.tip),
    ]),
    h("div", { class: "mood-nav" }, [
      prev ? h("button", {
        class: "mood-nav-btn mood-nav-prev",
        onClick: function () {
          viewState = { moodId: prev.id, moodPageReturn: returnPage };
          render();
        },
      }, [
        h("div", { class: "mood-nav-arrow mono" }, "← prev"),
        h("div", { class: "mood-nav-preview" }, [
          h("span", { class: "mood-nav-emoji" }, prev.emoji),
          h("span", { class: "mood-nav-jp jp", html: rubyify(prev.jp) }),
        ]),
      ]) : h("div", { class: "mood-nav-empty" }),
      next ? h("button", {
        class: "mood-nav-btn mood-nav-next",
        onClick: function () {
          viewState = { moodId: next.id, moodPageReturn: returnPage };
          render();
        },
      }, [
        h("div", { class: "mood-nav-arrow mono" }, "next →"),
        h("div", { class: "mood-nav-preview" }, [
          h("span", { class: "mood-nav-jp jp", html: rubyify(next.jp) }),
          h("span", { class: "mood-nav-emoji" }, next.emoji),
        ]),
      ]) : h("div", { class: "mood-nav-empty" }),
    ]),
  ]);
}

/* ============================================================
   SCREEN: PROGRESS
   ============================================================ */

function renderProgress() {
  const proj = projectReadiness();
  const cards = state.cards || {};
  const all = allItems();
  const breakdown = ["vocab", "kanji", "grammar"].map(function (type) {
    const typeItems = all.filter(function (i) { return i.type === type; });
    const seen = typeItems.map(function (i) { return cards[i.id]; }).filter(function (c) { return c; });
    const learning = seen.filter(function (c) { return c.status === "learning"; }).length;
    const review = seen.filter(function (c) { return c.status === "review"; }).length;
    const mastered = seen.filter(function (c) { return c.stability > 7; }).length;
    return { type: type, total: typeItems.length, seen: seen.length, learning: learning, review: review, mastered: mastered };
  });

  let totalLapses = 0, totalReviews = 0;
  Object.keys(cards).forEach(function (k) {
    totalLapses += cards[k].lapses || 0;
    totalReviews += cards[k].reviews || 0;
  });
  const accuracy = totalReviews > 0 ? Math.round(((totalReviews - totalLapses) / totalReviews) * 100) : 0;

  const right = h("button", {
    class: "footer-link mono",
    onClick: function () { setView("dashboard"); },
  }, "← Back");

  const stats = h("div", { class: "stats-grid" }, [
    h("div", { class: "card surface border" }, [
      h("div", { class: "card-label mono" }, "Days Left"),
      h("div", { class: "stat-big" }, String(proj.daysLeft)),
    ]),
    h("div", { class: "card surface border" }, [
      h("div", { class: "card-label mono" }, "Proj. Mastery"),
      h("div", { class: "stat-big" }, proj.projectedMasteryPct + "%"),
    ]),
    h("div", { class: "card surface border" }, [
      h("div", { class: "card-label mono" }, "Sessions"),
      h("div", { class: "stat-big" }, String(state.sessions || 0)),
    ]),
    h("div", { class: "card surface border" }, [
      h("div", { class: "card-label mono" }, "Accuracy"),
      h("div", { class: "stat-big" }, accuracy + "%"),
    ]),
  ]);

  const breakdownEls = breakdown.map(function (b) {
    const masterPct = (b.mastered / b.total) * 100;
    const reviewPct = (b.review / b.total) * 100;
    const learningPct = (b.learning / b.total) * 100;
    return h("div", { class: "card surface border breakdown-row" }, [
      h("div", { class: "breakdown-head" }, [
        h("div", { class: "breakdown-type" }, b.type),
        h("div", { class: "mono muted" }, b.seen + "/" + b.total),
      ]),
      h("div", { class: "stack-bar" }, [
        h("div", { class: "stack-mastered", style: "width:" + masterPct + "%" }),
        h("div", {
          class: "stack-review",
          style: "left:" + masterPct + "%; width:" + reviewPct + "%",
        }),
        h("div", {
          class: "stack-learning",
          style: "left:" + (masterPct + reviewPct) + "%; width:" + learningPct + "%",
        }),
      ]),
      h("div", { class: "breakdown-legend mono" }, [
        h("span", null, "● mastered " + b.mastered),
        h("span", null, "● review " + b.review),
        h("span", null, "● learning " + b.learning),
      ]),
    ]);
  });

  return shell([
    header("Your progress", "進捗", right),
    stats,
    h("div", { class: "section-block" }, [
      h("div", { class: "section-heading mono" }, "By Skill"),
      h("div", null, breakdownEls),
    ]),
    h("div", { class: "card surface border reading-summary" }, [
      h("div", { class: "card-label mono" }, "Reading"),
      h("div", null, [
        "Completed: ",
        h("strong", null, String((state.readingsDone || []).length)),
        " / " + READINGS.length,
      ]),
    ]),
    h("div", { class: "beta-notes" }, [
      h("div", { class: "section-heading mono" }, "Beta Notes"),
      h("p", { class: "italic" }, "Corpus: " + proj.total + " items (" + VOCAB.length + " vocab + " + KANJI.length + " kanji + " + GRAMMAR.length + " grammar) + " + READINGS.length + " reading passages. Algorithm being validated: FSRS-lite SRS, past-exam-weighted prioritization, self-assessed diagnostic placement."),
    ]),
    renderReportsSection(),
  ]);
}

function renderReportsSection() {
  const reports = state.reports || [];
  const children = [
    h("div", { class: "section-heading mono" }, "Card Reports"),
  ];

  if (reports.length === 0) {
    children.push(h("p", { class: "muted italic", style: "font-size:13px;" },
      "No reports yet. Tap the ⚑ Report button on any card to flag wrong content. Reports stay on your device until you export them."));
    return h("div", { class: "reports-section", style: "margin-top:32px;" }, children);
  }

  children.push(h("p", { class: "muted", style: "font-size:13px; margin-bottom:12px;" },
    reports.length + " report" + (reports.length === 1 ? "" : "s") + " saved. Tap 'Copy reports' to copy all reports as text — paste them back in the chat for fixes."));

  const reasonLabels = {};
  REPORT_REASONS.forEach(function (r) { reasonLabels[r.id] = r.label; });

  const listEls = reports.slice().reverse().map(function (r, idx) {
    return h("div", { class: "report-item" }, [
      h("div", { class: "report-item-snapshot jp" }, r.snapshot),
      h("div", { class: "report-item-meta mono" }, [
        r.itemId + " · " + (r.itemType || "?") + " · " + (reasonLabels[r.reason] || r.reason),
      ]),
      h("button", {
        class: "report-item-remove mono",
        onClick: function () {
          if (confirm("Remove this report?")) {
            state.reports.splice(state.reports.length - 1 - idx, 1);
            saveState();
            render();
          }
        },
      }, "× Remove"),
    ]);
  });
  children.push(h("div", { class: "reports-list" }, listEls));

  children.push(h("div", { class: "reports-actions" }, [
    h("button", {
      class: "btn-secondary mono",
      onClick: function () {
        const lines = ["JLPT N3 Beta — Card Reports", "Exported: " + new Date().toISOString(), ""];
        reports.forEach(function (r) {
          lines.push("[" + r.itemId + " · " + (r.itemType || "?") + "] " + r.snapshot);
          lines.push("  Issue: " + (reasonLabels[r.reason] || r.reason));
          lines.push("");
        });
        const txt = lines.join("\n");
        // Try clipboard API, fall back to prompt
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(txt).then(function () {
            showReportToast("Copied " + reports.length + " reports to clipboard.");
          }, function () {
            window.prompt("Copy reports (Cmd/Ctrl+C, then Enter):", txt);
          });
        } else {
          window.prompt("Copy reports (Cmd/Ctrl+C, then Enter):", txt);
        }
      },
    }, "Copy reports"),
    h("button", {
      class: "footer-link mono danger",
      style: "margin-left:auto;",
      onClick: function () {
        if (confirm("Clear all " + reports.length + " reports? They cannot be recovered.")) {
          state.reports = [];
          saveState();
          render();
        }
      },
    }, "Clear all"),
  ]));

  return h("div", { class: "reports-section", style: "margin-top:32px;" }, children);
}

/* ============================================================
   SCREEN: BROWSE — view all items with answers visible
   ============================================================ */

function renderBrowse() {
  if (!viewState.tab) viewState.tab = "vocab";
  if (viewState.search === undefined) viewState.search = "";
  if (!viewState.expanded) viewState.expanded = {};

  const cards = state.cards || {};
  const tab = viewState.tab;
  const search = viewState.search.trim().toLowerCase();

  function statusBadge(itemId) {
    const c = cards[itemId];
    if (!c) return h("span", { class: "badge new mono" }, "·");
    if (c.stability > 7 && c.status === "review") return h("span", { class: "badge mastered mono" }, "✓");
    if (c.status === "review") return h("span", { class: "badge review mono" }, "↻");
    return h("span", { class: "badge learning mono" }, "…");
  }

  function tabBtn(key, label, count) {
    return h("button", {
      class: "tab-btn mono" + (tab === key ? " active" : ""),
      onClick: function () {
        viewState.tab = key;
        viewState.expanded = {};
        render();
      },
    }, [
      h("span", { class: "tab-label" }, label),
      h("span", { class: "tab-count" }, "(" + count + ")"),
    ]);
  }

  const tabBar = h("div", { class: "tab-bar" }, [
    tabBtn("vocab", "Vocab", VOCAB.length),
    tabBtn("kanji", "Kanji", KANJI.length),
    tabBtn("grammar", "Grammar", GRAMMAR.length),
    tabBtn("reading", "Reading", READINGS.length),
  ]);

  const searchInput = h("input", {
    type: "text",
    class: "input search-input",
    placeholder: "Search " + tab + "…",
    value: viewState.search,
  });
  searchInput.addEventListener("input", function (e) {
    viewState.search = e.target.value;
    // Re-render only the list; full render also fine
    render();
  });

  let listEls = [];

  if (tab === "vocab") {
    const filtered = VOCAB.filter(function (v) {
      if (!search) return true;
      return (
        v.jp.toLowerCase().indexOf(search) >= 0 ||
        v.r.toLowerCase().indexOf(search) >= 0 ||
        v.en.toLowerCase().indexOf(search) >= 0
      );
    });
    listEls = filtered.map(function (v) {
      const expanded = viewState.expanded[v.id];
      return h("div", { class: "browse-item" + (expanded ? " expanded" : "") }, [
        h("button", {
          class: "browse-row",
          onClick: function () {
            viewState.expanded[v.id] = !expanded;
            render();
          },
        }, [
          h("div", { class: "browse-row-left" }, [
            statusBadge(v.id),
            h("span", { class: "browse-jp jp" }, v.jp),
            h("span", { class: "browse-reading jp muted" }, v.r),
          ]),
          h("span", { class: "browse-en" }, v.en),
        ]),
        expanded
          ? h("div", { class: "browse-detail" }, [
              h("div", { class: "section-label mono" }, "Example"),
              h("div", { class: "browse-example jp" }, v.ex),
            ])
          : null,
      ]);
    });
  } else if (tab === "kanji") {
    const filtered = KANJI.filter(function (k) {
      if (!search) return true;
      return (
        k.jp.indexOf(search) >= 0 ||
        (k.on || "").toLowerCase().indexOf(search) >= 0 ||
        (k.kun || "").toLowerCase().indexOf(search) >= 0 ||
        k.meaning.toLowerCase().indexOf(search) >= 0
      );
    });
    listEls = filtered.map(function (k) {
      const expanded = viewState.expanded[k.id];
      return h("div", { class: "browse-item" + (expanded ? " expanded" : "") }, [
        h("button", {
          class: "browse-row",
          onClick: function () {
            viewState.expanded[k.id] = !expanded;
            render();
          },
        }, [
          h("div", { class: "browse-row-left" }, [
            statusBadge(k.id),
            h("span", { class: "browse-jp jp kanji" }, k.jp),
            h("span", { class: "browse-onkun mono muted" }, k.on + " / " + k.kun),
          ]),
          h("span", { class: "browse-en" }, k.meaning),
        ]),
        expanded
          ? h("div", { class: "browse-detail" }, [
              h("div", { class: "section-label mono" }, "Components"),
              h("div", { class: "browse-detail-text jp" }, k.comp),
              h("div", { class: "section-label mono" }, "Mnemonic"),
              h("div", { class: "browse-detail-text italic" }, k.mnem),
            ])
          : null,
      ]);
    });
  } else if (tab === "grammar") {
    const filtered = GRAMMAR.filter(function (g) {
      if (!search) return true;
      return (
        g.jp.indexOf(search) >= 0 ||
        g.meaning.toLowerCase().indexOf(search) >= 0 ||
        g.explanation.toLowerCase().indexOf(search) >= 0
      );
    });
    listEls = filtered.map(function (g) {
      const expanded = viewState.expanded[g.id];
      return h("div", { class: "browse-item" + (expanded ? " expanded" : "") }, [
        h("button", {
          class: "browse-row",
          onClick: function () {
            viewState.expanded[g.id] = !expanded;
            render();
          },
        }, [
          h("div", { class: "browse-row-left" }, [
            statusBadge(g.id),
            h("span", { class: "browse-jp jp" }, g.jp),
          ]),
          h("span", { class: "browse-en" }, g.meaning),
        ]),
        expanded
          ? h("div", { class: "browse-detail" }, [
              h("div", { class: "section-label mono" }, "Explanation"),
              h("div", { class: "browse-detail-text" }, g.explanation),
              h("div", { class: "section-label mono" }, "Example"),
              h("div", { class: "browse-detail-text jp" }, g.ex),
            ])
          : null,
      ]);
    });
  } else if (tab === "reading") {
    listEls = READINGS.map(function (r, i) {
      const expanded = viewState.expanded[r.id];
      const done = (state.readingsDone || []).indexOf(r.id) >= 0;
      return h("div", { class: "browse-item reading-item" + (expanded ? " expanded" : "") }, [
        h("button", {
          class: "browse-row",
          onClick: function () {
            viewState.expanded[r.id] = !expanded;
            render();
          },
        }, [
          h("div", { class: "browse-row-left" }, [
            h("span", { class: done ? "badge mastered mono" : "badge new mono" }, done ? "✓" : (i + 1)),
            h("span", { class: "browse-jp jp" }, r.title),
          ]),
          h("span", { class: "browse-en italic muted" }, r.title_en),
        ]),
        expanded
          ? h("div", { class: "browse-detail" }, [
              h("div", { class: "section-label mono" }, "Passage"),
              h("div", { class: "passage-text jp" }, r.passage),
              h("div", { class: "section-label mono", style: "margin-top:16px" }, "Questions & Answers"),
              h("div", null, r.questions.map(function (q, qi) {
                return h("div", { class: "qa-block" }, [
                  h("div", { class: "qa-q jp" }, (qi + 1) + ". " + q.q),
                  h("div", null, q.options.map(function (opt, oi) {
                    return h("div", {
                      class: "qa-opt jp" + (oi === q.a ? " correct" : ""),
                    }, [
                      h("span", { class: "mono opt-letter" }, String.fromCharCode(65 + oi)),
                      opt,
                      oi === q.a ? h("span", { class: "qa-mark mono" }, " ✓") : null,
                    ]);
                  })),
                ]);
              })),
            ])
          : null,
      ]);
    });
  }

  const right = h("button", {
    class: "footer-link mono",
    onClick: function () { setView("dashboard"); },
  }, "← Back");

  return shell([
    header("Browse all items", "目録", right),
    tabBar,
    tab === "reading" ? null : searchInput,
    h("div", { class: "browse-list" }, listEls.length > 0
      ? listEls
      : [h("div", { class: "muted-italic" }, "No matches.")]),
  ]);
}


/* ============================================================
   BOOT
   ============================================================ */

function boot() {
  try {
    state = loadState();
    if (state) {
      view = state.diagnosticDone ? "dashboard" : "diagnostic";
    } else {
      view = "onboarding";
    }
    render();
  } catch (err) {
    showError(err);
  }
}

window.addEventListener("DOMContentLoaded", boot);

</script>
</body>
</html>
